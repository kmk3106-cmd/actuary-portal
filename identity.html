<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>팀 정체성·핵심가치 - 계리결산팀 운영관리포탈</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/main.css?v=20">
  <style>
    /* ════════════════════════════════════════════════════
       출판물 스타일 히어로 — 편집 스타일 레이아웃
       ════════════════════════════════════════════════════ */

    /* 전체 미션 블록 컨테이너 */
    .pub-hero {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 4px;
      display: flex;
      align-items: stretch;
      margin-bottom: 48px;
      position: relative;
      overflow: hidden;
      min-height: 320px;
    }

    /* 좌측 번호 + 라벨 사이드바 */
    .pub-sidebar {
      width: 72px;
      flex-shrink: 0;
      border-right: 1px solid #d1d5db;
      padding: 40px 0 40px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      background: #fafafa;
    }

    .pub-num {
      font-size: 52px;
      font-weight: 300;
      color: #111827;
      line-height: 1;
      letter-spacing: -0.04em;
      font-family: 'Noto Sans KR', sans-serif;
    }

    .pub-divider {
      width: 24px;
      height: 1px;
      background: #9ca3af;
      flex-shrink: 0;
    }

    .pub-sidebar-label {
      font-size: 10px;
      font-weight: 400;
      color: #9ca3af;
      text-align: center;
      line-height: 1.6;
      writing-mode: horizontal-tb;
      word-break: keep-all;
      padding: 0 8px;
    }

    /* 우측 본문 */
    .pub-body {
      flex: 1;
      padding: 44px 56px 40px 48px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-width: 0;
    }

    .pub-body-inner {
      flex: 1;
    }

    /* 영어 캡션 */
    .pub-caption {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: #9ca3af;
      margin-bottom: 14px;
      font-family: 'Noto Sans KR', sans-serif;
    }

    /* 큰 한글 제목 */
    .pub-title {
      font-size: 68px;
      font-weight: 700;
      color: #111827;
      line-height: 1.0;
      letter-spacing: -0.03em;
      margin-bottom: 32px;
      word-break: keep-all;
    }

    /* 미션 본문 */
    .pub-mission {
      font-size: 17px;
      font-weight: 400;
      color: #2d2d2d;
      line-height: 1.85;
      word-break: keep-all;
      max-width: 720px;
    }

    /* 키워드 하이라이트 — [[키워드]] -> black box + white text */
    .pub-mission .kw {
      display: inline-block;
      background: #1f2937;
      color: #ffffff;
      font-weight: 400;
      font-size: 0.95em;
      padding: 1px 6px 2px;
      border-radius: 2px;
      vertical-align: baseline;
      line-height: 1.55;
    }

    /* 편집 버튼 (팀장 전용) */
    .pub-edit-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
      background: transparent;
      color: #9ca3af;
      border: 1px solid #e5e7eb;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      font-family: inherit;
    }
    .pub-edit-btn:hover {
      background: #f3f4f6;
      color: #374151;
      border-color: #d1d5db;
    }

    /* 메타 (버전 + 날짜) */
    .pub-footer {
      margin-top: 36px;
      padding-top: 20px;
      border-top: 1px solid #e5e7eb;
    }

    .pub-meta {
      font-size: 11px;
      color: #9ca3af;
      letter-spacing: 0.05em;
    }

    /* 비전 (있을 때만) */
    .pub-vision-label {
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #9ca3af;
      margin-bottom: 6px;
    }
    .pub-vision-text {
      font-size: 15px;
      color: #4b5563;
      line-height: 1.8;
      font-weight: 300;
    }

    /* ════════════════════════════════════════════════════
       핵심가치 섹션 헤더 — 같은 모노톤 톤
       ════════════════════════════════════════════════════ */
    .cv-section-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid #e5e7eb;
    }
    .cv-section-num {
      font-size: 13px;
      font-weight: 300;
      color: #9ca3af;
      letter-spacing: 0.04em;
      margin-bottom: 6px;
    }
    .cv-section-title {
      font-size: 26px;
      font-weight: 700;
      color: #111827;
      line-height: 1.2;
      letter-spacing: -0.02em;
    }
    .cv-section-sub {
      font-size: 13px;
      color: #9ca3af;
      margin-top: 5px;
      font-weight: 400;
    }
    .cv-count-badge {
      font-size: 11px;
      font-weight: 500;
      color: #6b7280;
      background: #f3f4f6;
      padding: 4px 12px;
      border-radius: 2px;
      border: 1px solid #e5e7eb;
      flex-shrink: 0;
    }

    /* ════════════════════════════════════════════════════
       핵심가치 카드 — 미니멀 모노톤
       ════════════════════════════════════════════════════ */
    .cv-big-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .cv-big-card {
      display: flex;
      align-items: stretch;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 4px;
      overflow: hidden;
      transition: border-color 0.18s ease, box-shadow 0.18s ease;
      cursor: default;
      position: relative;
    }
    .cv-big-card.clickable {
      cursor: pointer;
    }
    .cv-big-card:hover {
      border-color: #d1d5db;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
    }

    /* 번호 열 — 가는 폰트, 회색 */
    .cv-num {
      width: 72px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: 300;
      color: #d1d5db;
      letter-spacing: -0.04em;
      background: #fafafa;
      border-right: 1px solid #e5e7eb;
      user-select: none;
      padding: 24px 0;
    }

    /* 아이콘 — 회색 원형 */
    .cv-icon-wrap {
      width: 64px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .cv-icon-circle {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      background: #f3f4f6;
      color: #6b7280;
    }

    /* 본문 */
    .cv-body {
      flex: 1;
      padding: 24px 32px 24px 12px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .cv-big-title {
      font-size: 18px;
      font-weight: 700;
      color: #111827;
      margin-bottom: 7px;
      letter-spacing: -0.02em;
      line-height: 1.3;
    }
    .cv-big-desc {
      font-size: 14px;
      color: #4b5563;
      line-height: 1.8;
      font-weight: 400;
    }

    /* 편집 힌트 */
    .cv-edit-hint {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      padding-right: 20px;
      color: #e5e7eb;
      font-size: 13px;
      transition: color 0.15s;
    }
    .cv-big-card.clickable:hover .cv-edit-hint {
      color: #9ca3af;
    }

    /* ════════════════════════════════════════════════════
       반응형 — 태블릿 (≤ 900px)
       ════════════════════════════════════════════════════ */
    @media (max-width: 900px) {
      .pub-title   { font-size: 52px; }
      .pub-mission { font-size: 16px; }
      .pub-body    { padding: 36px 40px 36px 36px; }
    }

    /* ════════════════════════════════════════════════════
       반응형 — 모바일 (≤ 640px)
       좌측 사이드바를 상단으로 이동 (세로 배치)
       ════════════════════════════════════════════════════ */
    @media (max-width: 640px) {
      .pub-hero {
        flex-direction: column;
        min-height: unset;
        margin-bottom: 32px;
      }

      /* 사이드바 → 수평 가로 띠로 전환 */
      .pub-sidebar {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid #d1d5db;
        flex-direction: row;
        align-items: center;
        padding: 14px 20px;
        gap: 12px;
      }

      .pub-num {
        font-size: 36px;
      }

      .pub-divider {
        width: 1px;
        height: 20px;
        background: #d1d5db;
      }

      .pub-sidebar-label {
        font-size: 10px;
        padding: 0;
        writing-mode: horizontal-tb;
      }

      .pub-body {
        padding: 28px 22px 28px 22px;
      }

      .pub-title {
        font-size: 38px;
        margin-bottom: 20px;
      }

      .pub-caption {
        font-size: 10px;
        letter-spacing: 0.22em;
      }

      .pub-mission {
        font-size: 15px;
        line-height: 1.9;
      }

      .pub-edit-btn {
        top: 14px;
        right: 14px;
      }

      /* 핵심가치 섹션 */
      .cv-section-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
      }

      .cv-num      { width: 52px; font-size: 24px; padding: 16px 0; }
      .cv-icon-wrap { width: 52px; }
      .cv-icon-circle { width: 34px; height: 34px; font-size: 14px; border-radius: 6px; }
      .cv-body     { padding: 16px 16px 16px 8px; }
      .cv-big-title { font-size: 15px; }
      .cv-big-desc  { font-size: 13px; line-height: 1.75; }
      .cv-edit-hint { padding-right: 12px; font-size: 12px; }
    }

    /* ════════════════════════════════════════════════════
       반응형 — 소형 모바일 (≤ 400px)
       ════════════════════════════════════════════════════ */
    @media (max-width: 400px) {
      .pub-title   { font-size: 30px; }
      .pub-mission { font-size: 14px; }
      .pub-body    { padding: 22px 16px; }
      .cv-num      { display: none; }
    }

    /* ════════════════════════════════════════════════════
       편집 모달 힌트 스타일
       ════════════════════════════════════════════════════ */
    .kw-hint {
      margin-top: 6px;
      font-size: 12px;
      color: #9ca3af;
      line-height: 1.6;
    }
    .kw-hint code {
      background: #f3f4f6;
      border: 1px solid #e5e7eb;
      border-radius: 3px;
      padding: 1px 5px;
      font-family: monospace;
      font-size: 11px;
      color: #374151;
    }
  </style>
</head>
<body>

<div class="app-layout">
  <div id="sidebar"></div>
  <div class="main-content">
    <header class="page-header">
      <h1 class="page-title">팀 정체성 &amp; 핵심가치</h1>
      <div class="header-actions" id="headerActions"></div>
    </header>

    <main class="content-body">

      <!-- ── 출판물 스타일 히어로: 팀 정체성 ── -->
      <div class="pub-hero">

        <!-- 팀장 전용 수정 버튼 -->
        <button id="editIdentityBtn" class="pub-edit-btn hidden" onclick="openIdentityModal()">
          <i class="fas fa-pen"></i> 수정
        </button>

        <!-- 좌측: 번호 + 구분선 + 라벨 -->
        <div class="pub-sidebar">
          <div class="pub-num">01</div>
          <div class="pub-divider"></div>
          <div class="pub-sidebar-label">팀 정체성<br>핵심가치</div>
        </div>

        <!-- 우측: 본문 -->
        <div class="pub-body">
          <div class="pub-body-inner">
            <div class="pub-caption">Actuarial Settlement Team</div>
            <div class="pub-title">계리결산팀</div>
            <p id="missionDisplay" class="pub-mission">로딩 중...</p>

            <div id="visionWrap" class="hidden" style="margin-top:24px;">
              <div class="pub-vision-label">Vision</div>
              <p id="visionDisplay" class="pub-vision-text"></p>
            </div>
          </div>

          <div class="pub-footer">
            <div class="pub-meta" id="identityMeta">V.1.0 &middot; 2026.05.06</div>
          </div>
        </div>

      </div>

      <!-- ── 핵심가치 ── -->
      <div style="margin-bottom: 40px;">
        <div class="cv-section-header">
          <div>
            <div class="cv-section-num">02</div>
            <div class="cv-section-title">핵심가치 &amp; 행동규범</div>
            <div class="cv-section-sub">우리 팀이 매일의 업무에서 실천하는 다섯 가지 원칙</div>
          </div>
          <div style="display:flex;align-items:center;gap:10px;">
            <span class="cv-count-badge" id="cvCountBadge">5개 가치</span>
            <button id="addValueBtn" class="btn btn-primary btn-sm hidden" onclick="openAddCvModal()">
              <i class="fas fa-plus"></i> 추가
            </button>
          </div>
        </div>
        <div id="coreValuesGrid" class="cv-big-list">
          <div class="text-muted text-center" style="padding:40px;">로딩 중...</div>
        </div>
      </div>

    </main>
  </div>
</div>

<!-- 팀 정체성 편집 모달 -->
<div id="identityModal" class="modal-overlay">
  <div class="modal" style="max-width:600px;">
    <div class="modal-header">
      <h3 class="modal-title"><i class="fas fa-flag" style="color:#4f86f7;margin-right:8px;"></i>팀 정체성 수정</h3>
      <button class="modal-close" onclick="closeModal('identityModal')"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">팀 정체성 (미션) <span class="required">*</span></label>
        <textarea id="missionInput" class="form-control" style="min-height:160px;" placeholder="계리결산팀의 존재 이유와 역할을 입력하세요."></textarea>
        <div class="kw-hint">
          강조할 키워드는 <code>[[키워드]]</code> 형식으로 감싸면 검은 박스로 자동 표시됩니다.<br>
          예: <code>[[계리결산팀]]</code>은 정확하고 안정적인 <code>[[결산]]</code> 수행을 기반으로…
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">비전 (선택)</label>
        <textarea id="visionInput" class="form-control" style="min-height:80px;" placeholder="팀이 지향하는 미래 모습을 입력하세요."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('identityModal')">취소</button>
      <button class="btn btn-primary" onclick="saveIdentity()"><i class="fas fa-save"></i> 저장</button>
    </div>
  </div>
</div>

<!-- 핵심가치 편집 모달 -->
<div id="cvModal" class="modal-overlay">
  <div class="modal" style="max-width:560px;">
    <div class="modal-header">
      <h3 class="modal-title" id="cvModalTitle"><i class="fas fa-star" style="color:#f59e0b;margin-right:8px;"></i>핵심가치 수정</h3>
      <button class="modal-close" onclick="closeModal('cvModal')"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="cvId">
      <div class="form-group">
        <label class="form-label">핵심가치 제목 <span class="required">*</span></label>
        <input type="text" id="cvTitle" class="form-control" placeholder="예: 책임 있게 완수한다">
      </div>
      <div class="form-group">
        <label class="form-label">행동규범 설명 <span class="required">*</span></label>
        <textarea id="cvDesc" class="form-control" style="min-height:100px;" placeholder="이 핵심가치의 구체적 행동 방식을 설명하세요."></textarea>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
        <div class="form-group">
          <label class="form-label">아이콘</label>
          <select id="cvIcon" class="form-control">
            <option value="fa-shield-alt">방패 (책임)</option>
            <option value="fa-search">검색 (정확성)</option>
            <option value="fa-graduation-cap">학업 (성장)</option>
            <option value="fa-cogs">설정 (개선)</option>
            <option value="fa-comments">대화 (소통)</option>
            <option value="fa-chart-line">차트 (성과)</option>
            <option value="fa-lightbulb">아이디어</option>
            <option value="fa-handshake">협업</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">색상 (아이콘용)</label>
          <select id="cvColor" class="form-control">
            <option value="blue">파랑</option>
            <option value="green">초록</option>
            <option value="yellow">노랑</option>
            <option value="purple">보라</option>
            <option value="red">빨강</option>
          </select>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger btn-sm" id="cvDeleteBtn" onclick="deleteCv()" style="margin-right:auto;">
        <i class="fas fa-trash"></i> 삭제
      </button>
      <button class="btn btn-secondary" onclick="closeModal('cvModal')">취소</button>
      <button class="btn btn-primary" onclick="saveCv()"><i class="fas fa-save"></i> 저장</button>
    </div>
  </div>
</div>

<script src="js/rbac.js"></script>
<script src="js/auth.js"></script>
<script src="js/portal.js?v=20"></script>
<script>
  Portal.init();

  const isLeader = RBAC.isTeamLeader();

  if (isLeader) {
    document.getElementById('editIdentityBtn').classList.remove('hidden');
    document.getElementById('addValueBtn').classList.remove('hidden');
    document.getElementById('headerActions').innerHTML =
      `<span class="text-muted" style="font-size:12px;"><i class="fas fa-lock-open" style="color:#10b981;"></i> 편집 가능 (팀장)</span>`;
  }

  // ── [[키워드]] 마크업 -> <span class="kw"> 변환 ──────
  function renderKeywords(text) {
    // XSS 방지: 먼저 HTML 이스케이프 후 [[ ]] 치환
    const escaped = text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
    return escaped.replace(/\[\[(.+?)\]\]/g, '<span class="kw">$1</span>');
  }

  // ── 데이터 로드 ──────────────────────────────────────

  async function loadPage() {
    try {
      const [identRes, cvRes] = await Promise.all([
        fetch('tables/team_identity/default'),
        fetch('tables/core_values?sort=order&limit=20')
      ]);

      if (identRes.ok) {
        const d = await identRes.json();
        const mission = d.mission || '팀 미션이 설정되지 않았습니다.';
        document.getElementById('missionDisplay').innerHTML = renderKeywords(mission);

        if (d.vision) {
          document.getElementById('visionDisplay').textContent = d.vision;
          document.getElementById('visionWrap').classList.remove('hidden');
        }

        // 버전 + 날짜 메타
        const metaEl = document.getElementById('identityMeta');
        if (d.updated_at) {
          metaEl.textContent = `V.1.0 · ${Portal.formatDateTime(d.updated_at)}`;
        } else {
          metaEl.textContent = 'V.1.0 · 2026.05.06';
        }
      }

      if (cvRes.ok) {
        const d = await cvRes.json();
        renderCoreValues(d.data || []);
      }
    } catch (e) {
      Portal.showToast('데이터 로드에 실패했습니다.', 'error');
    }
  }

  function renderCoreValues(values) {
    const grid = document.getElementById('coreValuesGrid');
    const countBadge = document.getElementById('cvCountBadge');

    if (!values.length) {
      grid.innerHTML = `<div class="empty-state">
        <i class="fas fa-star"></i>
        <h3>핵심가치가 없습니다</h3>
        <p>팀장만 핵심가치를 추가할 수 있습니다.</p>
      </div>`;
      return;
    }

    const sorted = [...values].sort((a, b) => (a.order || 0) - (b.order || 0));
    if (countBadge) countBadge.textContent = `${sorted.length}개 가치`;

    grid.innerHTML = sorted.map((cv, i) => {
      const num = String(i + 1).padStart(2, '0');
      const clickAttr = isLeader ? `onclick="openEditCvModal('${cv.id}')"` : '';
      return `
        <div class="cv-big-card ${isLeader ? 'clickable' : ''}" ${clickAttr}>
          <div class="cv-num">${num}</div>
          <div class="cv-icon-wrap">
            <div class="cv-icon-circle">
              <i class="fas ${cv.icon || 'fa-star'}"></i>
            </div>
          </div>
          <div class="cv-body">
            <div class="cv-big-title">${cv.title}</div>
            <div class="cv-big-desc">${cv.description}</div>
          </div>
          ${isLeader ? `<div class="cv-edit-hint"><i class="fas fa-pen"></i></div>` : ''}
        </div>`;
    }).join('');
  }

  // ── 팀 정체성 편집 ──────────────────────────────────

  function openIdentityModal() {
    // 표시 텍스트에서 kw 마크업을 걷어내고 원본 [[...]] 형식으로 복원
    const rawMission = document.getElementById('missionDisplay').textContent;
    // innerHTML에서 span.kw 태그를 [[...]] 로 복원
    const htmlMission = document.getElementById('missionDisplay').innerHTML;
    const restored = htmlMission
      .replace(/<span class="kw">(.+?)<\/span>/g, '[[$1]]')
      .replace(/&amp;/g, '&')
      .replace(/&lt;/g, '<')
      .replace(/&gt;/g, '>')
      .replace(/&quot;/g, '"');
    document.getElementById('missionInput').value = restored;
    document.getElementById('visionInput').value = document.getElementById('visionDisplay').textContent;
    openModal('identityModal');
  }

  async function saveIdentity() {
    const mission = document.getElementById('missionInput').value.trim();
    const vision  = document.getElementById('visionInput').value.trim();
    if (!mission) { Portal.showToast('팀 정체성을 입력해주세요.', 'warning'); return; }

    const user = RBAC.getCurrentUser();
    const res = await fetch('tables/team_identity/default', {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ mission, vision, updated_by: user?.user_id || '' })
    });

    if (res.ok) {
      closeModal('identityModal');
      Portal.showToast('팀 정체성이 저장되었습니다.', 'success');
      loadPage();
    } else {
      Portal.showToast('저장에 실패했습니다.', 'error');
    }
  }

  // ── 핵심가치 편집 ────────────────────────────────────

  let _cvCache = {};

  async function openEditCvModal(id) {
    if (!isLeader) return;
    const res = await fetch(`tables/core_values/${id}`);
    if (!res.ok) return;
    const cv = await res.json();
    _cvCache[id] = cv;

    document.getElementById('cvModalTitle').innerHTML =
      `<i class="fas fa-star" style="color:#f59e0b;margin-right:8px;"></i>핵심가치 수정`;
    document.getElementById('cvId').value = id;
    document.getElementById('cvTitle').value = cv.title || '';
    document.getElementById('cvDesc').value  = cv.description || '';
    document.getElementById('cvIcon').value  = cv.icon  || 'fa-shield-alt';
    document.getElementById('cvColor').value = cv.color || 'blue';
    document.getElementById('cvDeleteBtn').classList.remove('hidden');
    openModal('cvModal');
  }

  function openAddCvModal() {
    document.getElementById('cvModalTitle').innerHTML =
      `<i class="fas fa-plus" style="color:#4f86f7;margin-right:8px;"></i>핵심가치 추가`;
    document.getElementById('cvId').value = '';
    document.getElementById('cvTitle').value = '';
    document.getElementById('cvDesc').value  = '';
    document.getElementById('cvIcon').value  = 'fa-shield-alt';
    document.getElementById('cvColor').value = 'blue';
    document.getElementById('cvDeleteBtn').classList.add('hidden');
    openModal('cvModal');
  }

  async function saveCv() {
    const id    = document.getElementById('cvId').value;
    const title = document.getElementById('cvTitle').value.trim();
    const desc  = document.getElementById('cvDesc').value.trim();
    const icon  = document.getElementById('cvIcon').value;
    const color = document.getElementById('cvColor').value;

    if (!title || !desc) { Portal.showToast('제목과 설명을 모두 입력해주세요.', 'warning'); return; }

    const payload = { title, description: desc, icon, color };
    const url     = id ? `tables/core_values/${id}` : 'tables/core_values';
    const method  = id ? 'PATCH' : 'POST';

    const res = await fetch(url, {
      method,
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    if (res.ok) {
      closeModal('cvModal');
      Portal.showToast(id ? '핵심가치가 수정되었습니다.' : '핵심가치가 추가되었습니다.', 'success');
      loadPage();
    } else {
      Portal.showToast('저장에 실패했습니다.', 'error');
    }
  }

  async function deleteCv() {
    const id = document.getElementById('cvId').value;
    if (!id) return;
    Portal.confirm('이 핵심가치를 삭제하시겠습니까?', async () => {
      const res = await fetch(`tables/core_values/${id}`, { method: 'DELETE' });
      if (res.ok) {
        closeModal('cvModal');
        Portal.showToast('삭제되었습니다.', 'success');
        loadPage();
      } else {
        Portal.showToast('삭제에 실패했습니다.', 'error');
      }
    });
  }

  // ── 모달 유틸 ────────────────────────────────────────

  function openModal(id)  { document.getElementById(id).classList.add('show'); }
  function closeModal(id) { document.getElementById(id).classList.remove('show'); }

  document.querySelectorAll('.modal-overlay').forEach(overlay => {
    overlay.addEventListener('click', e => {
      if (e.target === overlay) overlay.classList.remove('show');
    });
  });

  loadPage();
</script>
</body>
</html>
