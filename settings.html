<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>룰 설정 - 계리결산팀 운영관리포탈</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/main.css?v=23">
  <style>
    .tabs { display:flex; gap:4px; border-bottom:2px solid #e5e7eb; margin-bottom:20px; flex-wrap:wrap; }
    .tab { padding:10px 18px; background:none; border:none; font-size:14px; font-weight:600;
      color:#6b7280; cursor:pointer; border-bottom:3px solid transparent; margin-bottom:-2px; }
    .tab.active { color:#4f86f7; border-bottom-color:#4f86f7; }
    .tab-panel { display:none; }
    .tab-panel.active { display:block; }

    .settings-table { width:100%; border-collapse:collapse; background:#fff; border-radius:10px; overflow:hidden; }
    .settings-table th { background:#f9fafb; padding:10px 12px; font-size:12px; font-weight:700;
      color:#374151; text-align:left; border-bottom:1.5px solid #e5e7eb; }
    .settings-table td { padding:8px 12px; font-size:13px; color:#374151;
      border-bottom:1px solid #f3f4f6; vertical-align:middle; }
    .settings-table tr:last-child td { border-bottom:none; }
    .settings-table input, .settings-table select { width:100%; padding:5px 8px; font-size:13px;
      border:1px solid #e5e7eb; border-radius:6px; }
    .settings-table input[type=number] { width:80px; }
    .settings-table .col-act { width:80px; text-align:center; }

    .btn-mini { padding:4px 10px; font-size:12px; border-radius:6px; border:1px solid #e5e7eb;
      background:#fff; cursor:pointer; font-weight:600; color:#374151; }
    .btn-mini:hover { border-color:#4f86f7; color:#4f86f7; }
    .btn-mini.danger:hover { border-color:#ef4444; color:#ef4444; }
    .btn-mini.primary { background:#4f86f7; color:#fff; border-color:#4f86f7; }
    .btn-mini.primary:hover { background:#3a6fd8; }

    .panel-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
    .panel-header h2 { font-size:16px; font-weight:700; color:#111827; margin:0; }
    .panel-desc { font-size:12px; color:#9ca3af; margin-top:4px; }
    .access-warn { background:#fef2f2; border:1.5px solid #fecaca; color:#991b1b;
      padding:14px 18px; border-radius:10px; font-size:14px; margin:24px; }

    .table-scroll { overflow-x:auto; -webkit-overflow-scrolling:touch; border-radius:10px; }
    .settings-table { min-width:560px; }

    /* 마이그레이션 탭 전용 */
    .mig-stat-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:20px; }
    .mig-stat-card { background:#fff; border:1.5px solid #e5e7eb; border-radius:12px; padding:16px 20px; text-align:center; }
    .mig-stat-label { font-size:11px; color:#9ca3af; font-weight:500; margin-bottom:6px; }
    .mig-stat-val { font-size:26px; font-weight:800; }
    .mig-stat-val.blue   { color:#3b82f6; }
    .mig-stat-val.orange { color:#f59e0b; }
    .mig-stat-val.green  { color:#10b981; }
    .est-chip-small { display:inline-flex; align-items:center; padding:1px 7px; border-radius:10px;
      font-size:10px; font-weight:700; background:#dbeafe; color:#1d4ed8; white-space:nowrap; }
    .mig-list { display:flex; flex-direction:column; gap:8px; }
    .mig-item { display:grid; grid-template-columns:80px 1fr 1fr 70px 80px auto;
      gap:8px; align-items:center; padding:10px 12px;
      background:#f9fafb; border-radius:10px; border:1px solid #f3f4f6; font-size:13px; }
    .mig-item:hover { background:#f3f4f6; }
    .mig-danger-zone { margin-top:28px; padding:16px 20px; background:#fef2f2;
      border:1.5px solid #fecaca; border-radius:12px; }
    .mig-danger-title { font-size:14px; font-weight:700; color:#991b1b; margin-bottom:10px; }
    .mig-danger-desc { font-size:12px; color:#b91c1c; line-height:1.7; margin-bottom:14px; }
    @media(max-width:640px) {
      .mig-stat-grid { grid-template-columns:1fr 1fr; }
      .mig-item { grid-template-columns:1fr 1fr; grid-template-rows:auto auto auto; }
    }

    /* 모바일: 표 → 카드 형태로 변환 */
    @media (max-width: 640px) {
      .settings-table, .settings-table thead, .settings-table tbody,
      .settings-table tr, .settings-table th, .settings-table td { display:block; }
      .settings-table { min-width:0; }
      .settings-table thead { display:none; }
      .settings-table tr { background:#fff; border:1.5px solid #e5e7eb; border-radius:10px;
        padding:10px 12px; margin-bottom:10px; }
      .settings-table td { border:none; padding:6px 0; display:flex;
        align-items:center; gap:10px; font-size:13px; }
      .settings-table td::before { content: attr(data-label); flex:0 0 90px;
        font-size:11px; font-weight:700; color:#9ca3af; }
      .settings-table td input, .settings-table td select { flex:1; width:auto; }
      .settings-table td.col-act { justify-content:flex-end; padding-top:10px;
        border-top:1px dashed #f3f4f6; margin-top:6px; }
      .settings-table td.col-act::before { display:none; }
      .tabs { font-size:13px; overflow-x:auto; flex-wrap:nowrap; -webkit-overflow-scrolling:touch; }
      .tab { white-space:nowrap; padding:9px 12px; font-size:13px; }
      .panel-header { flex-direction:column; align-items:flex-start; gap:8px; }
    }
  </style>
</head>
<body>
<div class="app-layout">
  <div id="sidebar"></div>
  <div class="main-content">
    <header class="page-header">
      <h1 class="page-title"><i class="fas fa-sliders-h"></i> 룰 설정</h1>
    </header>
    <main class="content-body">
      <div id="rootMount"></div>
    </main>
  </div>
</div>

<script src="js/rbac.js"></script>
<script src="js/auth.js"></script>
<script src="js/portal.js?v=23"></script>
<script>
if (!Portal.init()) throw 'AUTH';

const user = RBAC.getCurrentUser();
if (user.role !== 'team_leader') {
  document.getElementById('rootMount').innerHTML =
    '<div class="access-warn"><i class="fas fa-lock"></i> 룰 설정은 팀장만 접근할 수 있습니다.</div>';
  throw 'ACCESS_DENIED';
}

const root = document.getElementById('rootMount');
root.innerHTML = `
  <div class="tabs">
    <button class="tab active" data-tab="settle">결산업무 (26)</button>
    <button class="tab" data-tab="score">점수 규칙</button>
    <button class="tab" data-tab="kpi">KPI 정의</button>
    <button class="tab" data-tab="cat">기타 카테고리</button>
    <button class="tab" data-tab="issue-cat">이슈 카테고리</button>
    <button class="tab" data-tab="migration">마이그레이션</button>
  </div>

  <div class="tab-panel active" id="panel-settle">
    <div class="panel-header">
      <div>
        <h2>결산업무 항목</h2>
        <div class="panel-desc">SETTLE_SCHEDULE — 결산캘린더 / 체크리스트의 마감일 기준</div>
      </div>
      <button class="btn-mini primary" onclick="addSettleItem()"><i class="fas fa-plus"></i> 항목 추가</button>
    </div>
    <div class="table-scroll">
    <table class="settings-table" id="tbl-settle">
      <thead><tr>
        <th style="width:70px;">순서</th><th>업무명</th><th style="width:140px;">그룹</th>
        <th style="width:110px;">D+영업일</th><th style="width:160px;">담당자</th>
        <th style="width:80px;">활성</th><th class="col-act">관리</th>
      </tr></thead>
      <tbody></tbody>
    </table>
    </div>
  </div>

  <div class="tab-panel" id="panel-score">
    <div class="panel-header">
      <div>
        <h2>점수 규칙</h2>
        <div class="panel-desc">기한준수 / CSM / 지시수행 / 임원회의 — 임계값별 점수</div>
      </div>
      <button class="btn-mini primary" onclick="addScoreRule()"><i class="fas fa-plus"></i> 규칙 추가</button>
    </div>
    <div class="table-scroll">
    <table class="settings-table" id="tbl-score">
      <thead><tr>
        <th style="width:140px;">규칙 유형</th><th style="width:120px;">임계값</th>
        <th style="width:100px;">점수</th><th>설명</th><th class="col-act">관리</th>
      </tr></thead>
      <tbody></tbody>
    </table>
    </div>
  </div>

  <div class="tab-panel" id="panel-kpi">
    <div class="panel-header">
      <div>
        <h2>KPI 정의</h2>
        <div class="panel-desc">연도별 KPI 1~3 라벨 + 정량/정성 가중치 (%)</div>
      </div>
      <button class="btn-mini primary" onclick="addKpi()"><i class="fas fa-plus"></i> KPI 추가</button>
    </div>
    <div class="table-scroll">
    <table class="settings-table" id="tbl-kpi">
      <thead><tr>
        <th style="width:80px;">연도</th><th style="width:100px;">코드</th>
        <th>라벨</th><th style="width:100px;">가중치(%)</th>
        <th style="width:110px;">분류</th><th style="width:80px;">활성</th>
        <th class="col-act">관리</th>
      </tr></thead>
      <tbody></tbody>
    </table>
    </div>
  </div>

  <div class="tab-panel" id="panel-cat">
    <div class="panel-header">
      <div>
        <h2>기타 카테고리</h2>
        <div class="panel-desc">개인별 업무입력의 비결산 카테고리 드롭다운</div>
      </div>
      <button class="btn-mini primary" onclick="addCat()"><i class="fas fa-plus"></i> 카테고리 추가</button>
    </div>
    <div class="table-scroll">
    <table class="settings-table" id="tbl-cat">
      <thead><tr>
        <th style="width:100px;">순서</th><th>카테고리명</th>
        <th style="width:80px;">활성</th><th class="col-act">관리</th>
      </tr></thead>
      <tbody></tbody>
    </table>
    </div>
  </div>

  <div class="tab-panel" id="panel-issue-cat">
    <div class="panel-header">
      <div>
        <h2>이슈 카테고리</h2>
        <div class="panel-desc">이슈 사례집의 카테고리 드롭다운 (kb-issues.html 필터 및 등록 모달)</div>
      </div>
      <button class="btn-mini primary" onclick="addIssueCat()"><i class="fas fa-plus"></i> 카테고리 추가</button>
    </div>
    <div class="table-scroll">
    <table class="settings-table" id="tbl-issue-cat">
      <thead><tr>
        <th style="width:100px;">순서</th><th>카테고리명</th>
        <th style="width:80px;">활성</th><th class="col-act">관리</th>
      </tr></thead>
      <tbody></tbody>
    </table>
    </div>
  </div>

  <div class="tab-panel" id="panel-migration">
    <div class="panel-header">
      <div>
        <h2>시간대 마이그레이션 도구</h2>
        <div class="panel-desc">daily_work_entries — 추정값 현황 및 보정 관리</div>
      </div>
      <button class="btn-mini" onclick="loadMigration()"><i class="fas fa-sync-alt"></i> 새로고침</button>
    </div>

    <!-- 현황 카드 -->
    <div class="mig-stat-grid" id="migStatGrid">
      <div class="mig-stat-card">
        <div class="mig-stat-label">전체 항목</div>
        <div class="mig-stat-val blue" id="migTotal">-</div>
      </div>
      <div class="mig-stat-card">
        <div class="mig-stat-label">추정값 (보정 전)</div>
        <div class="mig-stat-val orange" id="migEstCount">-</div>
      </div>
      <div class="mig-stat-card">
        <div class="mig-stat-label">사용자 보정 완료</div>
        <div class="mig-stat-val green" id="migDoneCount">-</div>
      </div>
    </div>

    <!-- 추정 항목 리스트 -->
    <div class="panel-header" style="margin-bottom:10px;">
      <div>
        <h2 style="font-size:14px;">추정 항목 목록 <span style="font-size:12px;color:#9ca3af;font-weight:400;">(is_estimated=true)</span></h2>
      </div>
    </div>
    <div id="migList">
      <div style="text-align:center;padding:32px;color:#9ca3af;"><i class="fas fa-spinner fa-spin"></i> 로딩 중...</div>
    </div>

    <!-- 위험 구역 -->
    <div class="mig-danger-zone">
      <div class="mig-danger-title"><i class="fas fa-exclamation-triangle" style="margin-right:6px;"></i>위험 구역 — 재마이그레이션</div>
      <div class="mig-danger-desc">
        모든 daily_work_entries 항목의 time_entries를 비우고 duration_minutes 기준으로 재분산합니다.<br>
        이 작업은 사용자가 수동 보정한 시간 정보를 덮어씁니다. 실행 전 반드시 DB 백업을 확인하세요.
      </div>
      <button class="btn-mini danger" onclick="remigrate()" style="border-color:#ef4444;color:#ef4444;">
        <i class="fas fa-redo"></i> 전체 재마이그레이션 실행
      </button>
    </div>
  </div>
`;

document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
    // 마이그레이션 탭 최초 진입 시 자동 로드
    if (btn.dataset.tab === 'migration') loadMigration();
  });
});

// ───────── 공용 API ─────────
async function apiList(table) {
  const r = await fetch(`/tables/${table}?limit=500`);
  const d = await r.json();
  return d.rows || d.data || [];
}
async function apiCreate(table, body) {
  const r = await fetch(`/tables/${table}`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  return r.json();
}
async function apiUpdate(table, id, body) {
  const r = await fetch(`/tables/${table}/${id}`, {
    method: 'PATCH', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  return r.json();
}
async function apiDelete(table, id) {
  await fetch(`/tables/${table}/${id}`, { method: 'DELETE' });
}

const SETTLE_GROUPS = ['계약/준비금','모델/가정','부채산출','ETL/데이터','재보험','무브먼트/전송'];

// ───────── 결산업무 ─────────
async function loadSettle() {
  const rows = (await apiList('settle_items')).sort((a,b)=>(a.seq||0)-(b.seq||0));
  const tbody = document.querySelector('#tbl-settle tbody');
  tbody.innerHTML = rows.map(r => `
    <tr data-id="${r.id}">
      <td data-label="순서"><input type="number" data-f="seq" value="${r.seq||''}"></td>
      <td data-label="업무명"><input type="text" data-f="label" value="${escapeHtml(r.label||'')}"></td>
      <td data-label="그룹">
        <select data-f="group_name">
          ${SETTLE_GROUPS.map(g=>`<option value="${g}" ${r.group_name===g?'selected':''}>${g}</option>`).join('')}
        </select>
      </td>
      <td data-label="D+영업일"><input type="number" data-f="due_biz_day" value="${r.due_biz_day??''}" placeholder="없음"></td>
      <td data-label="담당자"><input type="text" data-f="assignee" value="${escapeHtml(r.assignee||'')}"></td>
      <td data-label="활성" style="text-align:center;"><input type="checkbox" data-f="is_active" ${r.is_active!==false?'checked':''}></td>
      <td class="col-act">
        <button class="btn-mini" onclick="saveRow('settle_items', this)">저장</button>
        <button class="btn-mini danger" onclick="delRow('settle_items', this, loadSettle)">삭제</button>
      </td>
    </tr>`).join('');
}
async function addSettleItem() {
  const list = await apiList('settle_items');
  const nextSeq = list.length + 1;
  await apiCreate('settle_items', {
    id: `s${String(nextSeq).padStart(2,'0')}`,
    seq: nextSeq, label: '신규 업무', group_name: SETTLE_GROUPS[0],
    due_biz_day: 10, assignee: '', is_active: true
  });
  await loadSettle();
}

// ───────── 점수 규칙 (rule_type은 kpi_definitions(quant)에서 동적 로드) ─────────
let RULE_TYPES = []; // [[code, label], ...]
async function loadRuleTypes() {
  const kpis = await apiList('kpi_definitions');
  const curYear = new Date().getFullYear();
  RULE_TYPES = kpis
    .filter(k => k.is_active !== false && k.category === 'quant' && k.year === curYear)
    .sort((a,b) => (a.code||'').localeCompare(b.code||''))
    .map(k => [k.code, `${k.label} (${k.weight_pct}%)`]);
}
async function loadScore() {
  await loadRuleTypes();
  const rows = await apiList('score_rules');
  rows.sort((a,b)=> a.rule_type.localeCompare(b.rule_type) || (b.threshold||0)-(a.threshold||0));
  const tbody = document.querySelector('#tbl-score tbody');
  if (!RULE_TYPES.length) {
    tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;color:#9ca3af;padding:24px;">
      KPI 정의 탭에서 정량 KPI를 먼저 추가해주세요.</td></tr>`;
    return;
  }
  tbody.innerHTML = rows.map(r => {
    const known = RULE_TYPES.some(([v]) => v === r.rule_type);
    const orphanOpt = known ? '' : `<option value="${escapeHtml(r.rule_type)}" selected>(미정의: ${escapeHtml(r.rule_type)})</option>`;
    return `
    <tr data-id="${r.id}">
      <td data-label="규칙 유형">
        <select data-f="rule_type">
          ${orphanOpt}
          ${RULE_TYPES.map(([v,l])=>`<option value="${v}" ${r.rule_type===v?'selected':''}>${l}</option>`).join('')}
        </select>
      </td>
      <td data-label="임계값"><input type="number" data-f="threshold" value="${r.threshold??0}"></td>
      <td data-label="점수"><input type="number" data-f="score" value="${r.score??0}"></td>
      <td data-label="설명"><input type="text" data-f="label" value="${escapeHtml(r.label||'')}"></td>
      <td class="col-act">
        <button class="btn-mini" onclick="saveRow('score_rules', this)">저장</button>
        <button class="btn-mini danger" onclick="delRow('score_rules', this, loadScore)">삭제</button>
      </td>
    </tr>`;
  }).join('');
}
async function addScoreRule() {
  await loadRuleTypes();
  if (!RULE_TYPES.length) {
    Portal.showToast('KPI 정의 탭에서 정량 KPI를 먼저 추가하세요.', 'error');
    return;
  }
  await apiCreate('score_rules', { rule_type: RULE_TYPES[0][0], threshold:0, score:80, label:'' });
  await loadScore();
}

// ───────── KPI ─────────
async function loadKpi() {
  const rows = (await apiList('kpi_definitions'))
    .sort((a,b)=> (b.year||0)-(a.year||0) || (a.code||'').localeCompare(b.code||''));
  const tbody = document.querySelector('#tbl-kpi tbody');
  tbody.innerHTML = rows.map(r => `
    <tr data-id="${r.id}">
      <td data-label="연도"><input type="number" data-f="year" value="${r.year||new Date().getFullYear()}"></td>
      <td data-label="코드"><input type="text" data-f="code" value="${escapeHtml(r.code||'')}"></td>
      <td data-label="라벨"><input type="text" data-f="label" value="${escapeHtml(r.label||'')}"></td>
      <td data-label="가중치(%)"><input type="number" data-f="weight_pct" value="${r.weight_pct??0}"></td>
      <td data-label="분류">
        <select data-f="category">
          <option value="qual" ${r.category==='qual'?'selected':''}>정성(KPI)</option>
          <option value="quant" ${r.category==='quant'?'selected':''}>정량</option>
        </select>
      </td>
      <td data-label="활성" style="text-align:center;"><input type="checkbox" data-f="is_active" ${r.is_active!==false?'checked':''}></td>
      <td class="col-act">
        <button class="btn-mini" onclick="saveRow('kpi_definitions', this)">저장</button>
        <button class="btn-mini danger" onclick="delRow('kpi_definitions', this, loadKpi)">삭제</button>
      </td>
    </tr>`).join('');
}
async function addKpi() {
  const year = new Date().getFullYear();
  await apiCreate('kpi_definitions', {
    year, code:'new', label:'신규 KPI', weight_pct:10, category:'qual', is_active:true
  });
  await loadKpi();
}

// ───────── 카테고리 ─────────
async function loadCat() {
  const rows = (await apiList('task_categories')).sort((a,b)=>(a.sort_order||0)-(b.sort_order||0));
  const tbody = document.querySelector('#tbl-cat tbody');
  tbody.innerHTML = rows.map(r => `
    <tr data-id="${r.id}">
      <td data-label="순서"><input type="number" data-f="sort_order" value="${r.sort_order||0}"></td>
      <td data-label="카테고리명"><input type="text" data-f="label" value="${escapeHtml(r.label||'')}"></td>
      <td data-label="활성" style="text-align:center;"><input type="checkbox" data-f="is_active" ${r.is_active!==false?'checked':''}></td>
      <td class="col-act">
        <button class="btn-mini" onclick="saveRow('task_categories', this)">저장</button>
        <button class="btn-mini danger" onclick="delRow('task_categories', this, loadCat)">삭제</button>
      </td>
    </tr>`).join('');
}
async function addCat() {

  await apiCreate('task_categories', {
    label: '신규 카테고리', sort_order: list.length + 1, is_active: true

// ───────── 행 저장/삭제 공통 ─────────
function rowToBody(tr) {
  const body = {};
  tr.querySelectorAll('[data-f]').forEach(el => {
    const f = el.dataset.f;
    if (el.type === 'checkbox') body[f] = el.checked;
    else if (el.type === 'number') {
      const v = el.value.trim();
      body[f] = v === '' ? null : Number(v);
    }
    else body[f] = el.value;
  });
  return body;
}
async function saveRow(table, btn) {
  const tr = btn.closest('tr');
  const id = tr.dataset.id;
  const body = rowToBody(tr);
  await apiUpdate(table, id, body);
  Portal.showToast('저장 완료', 'success');
  // 연관 테이블 자동 새로고침: KPI 정의 변경 → 점수규칙 rule_type 갱신
  if (table === 'kpi_definitions') await loadScore();
}
async function delRow(table, btn, reload) {
  if (!confirm('삭제하시겠습니까?')) return;
  const tr = btn.closest('tr');
  await apiDelete(table, tr.dataset.id);
  Portal.showToast('삭제 완료', 'success');
  await reload();
  if (table === 'kpi_definitions') await loadScore();
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// 초기 로드
loadSettle(); loadScore(); loadKpi(); loadCat(); loadIssueCat();

// ───────── 마이그레이션 도구 ─────────
let _migData = [];

async function loadMigration() {
  document.getElementById('migTotal').textContent    = '...';
  document.getElementById('migEstCount').textContent = '...';
  document.getElementById('migDoneCount').textContent= '...';
  document.getElementById('migList').innerHTML =
    '<div style="text-align:center;padding:32px;color:#9ca3af;"><i class="fas fa-spinner fa-spin"></i> 로딩 중...</div>';

  try {
    const r = await fetch('/tables/daily_work_entries?limit=1000');
    const d = await r.json();
    _migData = (d.rows || d.data || []);
    const total   = _migData.length;
    const estRows = _migData.filter(x => x.is_estimated === true || x.is_estimated === 1);
    const doneRows = _migData.filter(x => x.is_estimated === false || x.is_estimated === 0);
    document.getElementById('migTotal').textContent     = total + '건';
    document.getElementById('migEstCount').textContent  = estRows.length + '건';
    document.getElementById('migDoneCount').textContent = doneRows.length + '건';
    renderMigList(estRows);
  } catch(e) {
    document.getElementById('migList').innerHTML =
      '<div style="color:#ef4444;padding:16px;">데이터를 불러오지 못했습니다.</div>';
  }
}

function renderMigList(rows) {
  const container = document.getElementById('migList');
  if (!rows.length) {
    container.innerHTML = '<div style="text-align:center;padding:32px;color:#9ca3af;">추정 항목이 없습니다. 모든 항목이 보정 완료 상태입니다.</div>';
    return;
  }
  container.innerHTML = `<div class="mig-list">` +
    rows.map(r => {
      const sd = r.start_date || r.work_date || '-';
      const ed = r.end_date   || r.work_date || sd;
      const period = sd === ed ? sd : `${sd} ~ ${ed}`;
      const totalMin = r.total_minutes || r.duration_minutes || 0;
      const h = Math.floor(totalMin / 60), m = totalMin % 60;
      const dur = h > 0 ? `${h}h${m > 0 ? ' ' + m + 'm' : ''}` : `${m}m`;
      return `<div class="mig-item" data-id="${r.id}">
        <span style="font-size:12px;font-weight:600;color:#374151;">${r.member_name || '-'}</span>
        <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${escapeHtml(r.task_label||'')}">${escapeHtml(r.task_label || '-')}</span>
        <span style="font-size:12px;color:#6b7280;">${period}</span>
        <span style="font-size:12px;font-weight:700;color:#4f86f7;">${dur}</span>
        <span><span class="est-chip-small">추정</span></span>
        <button class="btn-mini" onclick="openMigEditModal(${r.id})"><i class="fas fa-pen"></i> 수정</button>
      </div>`;
    }).join('') + `</div>`;
}

function openMigEditModal(id) {
  const row = _migData.find(x => x.id === id);
  if (!row) return;

  // 간단한 시간 편집 모달 (인라인 alert/prompt 대신 Portal confirm 활용)
  const sd = row.start_date || row.work_date || '';
  const ed = row.end_date   || row.work_date || sd;
  const st = row.time_entries?.[0]?.start || '09:00';
  const et = row.time_entries?.[row.time_entries.length-1]?.end || '18:00';

  // 모달 DOM 생성
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay show';
  overlay.id = 'migEditOverlay';
  overlay.innerHTML = `
    <div style="background:#fff;border-radius:16px;width:440px;max-width:95vw;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,.2);">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;">
        <span style="font-size:16px;font-weight:700;color:#111827;">시간대 보정 — ${escapeHtml(row.task_label || '')}</span>
        <button onclick="document.getElementById('migEditOverlay').remove()"
          style="border:none;background:#f3f4f6;width:36px;height:36px;border-radius:8px;cursor:pointer;font-size:14px;color:#6b7280;">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;">
        <div>
          <label style="font-size:12px;font-weight:700;color:#374151;display:block;margin-bottom:4px;">시작일</label>
          <input type="date" id="mig_sd_${id}" value="${sd}" style="width:100%;padding:8px 10px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:13px;font-family:inherit;box-sizing:border-box;">
        </div>
        <div>
          <label style="font-size:12px;font-weight:700;color:#374151;display:block;margin-bottom:4px;">종료일</label>
          <input type="date" id="mig_ed_${id}" value="${ed}" style="width:100%;padding:8px 10px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:13px;font-family:inherit;box-sizing:border-box;">
        </div>
        <div>
          <label style="font-size:12px;font-weight:700;color:#374151;display:block;margin-bottom:4px;">시작시간</label>
          <select id="mig_st_${id}" style="width:100%;padding:8px 10px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:13px;font-family:inherit;">
            ${buildMigTimeOpts(st)}
          </select>
        </div>
        <div>
          <label style="font-size:12px;font-weight:700;color:#374151;display:block;margin-bottom:4px;">종료시간</label>
          <select id="mig_et_${id}" style="width:100%;padding:8px 10px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:13px;font-family:inherit;">
            ${buildMigTimeOpts(et)}
          </select>
        </div>
      </div>
      <div style="display:flex;justify-content:flex-end;gap:10px;">
        <button onclick="document.getElementById('migEditOverlay').remove()"
          style="padding:9px 18px;border-radius:9px;border:1.5px solid #e5e7eb;background:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;">취소</button>
        <button onclick="saveMigEdit(${id})"
          style="padding:9px 20px;border-radius:9px;border:none;background:#4f86f7;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;">보정 저장</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
}

function buildMigTimeOpts(selected) {
  const opts = [];
  for (let m = 360; m <= 1320; m += 30) {
    const hh = String(Math.floor(m/60)).padStart(2,'0');
    const mm = String(m%60).padStart(2,'0');
    const v = `${hh}:${mm}`;
    opts.push(`<option value="${v}"${v === selected ? ' selected' : ''}>${v}</option>`);
  }
  return opts.join('');
}

async function saveMigEdit(id) {
  const sd = document.getElementById(`mig_sd_${id}`)?.value;
  const ed = document.getElementById(`mig_ed_${id}`)?.value;
  const st = document.getElementById(`mig_st_${id}`)?.value;
  const et = document.getElementById(`mig_et_${id}`)?.value;
  if (!sd || !st || !et) { Portal.showToast('모든 필드를 입력해주세요.', 'error'); return; }
  try {
    const r = await fetch(`/tables/daily_work_entries/${id}`, {
      method: 'PUT', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ start_date: sd, end_date: ed || sd,
        start_time: st, end_time: et, is_estimated: false })
    });
    if (!r.ok) throw new Error(`PUT 실패 (${r.status})`);
    document.getElementById('migEditOverlay')?.remove();
    Portal.showToast('보정이 저장되었습니다.', 'success');
    await loadMigration();
  } catch(e) {
    Portal.showToast('저장 중 오류: ' + e.message, 'error');
  }
}

async function remigrate() {
  if (!confirm('모든 daily_work_entries의 time_entries를 초기화하고 재분산합니다.\n이 작업은 되돌릴 수 없습니다.\n\n정말 실행하시겠습니까?')) return;
  if (!confirm('마지막 확인: DB 백업 여부를 확인하셨습니까? 계속하면 수동 보정 내용이 지워집니다.')) return;
  try {
    // 서버 재마이그레이션 API 호출 (존재하면 사용, 없으면 안내)
    const r = await fetch('/api/tasks/remigrate', {
      method: 'POST', headers: {'Content-Type':'application/json'}, body: '{}'
    });
    if (r.ok) {
      Portal.showToast('재마이그레이션이 완료되었습니다.', 'success');
      await loadMigration();
    } else if (r.status === 404) {
      Portal.showToast('재마이그레이션 API가 아직 구현되지 않았습니다. 서버 담당자에게 문의하세요.', 'warning');
    } else {
      throw new Error(`서버 오류 (${r.status})`);
    }
  } catch(e) {
    Portal.showToast('오류: ' + e.message, 'error');
  }
}
</script>
