<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>성과 관리 - 계리결산팀 운영관리포탈</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/main.css?v=20">
  <style>
    /* Toolbar */
    .toolbar { display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-bottom:20px; }
    .toolbar-spacer { flex:1; }
    .sel-group { display:flex; gap:8px; }
    .year-sel { padding:8px 14px; border:1.5px solid #e5e7eb; border-radius:10px;
      font-size:14px; color:#374151; font-family:inherit; background:#fff; cursor:pointer; }
    .month-btns { display:flex; gap:4px; flex-wrap:wrap; }
    .month-btn { padding:7px 11px; border:1.5px solid #e5e7eb; border-radius:8px; background:#fff;
      font-size:13px; font-weight:600; color:#6b7280; cursor:pointer; transition:all .15s; }
    .month-btn:hover { border-color:#4f86f7; color:#4f86f7; }
    .month-btn.active { background:#4f86f7; border-color:#4f86f7; color:#fff; }
    .weight-label { color:#111827; font-weight:700; font-size:12px; }

    /* View tabs */
    .view-tabs { display:flex; gap:0; border-bottom:2px solid #e5e7eb; margin-bottom:24px; }
    .view-tab { padding:10px 24px; font-size:14px; font-weight:600; color:#6b7280; cursor:pointer;
      border-bottom:3px solid transparent; margin-bottom:-2px; transition:all .2s; display:flex; align-items:center; gap:8px; }
    .view-tab:hover { color:#374151; }
    .view-tab.active { color:#4f86f7; border-bottom-color:#4f86f7; }

    /* ── 팀 종합표 ── */
    .table-card { background:#fff; border-radius:16px; border:1.5px solid #e5e7eb; overflow:hidden; }
    .table-scroll { overflow-x:auto; }
    .perf-table { width:100%; border-collapse:collapse; font-size:13px; min-width:1100px; }
    .perf-table th { background:#f9fafb; font-size:11px; font-weight:700; color:#6b7280;
      padding:10px 12px; text-align:center; border-bottom:2px solid #e5e7eb;
      white-space:nowrap; position:sticky; top:0; z-index:1; }
    .perf-table th.left { text-align:left; }
    .perf-table td { padding:11px 12px; text-align:center; border-bottom:1px solid #f3f4f6;
      color:#374151; white-space:nowrap; }
    .perf-table td.name-cell { text-align:left; font-weight:600; color:#111827; }
    .perf-table tr:hover td { background:#f9fafb; }
    .perf-table tr:last-child td { border-bottom:none; }
    .score-cell { font-weight:700; }
    .score-high  { color:#10b981; }
    .score-mid   { color:#3b82f6; }
    .score-low   { color:#f59e0b; }
    .score-null  { color:#d1d5db; font-weight:400; font-style:italic; }
    .bonus-dot { display:inline-block; width:8px; height:8px; border-radius:50%; }
    .bonus-y { background:#10b981; }
    .bonus-n { background:#e5e7eb; }
    .grade-badge { display:inline-block; width:26px; height:26px; border-radius:8px;
      font-size:13px; font-weight:800; line-height:26px; text-align:center; }
    .grade-S { background:#fef9c3; color:#854d0e; }
    .grade-A { background:#dcfce7; color:#166534; }
    .grade-B { background:#dbeafe; color:#1e40af; }
    .grade-C { background:#ede9fe; color:#5b21b6; }
    .grade-D { background:#fee2e2; color:#991b1b; }
    .col-section { border-left:2px solid #e5e7eb; }
    .col-section-end { border-right:2px solid #e5e7eb; }
    .weight-row th { background:#f3f4f6; font-size:10px; color:#9ca3af; padding:5px 12px; }
    .final-col { background:#fffbeb !important; }
    .final-col td { background:#fffbeb; }
    .table-header { display:flex; align-items:center; justify-content:space-between;
      padding:18px 24px 14px; }
    .table-title { font-size:15px; font-weight:700; color:#111827; display:flex; align-items:center; gap:10px; }
    .table-icon { width:32px; height:32px; border-radius:9px; background:#dbeafe;
      color:#1d4ed8; display:flex; align-items:center; justify-content:center; font-size:14px; }
    .table-meta { font-size:12px; color:#9ca3af; margin-left:8px; }

    /* ── 개인 카드 뷰 ── */
    .member-tabs { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:20px; }
    .member-tab { padding:6px 14px; border-radius:16px; border:1.5px solid #e5e7eb; background:#fff;
      font-size:13px; font-weight:600; color:#6b7280; cursor:pointer; transition:all .2s; }
    .member-tab.active { border-color:#4f86f7; background:#4f86f7; color:#fff; }
    .perf-card { background:#fff; border-radius:16px; box-shadow:0 1px 4px rgba(0,0,0,.06);
      border:1px solid #f3f4f6; margin-bottom:20px; overflow:hidden; }
    .perf-card-header { padding:18px 24px; display:flex; justify-content:space-between; align-items:center;
      border-bottom:1px solid #f3f4f6; background:linear-gradient(135deg,#f8faff,#fff); }
    .perf-header-left { display:flex; align-items:center; gap:14px; }
    .quarter-badge { width:52px; height:52px; border-radius:14px; background:linear-gradient(135deg,#4f86f7,#6c5ce7);
      color:#fff; font-size:16px; font-weight:800; display:flex; flex-direction:column;
      align-items:center; justify-content:center; line-height:1.2; flex-shrink:0; }
    .quarter-badge small { font-size:10px; font-weight:500; opacity:.8; }
    .perf-header-meta h3 { font-size:16px; font-weight:700; color:#111827; margin:0 0 4px; }
    .meta-row { display:flex; gap:8px; flex-wrap:wrap; }
    .badge { font-size:11px; font-weight:600; padding:3px 10px; border-radius:10px; }
    .badge-member { background:#eff6ff; color:#3b82f6; }
    .badge-score  { background:#fef9c3; color:#854d0e; }
    .badge-bonus  { background:#dcfce7; color:#166534; }
    .perf-actions { display:flex; gap:6px; }
    .perf-actions button { padding:6px 14px; border-radius:8px; border:none; cursor:pointer;
      font-size:12px; font-weight:600; transition:background .15s; display:flex; align-items:center; gap:4px; }
    .btn-edit-perf { background:#eff6ff; color:#3b82f6; }
    .btn-edit-perf:hover { background:#dbeafe; }
    .btn-del-perf { background:#fef2f2; color:#ef4444; }
    .btn-del-perf:hover { background:#fee2e2; }
    /* 점수 상세 (카드 내) */
    .score-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:0;
      border-top:1px solid #f3f4f6; }
    .score-item { padding:14px 16px; border-right:1px solid #f3f4f6; border-bottom:1px solid #f3f4f6; }
    .score-item:nth-child(4n) { border-right:none; }
    .score-item-label { font-size:11px; color:#9ca3af; font-weight:500; margin-bottom:4px; }
    .score-item-val { font-size:20px; font-weight:800; color:#111827; }
    .score-item-weight { font-size:10px; color:#d1d5db; margin-left:2px; }
    .score-item-val.null-val { font-size:14px; color:#d1d5db; font-style:italic; font-weight:400; }
    .card-bottom { display:grid; grid-template-columns:1fr 1fr; border-top:1px solid #f3f4f6; }
    .card-section { padding:16px 20px; }
    .card-section:first-child { border-right:1px solid #f3f4f6; }
    .card-section-title { font-size:12px; font-weight:700; color:#6b7280; margin-bottom:10px;
      text-transform:uppercase; letter-spacing:.5px; display:flex; align-items:center; gap:6px; }
    .score-display { display:flex; align-items:flex-end; gap:4px; margin-bottom:8px; }
    .score-num { font-size:36px; font-weight:800; line-height:1; }
    .score-num.self { color:#6366f1; }
    .score-num.leader { color:#f59e0b; }
    .score-unit { font-size:13px; color:#9ca3af; margin-bottom:5px; }
    .perf-text { font-size:13px; color:#374151; line-height:1.7; white-space:pre-wrap; }
    .perf-text-empty { font-size:13px; color:#d1d5db; font-style:italic; }
    .card-bonus-row { padding:12px 20px; background:#f9fafb; border-top:1px solid #f3f4f6;
      display:flex; align-items:center; gap:16px; flex-wrap:wrap; }
    .bonus-check-label { display:flex; align-items:center; gap:5px; font-size:13px; font-weight:600;
      color:#374151; cursor:pointer; user-select:none; }
    .bonus-check-label input { width:15px; height:15px; cursor:pointer; accent-color:#4f86f7; }
    .btn-save-bonus { padding:4px 14px; background:#4f86f7; color:#fff; border:none; border-radius:8px;
      font-size:12px; font-weight:600; cursor:pointer; margin-left:auto; }
    .btn-save-bonus:hover { background:#3b72e3; }
    .card-no-record { padding:14px 20px; font-size:13px; color:#9ca3af; font-style:italic; }

    /* Stats row */
    .stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:24px; }
    .stat-card { background:#fff; border-radius:14px; padding:18px 20px; border:1.5px solid #f3f4f6; }
    .stat-label { font-size:12px; color:#9ca3af; font-weight:500; margin-bottom:6px; }
    .stat-value { font-size:26px; font-weight:800; color:#111827; }
    .stat-value.blue { color:#3b82f6; }
    .stat-value.green { color:#10b981; }

    /* Modal */
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:1000;
      align-items:center; justify-content:center; }
    .modal-overlay.open { display:flex; }
    .modal-box { background:#fff; border-radius:20px; width:640px; max-width:96vw; max-height:90vh;
      overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,.2); }
    .modal-header { padding:24px 28px 0; display:flex; justify-content:space-between; align-items:center; }
    .modal-title { font-size:18px; font-weight:700; color:#111827; }
    .modal-close { width:44px; height:44px; border-radius:8px; border:none; background:#f3f4f6;
      cursor:pointer; font-size:14px; color:#6b7280; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .modal-body { padding:20px 28px 28px; }
    .form-group { margin-bottom:14px; }
    .form-label { font-size:13px; font-weight:600; color:#374151; margin-bottom:5px; display:block; }
    .form-input, .form-select, .form-textarea {
      width:100%; padding:9px 12px; border:1.5px solid #e5e7eb; border-radius:10px;
      font-size:14px; color:#111827; background:#fff; font-family:inherit;
      transition:border-color .2s; box-sizing:border-box; }
    .form-input:focus, .form-select:focus, .form-textarea:focus {
      outline:none; border-color:#4f86f7; }
    .form-textarea { resize:vertical; min-height:80px; }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .form-row-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; }
    .section-divider { font-size:13px; font-weight:700; color:#4f86f7; margin:18px 0 10px;
      padding-bottom:6px; border-bottom:2px solid #eff6ff; }
    .modal-footer { display:flex; justify-content:flex-end; gap:10px; padding-top:8px;
      border-top:1px solid #f3f4f6; margin-top:8px; }
    .empty-state { text-align:center; padding:60px 20px; color:#9ca3af; }
    .empty-state i { font-size:48px; margin-bottom:16px; display:block; opacity:.4; }
    @media(max-width:768px){
      .stats-row { grid-template-columns:1fr 1fr; gap:10px; }
      .score-grid { grid-template-columns:repeat(2,1fr); }
      .card-bottom { grid-template-columns:1fr; }
      .card-section:first-child { border-right:none; border-bottom:1px solid #f3f4f6; }
      .form-row,.form-row-3 { grid-template-columns:1fr; }
      /* toolbar 줄바꿈 허용 */
      .toolbar { flex-wrap:wrap; gap:6px; }
      .month-btns { gap:3px; }
      .month-btn { padding:5px 8px; font-size:12px; }
      /* perf-table은 table-scroll 내 가로스크롤 처리 */
      .table-scroll { overflow-x:auto; -webkit-overflow-scrolling:touch; }
      /* 개인 카드 header 세로 정렬 */
      .perf-card-header { flex-direction:column; align-items:flex-start; gap:10px; }
      .perf-header-left { flex-wrap:wrap; }
      .perf-actions { width:100%; justify-content:flex-end; }
      /* modal-box 모바일 */
      .modal-box { width:100% !important; max-width:100% !important; border-radius:20px 20px 0 0; }
      /* table-header 패딩 축소 */
      .table-header { padding:12px 14px 10px; }
      .table-title { font-size:13px; }
    }
    @media(max-width:480px){
      .stats-row { grid-template-columns:1fr 1fr; gap:8px; }
      .score-grid { grid-template-columns:1fr; }
      .score-item-val { font-size:16px; }
      .score-num { font-size:26px; }
      .member-tabs { gap:4px; }
      .member-tab { padding:5px 10px; font-size:12px; }
      .view-tab { padding:8px 12px; font-size:12px; }
    }
  </style>
</head>
<body>
<div class="app-layout">
  <div id="sidebar"></div>
  <div class="main-content">
    <header class="page-header">
      <h1 class="page-title"><i class="fas fa-chart-bar"></i> 성과 관리</h1>
      <div id="addBtnWrap"></div>
    </header>
    <main class="content-body">

      <div class="toolbar">
        <div class="sel-group">
          <select class="year-sel" id="yearSel" onchange="onFilterChange()"></select>
        </div>
        <div class="month-btns" id="monthBtns"></div>
      </div>

      <!-- 통계 -->
      <div class="stats-row">
        <div class="stat-card"><div class="stat-label">평가 인원</div><div class="stat-value" id="statCount">-</div></div>
        <div class="stat-card"><div class="stat-label">평균 최종점수</div><div class="stat-value blue" id="statAvg">-</div></div>
        <div class="stat-card"><div class="stat-label">최고 점수</div><div class="stat-value green" id="statMax">-</div></div>
        <div class="stat-card"><div class="stat-label">가산 대상</div><div class="stat-value" id="statBonus">-</div></div>
      </div>

      <!-- 뷰 탭 -->
      <div class="view-tabs">
        <div class="view-tab active" id="tabTable" onclick="switchViewUser('table')">
          <i class="fas fa-table"></i> 팀 종합표
        </div>
        <div class="view-tab" id="tabCard" onclick="switchViewUser('card')">
          <i class="fas fa-id-card"></i> 개인 평가 카드
        </div>
      </div>

      <!-- 팀 종합표 -->
      <div id="viewTable">
        <div class="table-card">
          <div class="table-header">
            <div class="table-title">
              <div class="table-icon"><i class="fas fa-users"></i></div>
              2026년 팀 성과관리표
              <span class="table-meta" id="tableSubtitle"></span>
            </div>
          </div>
          <div class="table-scroll">
            <table class="perf-table" id="perfTable">
              <thead id="perfTableHead"></thead>
              <tbody id="perfTableBody">
                <tr><td colspan="13" style="text-align:center;padding:30px;color:#9ca3af;">로딩 중...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- 개인 카드 뷰 -->
      <div id="viewCard" style="display:none;">
        <div class="member-tabs" id="memberTabs"></div>
        <div id="perfContainer">
          <div class="empty-state"><i class="fas fa-chart-bar"></i>팀원을 선택하세요.</div>
        </div>
      </div>

    </main>
  </div>
</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="perfModal">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">성과 기록 수정</span>
      <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editId">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">연도</label>
          <select class="form-select" id="fYear"></select>
        </div>
        <div class="form-group">
          <label class="form-label">월</label>
          <select class="form-select" id="fMonth"></select>
        </div>
      </div>
      <div class="form-group" id="targetNameRow">
        <label class="form-label">팀원 이름</label>
        <input type="text" class="form-input" id="fTargetName">
      </div>

      <div class="section-divider"><i class="fas fa-calculator"></i> 정량평가 <span style="font-size:11px;font-weight:400;color:#9ca3af;">개인별 업무입력에서 자동 집계</span></div>
      <div style="background:#f8faff;border:1.5px solid #dbeafe;border-radius:10px;padding:12px 16px;margin-bottom:14px;">
        <div style="font-size:11px;color:#9ca3af;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;">
          <span><i class="fas fa-info-circle"></i> 팀원이 개인별 업무입력 화면에서 입력한 값이 자동 반영됩니다.</span>
          <button onclick="fetchWorkTasksForModal()" style="padding:3px 10px;background:#eff6ff;color:#3b82f6;border:1px solid #bfdbfe;border-radius:6px;font-size:11px;cursor:pointer;"><i class="fas fa-sync-alt"></i> 재집계</button>
        </div>
        <div class="form-row-3">
          <div class="form-group">
            <label class="form-label">① 지시수행 <span style="color:#9ca3af;font-size:10px;">(5%)</span></label>
            <input type="text" class="form-input" id="qDisp_directive" readonly style="background:#f9fafb;color:#374151;" placeholder="미입력">
            <div style="font-size:11px;color:#9ca3af;margin-top:3px;">점수: <strong id="qScore_directive" style="color:#1d4ed8;">-</strong></div>
          </div>
          <div class="form-group">
            <label class="form-label">② 재무수치안 <span style="color:#9ca3af;font-size:10px;">(10%)</span></label>
            <input type="text" class="form-input" id="qDisp_csm" readonly style="background:#f9fafb;color:#374151;" placeholder="미입력">
            <div style="font-size:11px;color:#9ca3af;margin-top:3px;">점수: <strong id="qScore_csm" style="color:#1d4ed8;">-</strong></div>
          </div>
          <div class="form-group">
            <label class="form-label">③ 기한준수 <span style="color:#9ca3af;font-size:10px;">(20%)</span></label>
            <input type="text" class="form-input" id="qDisp_deadline" readonly style="background:#f9fafb;color:#374151;" placeholder="미입력">
            <div style="font-size:11px;color:#9ca3af;margin-top:3px;">점수: <strong id="qScore_deadline" style="color:#1d4ed8;">-</strong></div>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">④ 임원소스 <span style="color:#9ca3af;font-size:10px;">(15%)</span></label>
            <input type="text" class="form-input" id="qDisp_meeting" readonly style="background:#f9fafb;color:#374151;" placeholder="미입력">
            <div style="font-size:11px;color:#9ca3af;margin-top:3px;">점수: <strong id="qScore_meeting" style="color:#1d4ed8;">-</strong></div>
          </div>
          <div class="form-group">
            <label class="form-label">기본평가점수 <span style="color:#9ca3af;font-size:11px;">자동계산</span></label>
            <input type="number" class="form-input" id="fBasicScore" readonly style="background:#f9fafb;color:#6b7280;">
          </div>
        </div>
      </div>
      <!-- hidden: 정량 점수 저장용 -->
      <input type="hidden" id="fScoreDirective">
      <input type="hidden" id="fScoreCsm">
      <input type="hidden" id="fScoreDeadline">
      <input type="hidden" id="fScoreMeeting">

      <div id="kpiSection">
        <div class="section-divider"><i class="fas fa-star"></i> 정성평가 (KPI) — 팀장 입력</div>
        <div id="kpiInputs" class="form-row-3"></div>
      </div>

      <div class="section-divider"><i class="fas fa-plus-circle"></i> 가산</div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">프로젝트 가산 (+10%)</label>
          <select class="form-select" id="fBonusProject" onchange="autoCalcScores()">
            <option value="false">해당없음</option><option value="true">해당 (O)</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">승진대상 가산 (+10%)</label>
          <select class="form-select" id="fBonusPromotion" onchange="autoCalcScores()">
            <option value="false">해당없음</option><option value="true">해당 (O)</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">최종평가점수 <span style="color:#9ca3af;font-size:11px;">자동계산</span></label>
          <input type="number" class="form-input" id="fFinalScore" step="0.1" readonly style="background:#f9fafb;color:#6b7280;">
        </div>
        <div class="form-group">
          <label class="form-label">등급</label>
          <select class="form-select" id="fGrade">
            <option value="S">S</option><option value="A">A</option>
            <option value="B">B</option><option value="C">C</option><option value="D">D</option>
          </select>
        </div>
      </div>

      <div class="section-divider"><i class="fas fa-user"></i> 자기평가 / 팀장 피드백</div>
      <div class="form-group">
        <label class="form-label">팀장 피드백 점수</label>
        <input type="number" class="form-input" id="fLeaderScore" min="0" max="100" placeholder="미작성">
      </div>
      <div class="form-group">
        <label class="form-label">주요 기여내용</label>
        <textarea class="form-textarea" id="fSelfComment" placeholder="이번 분기 주요 성과를 입력하세요."></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">팀장 피드백 / 보완사항</label>
        <textarea class="form-textarea" id="fLeaderComment" placeholder="팀원 성과에 대한 피드백을 입력하세요."></textarea>
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal()">취소</button>
        <button class="btn btn-primary" onclick="saveRecord()"><i class="fas fa-save"></i> 저장</button>
      </div>
    </div>
  </div>
</div>

<script src="js/rbac.js"></script>
<script src="js/auth.js"></script>
<script src="js/portal.js?v=20"></script>
<script>
Portal.init();

const thisYear = new Date().getFullYear();
const thisMonth = new Date().getMonth() + 1;
let currentYear = thisYear;
let currentMonth = 0; // 0 = 연간 집계
let selectedMember = 'all';
let allRecords = [];
const isLeader = RBAC.isTeamLeader();
const currentUser = RBAC.getCurrentUser();
const TEAM_MEMBERS = ['한인석','이동민','이상현','마혜원','예대호','이성원','고인수','김예은','강세진','이용우','오정택','김채린'];

// ── 룰 설정 (DB 로드) ─────────────────────────────────────
let SCORE_RULES = {};                 // { rule_type: [rules sorted by threshold desc] }
let KPI_DEFS_BY_CODE = {};            // { code: def }
let QUAL_KPIS = [];                   // 정성 (사용자가 직접 점수 입력)
const QUANT_CODES = ['directive','csm','deadline','meeting']; // 정량 4종 고정

async function loadConfigRules() {
  try {
    const [rRules, rKpi] = await Promise.all([
      fetch('/tables/score_rules?limit=500').then(r=>r.json()),
      fetch('/tables/kpi_definitions?limit=500').then(r=>r.json())
    ]);
    const rules = rRules.rows || rRules.data || [];
    SCORE_RULES = {};
    rules.forEach(r => {
      (SCORE_RULES[r.rule_type] = SCORE_RULES[r.rule_type] || []).push(r);
    });
    Object.values(SCORE_RULES).forEach(arr => arr.sort((a,b)=>(b.threshold||0)-(a.threshold||0)));

    const kpis = rKpi.rows || rKpi.data || [];
    const curYear = new Date().getFullYear();
    KPI_DEFS_BY_CODE = {};
    kpis.filter(k => k.is_active !== false && k.year === curYear)
        .forEach(k => { KPI_DEFS_BY_CODE[k.code] = k; });
    QUAL_KPIS = Object.values(KPI_DEFS_BY_CODE)
      .filter(k => k.category === 'qual')
      .sort((a,b) => (a.code||'').localeCompare(b.code||''));

    applyQuantLabels();
    renderQualInputs();
  } catch (e) { console.error('config 로드 실패', e); }
}

// 정량 4종 라벨/가중치 동기화 (HTML 폼은 고정)
function applyQuantLabels() {
  const map = [
    ['qDisp_directive', 'directive', '① 지시수행', 5],
    ['qDisp_csm',       'csm',       '② 재무수치안', 10],
    ['qDisp_deadline',  'deadline',  '③ 기한준수', 20],
    ['qDisp_meeting',   'meeting',   '④ 임원소스', 15],
  ];
  for (const [id, code, prefix, fb] of map) {
    const input = document.getElementById(id);
    const label = input?.parentElement?.querySelector('label.form-label');
    if (!label) continue;
    const def = KPI_DEFS_BY_CODE[code];
    const lbl = def ? def.label : prefix.replace(/^[①-④]\s*/, '');
    const wt  = def ? def.weight_pct : fb;
    label.innerHTML = `${prefix.match(/^[①-④]/)?.[0] || ''} ${lbl} <span style="color:#9ca3af;font-size:10px;">(${wt}%)</span>`;
  }
}

// 정성(KPI) 동적 렌더링
function renderQualInputs() {
  const wrap = document.getElementById('kpiInputs');
  if (!wrap) return;
  if (!QUAL_KPIS.length) {
    wrap.innerHTML = `<div style="grid-column:1/-1;color:#9ca3af;font-size:12px;padding:8px;">
      KPI 정의에 정성 KPI가 없습니다. (룰 설정 → KPI 정의)</div>`;
    return;
  }
  wrap.innerHTML = QUAL_KPIS.map(k => `
    <div class="form-group">
      <label class="form-label">${escapeHtmlSafe(k.code.toUpperCase())} ${escapeHtmlSafe(k.label)} (${k.weight_pct}%)</label>
      <input type="number" class="form-input" id="fScore_${k.code}" min="0" max="100" placeholder="미입력" oninput="autoCalcScores()">
    </div>`).join('');
}
function escapeHtmlSafe(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function applyScoreRule(ruleType, value) {
  if (value === '' || value == null) return null;
  const n = Number(value);
  const rules = SCORE_RULES[ruleType] || [];
  for (const r of rules) {
    if (n >= (r.threshold ?? -Infinity)) return r.score;
  }
  return 0;
}

function buildSelects() {
  const ySel = document.getElementById('yearSel');
  const fySel = document.getElementById('fYear');
  [thisYear - 1, thisYear, thisYear + 1].forEach(y => {
    [ySel, fySel].forEach(s => {
      const o = document.createElement('option');
      o.value = y; o.textContent = y + '년';
      if (y === currentYear) o.selected = true;
      s.appendChild(o);
    });
  });
  // Month modal selector
  const fmSel = document.getElementById('fMonth');
  for (let m = 1; m <= 12; m++) {
    const o = document.createElement('option');
    o.value = m; o.textContent = m + '월';
    if (m === thisMonth) o.selected = true;
    fmSel.appendChild(o);
  }
  buildMonthBtns();
}

function buildMonthBtns() {
  const container = document.getElementById('monthBtns');
  container.innerHTML = '';
  const labels = ['연누적','1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  labels.forEach((lbl, i) => {
    const btn = document.createElement('button');
    btn.className = 'month-btn' + (i === currentMonth ? ' active' : '');
    btn.textContent = lbl;
    btn.onclick = () => selectMonth(i);
    container.appendChild(btn);
  });
}

function selectMonth(m) {
  currentMonth = m;
  document.querySelectorAll('.month-btn').forEach((btn, i) => {
    btn.classList.toggle('active', i === m);
  });
  render();
}

function onFilterChange() {
  currentYear = parseInt(document.getElementById('yearSel').value);
  render();
}

function getAggregatedRecords() {
  const monthly = allRecords.filter(r =>
    String(r.year) === String(currentYear) && r.month && Number(r.month) > 0);
  const map = {};
  monthly.forEach(r => { (map[r.target_name] = map[r.target_name] || []).push(r); });
  const avgF = (recs, f) => {
    const vals = recs.map(r => r[f]).filter(v => v != null && v !== '').map(Number);
    return vals.length ? Math.round(vals.reduce((a,b)=>a+b,0) / 12 * 10) / 10 : null;
  };
  const lastF = (recs, f) => { const v = recs.map(r=>r[f]).filter(v=>v!=null); return v.length?v[v.length-1]:null; };
  return Object.entries(map).map(([name, recs]) => {
    const agg = {
      id: 'agg_' + name,
      target_name: name,
      year: currentYear,
      month: 0,
      basic_score:      avgF(recs,'basic_score'),
      final_score:      avgF(recs,'final_score'),
      grade:            lastF(recs,'grade'),
      bonus_project:    recs.some(r=>r.bonus_project),
      bonus_promotion:  recs.some(r=>r.bonus_promotion),
      self_score:       avgF(recs,'self_score'),
      self_comment:     lastF(recs,'self_comment'),
      leader_comment:   lastF(recs,'leader_comment'),
      _months: recs.length,
    };
    QUANT_CODES.forEach(c => { agg['score_'+c] = avgF(recs, 'score_'+c); });
    QUAL_KPIS.forEach(k => { agg['score_'+k.code] = avgF(recs, 'score_'+k.code); });
    return agg;
  });
}

function filteredRecords() {
  let r;
  if (currentMonth === 0) {
    r = getAggregatedRecords();
  } else {
    r = allRecords.filter(x =>
      String(x.year) === String(currentYear) &&
      String(x.month) === String(currentMonth));
  }
  if (!isLeader && currentUser)
    r = r.filter(x => x.target_name === currentUser.full_name || x.target_user_id === currentUser.user_id);
  return r;
}

function updateStats(records) {
  document.getElementById('statCount').textContent = records.length + '명';
  const finals = records.map(r => r.final_score).filter(v => v != null);
  document.getElementById('statAvg').textContent = finals.length ? (finals.reduce((a,b)=>a+b,0)/finals.length).toFixed(1)+'점' : '-';
  document.getElementById('statMax').textContent = finals.length ? Math.max(...finals).toFixed(1)+'점' : '-';
  const bonusCount = records.filter(r => r.bonus_project || r.bonus_promotion).length;
  document.getElementById('statBonus').textContent = bonusCount + '명';
  const mLabel = currentMonth === 0 ? '연간 집계' : currentMonth + '월';
  document.getElementById('tableSubtitle').textContent = `${currentYear}년 ${mLabel} · ${records.length}명`;
}

function scoreColor(v) {
  if (v == null) return 'score-null';
  if (v >= 90) return 'score-high';
  if (v >= 70) return 'score-mid';
  return 'score-low';
}
function scoreText(v) {
  return v != null ? v : '<span style="color:#d1d5db;font-size:11px;">-</span>';
}

function renderTableHead() {
  const head = document.getElementById('perfTableHead');
  if (!head) return;
  const quantCols = QUANT_CODES.map(code => {
    const def = KPI_DEFS_BY_CODE[code];
    return `<th><span class="col-h-label">${escapeHtmlSafe(def?.label || code)}</span><br><span class="weight-label">(${def?.weight_pct ?? '-'}%)</span></th>`;
  }).join('');
  const qualCols = QUAL_KPIS.map(k => `<th><span class="col-h-label">${escapeHtmlSafe(k.code.toUpperCase())}</span><br><span class="weight-label">(${k.weight_pct}%)</span></th>`).join('');
  head.innerHTML = `
    <tr>
      <th class="left" rowspan="2" style="min-width:80px;">팀원</th>
      <th colspan="${QUANT_CODES.length}" class="col-section" style="background:#eff6ff;color:#3b82f6;">정량평가</th>
      <th colspan="${Math.max(QUAL_KPIS.length,1)}" class="col-section" style="background:#f0fdf4;color:#166534;">정성평가 (KPI)</th>
      <th rowspan="2" class="col-section" style="min-width:60px;">기본<br>점수</th>
      <th colspan="2" class="col-section" style="background:#fffbeb;color:#854d0e;">가산</th>
      <th rowspan="2" style="background:#fffbeb;min-width:60px;">최종<br>점수</th>
      <th rowspan="2">등급</th>
    </tr>
    <tr>
      ${quantCols}
      ${qualCols || '<th style="color:#9ca3af;font-size:11px;">없음</th>'}
      <th class="col-section">프로젝트</th>
      <th>승진</th>
    </tr>`;
}

function perfColspan() {
  return 1 + QUANT_CODES.length + Math.max(QUAL_KPIS.length,1) + 1 + 2 + 1 + 1;
}

function renderTable(records) {
  renderTableHead();
  const tbody = document.getElementById('perfTableBody');
  if (!records.length) {
    tbody.innerHTML = `<tr><td colspan="${perfColspan()}" style="text-align:center;padding:40px;color:#9ca3af;">해당 조건의 데이터가 없습니다.</td></tr>`;
    return;
  }
  tbody.innerHTML = records.map(r => {
    const grade = r.grade || '-';
    const gClass = 'grade-' + (grade && 'SABCD'.includes(grade) ? grade : 'D');
    const bp = r.bonus_project  ? '<span class="bonus-dot bonus-y" title="프로젝트 가산"></span>' : '<span class="bonus-dot bonus-n"></span>';
    const bpr = r.bonus_promotion ? '<span class="bonus-dot bonus-y" title="승진대상 가산"></span>' : '<span class="bonus-dot bonus-n"></span>';
    const editBtn = isLeader ? `<button onclick="openEditModal('${r.id}')" style="background:none;border:none;cursor:pointer;color:#9ca3af;font-size:12px;margin-left:6px;" title="수정"><i class="fas fa-pen"></i></button>` : '';
    const quantTds = QUANT_CODES.map(c => `<td class="score-cell ${scoreColor(r['score_'+c])}">${scoreText(r['score_'+c])}</td>`).join('');
    const qualTds = QUAL_KPIS.length
      ? QUAL_KPIS.map(k => `<td class="score-cell ${scoreColor(r['score_'+k.code])}">${scoreText(r['score_'+k.code])}</td>`).join('')
      : '<td style="color:#9ca3af;">-</td>';
    return `<tr>
      <td class="name-cell">${r.target_name || '-'}${editBtn}</td>
      ${quantTds}
      ${qualTds}
      <td class="score-cell col-section"><strong>${r.basic_score ?? '-'}</strong></td>
      <td style="text-align:center;">${bp}</td>
      <td style="text-align:center;">${bpr}</td>
      <td class="score-cell" style="background:#fffbeb;font-size:15px;"><strong>${r.final_score != null ? (r.final_score.toFixed ? r.final_score.toFixed(1) : r.final_score) : '-'}</strong></td>
      <td><span class="grade-badge ${gClass}">${grade}</span></td>
    </tr>`;
  }).join('');
}

function buildMemberTabs(records) {
  const tabs = document.getElementById('memberTabs');
  tabs.innerHTML = '';
  const allBtn = document.createElement('button');
  allBtn.className = 'member-tab' + (selectedMember === 'all' ? ' active' : '');
  allBtn.textContent = '전체';
  allBtn.onclick = () => { selectedMember = 'all'; render(); };
  tabs.appendChild(allBtn);
  const members = isLeader
    ? TEAM_MEMBERS
    : (currentUser ? [currentUser.full_name] : []);
  members.forEach(name => {
    const btn = document.createElement('button');
    btn.className = 'member-tab' + (selectedMember === name ? ' active' : '');
    btn.textContent = name;
    btn.onclick = () => { selectedMember = name; render(); };
    tabs.appendChild(btn);
  });
}

function renderCards(records) {
  const container = document.getElementById('perfContainer');
  const members = isLeader
    ? TEAM_MEMBERS
    : (currentUser ? [currentUser.full_name] : []);
  const targetMembers = selectedMember === 'all' ? members : [selectedMember];
  const recMap = {};
  records.forEach(r => { recMap[r.target_name] = r; });
  const displayItems = targetMembers.map(name => recMap[name] || { _empty:true, target_name:name });
  if (!displayItems.length) {
    container.innerHTML = '<div class="empty-state"><i class="fas fa-chart-bar"></i>표시할 팀원이 없습니다.</div>';
    return;
  }
  container.innerHTML = displayItems.map(r => {
    const grade = r.grade || '-';
    const gClass = 'grade-' + (grade && 'SABCD'.includes(grade) ? grade : 'D');
    const bonuses = [r.bonus_project && '프로젝트', r.bonus_promotion && '승진대상'].filter(Boolean);
    const hasSelf = r.self_score != null || r.self_comment;
    const hasLeader = r.leader_score != null || r.leader_comment;
    const dispMonth = currentMonth === 0 ? (r.year || currentYear) : r.month;
    const dispLabel = currentMonth === 0 ? '년 연간' : '월';
    const nameKey = (r.target_name||'').replace(/[^a-zA-Z가-힣]/g,'');
    if (r._empty) {
      return `<div class="perf-card">
        <div class="perf-card-header">
          <div class="perf-header-left">
            <div class="quarter-badge"><span>${currentMonth===0?currentYear:currentMonth}</span><small>${dispLabel}</small></div>
            <div class="perf-header-meta">
              <h3>${r.target_name}</h3>
              <div class="meta-row">
                <span class="badge badge-member"><i class="fas fa-user"></i> ${r.target_name}</span>
                <span style="font-size:12px;color:#9ca3af;">성과 기록 없음</span>
              </div>
            </div>
          </div>
        </div>
        <div class="card-no-record">이번 기간 성과 기록이 없습니다.</div>
        ${isLeader && currentMonth !== 0 ? `<div class="card-bonus-row">
          <span class="card-bonus-label"><i class="fas fa-plus-circle" style="color:#4f86f7;"></i> 가산 대상:</span>
          <label class="bonus-check-label">
            <input type="checkbox" id="bp_${nameKey}" data-name="${r.target_name}" data-type="project">
            <span>프로젝트 +10%</span>
          </label>
          <label class="bonus-check-label">
            <input type="checkbox" id="bpr_${nameKey}" data-name="${r.target_name}" data-type="promotion">
            <span>승진대상 +10%</span>
          </label>
          <button class="btn-save-bonus" data-name="${r.target_name}" onclick="saveBonusInline(this)">
            <i class="fas fa-save"></i> 저장
          </button>
        </div>` : ''}
      </div>`;
    }
    return `<div class="perf-card">
      <div class="perf-card-header">
        <div class="perf-header-left">
          <div class="quarter-badge"><span>${dispMonth}</span><small>${dispLabel}</small></div>
          <div class="perf-header-meta">
            <h3>${r.target_name || '-'} · ${r.year}년${currentMonth===0?` 연간${r._months?` (${r._months}개월)`:''}`:(` ${r.month}월`)}</h3>
            <div class="meta-row">
              <span class="badge badge-member"><i class="fas fa-user"></i> ${r.target_name || '-'}</span>
              ${r.final_score != null ? `<span class="badge badge-score">최종 ${typeof r.final_score === 'number' ? r.final_score.toFixed(1) : r.final_score}점</span>` : ''}
              ${bonuses.length ? `<span class="badge badge-bonus"><i class="fas fa-plus"></i> ${bonuses.join(' + ')} 가산</span>` : ''}
              <span class="grade-badge ${gClass}" style="width:auto;padding:0 8px;font-size:12px;">${grade}등급</span>
            </div>
          </div>
        </div>
        ${isLeader ? `<div class="perf-actions">
          <button class="btn-edit-perf" onclick="openEditModal('${r.id}')"><i class="fas fa-pen"></i> 수정</button>
          <button class="btn-del-perf" onclick="deleteRecord('${r.id}')"><i class="fas fa-trash"></i></button>
        </div>` : ''}
      </div>
      <div class="score-grid">
        ${QUANT_CODES.map(code => {
          const def = KPI_DEFS_BY_CODE[code];
          const lbl = def ? def.label : code;
          const wt  = def ? def.weight_pct : '-';
          const v   = r['score_' + code];
          return `<div class="score-item">
          <div class="score-item-label">${escapeHtmlSafe(lbl)} <span style="color:#111827;font-weight:700;font-size:11px;">(${wt}%)</span></div>
          <div class="score-item-val ${v == null ? 'null-val' : ''}">${v ?? '미입력'}</div>
        </div>`;
        }).join('')}
        ${QUAL_KPIS.map(k => {
          const v = r['score_' + k.code];
          return `<div class="score-item">
          <div class="score-item-label">${escapeHtmlSafe(k.code.toUpperCase())} ${escapeHtmlSafe(k.label)} <span style="color:#111827;font-weight:700;font-size:11px;">(${k.weight_pct}%)</span></div>
          <div class="score-item-val ${v == null ? 'null-val' : ''}">${v ?? '미입력'}</div>
        </div>`;
        }).join('')}
        <div class="score-item" style="background:#fffbeb;">
          <div class="score-item-label">최종평가점수</div>
          <div class="score-item-val" style="color:#854d0e;">${r.final_score != null ? (typeof r.final_score === 'number' ? r.final_score.toFixed(1) : r.final_score) : '-'}</div>
        </div>
      </div>
      <div class="card-bottom">
        <div class="card-section">
          <div class="card-section-title"><i class="fas fa-user"></i> 자기평가</div>
          ${hasSelf ? `
            <div class="score-display">
              <span class="score-num self">${r.self_score ?? '-'}</span>
              <span class="score-unit">점</span>
            </div>
            <div class="perf-text">${(r.self_comment||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/\n/g,'<br>')}</div>
          ` : '<div class="perf-text-empty">자기평가 미작성</div>'}
        </div>
        <div class="card-section">
          <div class="card-section-title"><i class="fas fa-user-tie"></i> 팀장 피드백</div>
          ${hasLeader ? `
            <div class="score-display">
              <span class="score-num leader">${r.leader_score ?? '-'}</span>
              <span class="score-unit">점</span>
            </div>
            <div class="perf-text">${(r.leader_comment||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/\n/g,'<br>')}</div>
          ` : '<div class="perf-text-empty">팀장 피드백 미작성</div>'}
        </div>
      </div>
      ${isLeader ? `<div class="card-bonus-row">
        <span class="card-bonus-label"><i class="fas fa-plus-circle" style="color:#4f86f7;"></i> 가산 대상:</span>
        <label class="bonus-check-label">
          <input type="checkbox" id="bp_${nameKey}" data-name="${r.target_name}" data-type="project" ${r.bonus_project?'checked':''}>
          <span>프로젝트 +10%</span>
        </label>
        <label class="bonus-check-label">
          <input type="checkbox" id="bpr_${nameKey}" data-name="${r.target_name}" data-type="promotion" ${r.bonus_promotion?'checked':''}>
          <span>승진대상 +10%</span>
        </label>
        <button class="btn-save-bonus" data-name="${r.target_name}" onclick="saveBonusInline(this)">
          <i class="fas fa-save"></i> 저장
        </button>
      </div>` : ''}
    </div>`;
  }).join('');
}

function render() {
  const records = filteredRecords();
  updateStats(records);
  renderTable(records);
  buildMemberTabs(records);
  renderCards(records);
}

// 사용자가 직접 탭을 클릭했는지 추적 — true면 리사이즈 시 자동전환 무시
let userPickedTab = false;

function switchView(view, fromUser) {
  document.getElementById('viewTable').style.display = view === 'table' ? 'block' : 'none';
  document.getElementById('viewCard').style.display = view === 'card' ? 'block' : 'none';
  document.getElementById('tabTable').classList.toggle('active', view === 'table');
  document.getElementById('tabCard').classList.toggle('active', view === 'card');
  if (fromUser) userPickedTab = true;
}

// 뷰 탭 클릭 핸들러 래퍼 — HTML onclick에서 호출하는 기존 인터페이스를 유지하면서
// fromUser=true 플래그를 주입한다
function switchViewUser(view) { switchView(view, true); }

// 모바일 자동 탭 전환: 768px 이하이면 카드 탭으로 자동 전환
function autoSwitchTabForScreen() {
  if (userPickedTab) return;
  if (window.matchMedia('(max-width:768px)').matches) {
    switchView('card', false);
  } else {
    switchView('table', false);
  }
}

// 리사이즈 시 자동 전환 (debounce 200ms, userPickedTab=true면 무시)
let _perfResizeTimer = null;
window.addEventListener('resize', () => {
  clearTimeout(_perfResizeTimer);
  _perfResizeTimer = setTimeout(() => { autoSwitchTabForScreen(); }, 200);
});

  document.getElementById('fBonusPromotion').value = 'false';
  document.getElementById('fFinalScore').value = '';
  document.getElementById('fGrade').value = 'B';
  document.getElementById('fLeaderScore').value = '';
  document.getElementById('fSelfComment').value = '';
  document.getElementById('fLeaderComment').value = '';
  document.getElementById('targetNameRow').style.display = isLeader ? 'block' : 'none';
  document.getElementById('kpiSection').style.display = isLeader ? 'block' : 'none';

function closeModal() { document.getElementById('perfModal').classList.remove('open'); }

function nv(id) {
  const v = document.getElementById(id).value;
  return v === '' ? null : Number(v);
}

function calcDirectiveScore(v) { return applyScoreRule('directive', v); }
function calcCsmScore(v)       { return applyScoreRule('csm', v); }
function calcDeadlineScore(v)  { return applyScoreRule('deadline', v); }
function calcMeetingScore(v)   { return applyScoreRule('meeting', v); }

function autoCalcScores() {
  const w = (code, fb) => (KPI_DEFS_BY_CODE[code]?.weight_pct ?? fb) / 100;
  const readVal = id => {
    const el = document.getElementById(id);
    if (!el) return null;
    return el.value !== '' ? Number(el.value) : null;
  };
  const quantW = { directive:5, csm:10, deadline:20, meeting:15 };
  const QUANT_FIELD_MAP = { directive:'fScoreDirective', csm:'fScoreCsm', deadline:'fScoreDeadline', meeting:'fScoreMeeting' };
  const weighted = [];
  for (const code of QUANT_CODES) {
    const v = readVal(QUANT_FIELD_MAP[code]);
    if (v != null) weighted.push(v * w(code, quantW[code]));
  }
  for (const k of QUAL_KPIS) {
    const v = readVal('fScore_' + k.code);
    if (v != null) weighted.push(v * (k.weight_pct / 100));
  }
  if (weighted.length) {
    const basic = Math.round(weighted.reduce((a,b) => a+b, 0) * 10) / 10;
    document.getElementById('fBasicScore').value = basic;
    const bp  = document.getElementById('fBonusProject').value === 'true';
    const bpr = document.getElementById('fBonusPromotion').value === 'true';
    const rate = (bp ? 0.1 : 0) + (bpr ? 0.1 : 0);
    document.getElementById('fFinalScore').value = Math.round(basic * (1 + rate) * 10) / 10;
  } else {
    document.getElementById('fBasicScore').value = '';
    document.getElementById('fFinalScore').value = '';
  }
}

function populateQuantFromWorkTask(r) {
  const s1 = calcDirectiveScore(r.raw_directive);
  const s2 = calcCsmScore(r.raw_csm_amount);
  const s3 = calcDeadlineScore(r.raw_deadline_days);
  const s4 = calcMeetingScore(r.raw_meeting_count);
  document.getElementById('qDisp_directive').value = r.raw_directive  != null ? (r.raw_directive === 1 ? '이행완료' : '미이행') : '';
  document.getElementById('qDisp_csm').value       = r.raw_csm_amount  != null ? r.raw_csm_amount + '억원' : '';
  document.getElementById('qDisp_deadline').value  = r.raw_deadline_days != null ? r.raw_deadline_days + '일' : '';
  document.getElementById('qDisp_meeting').value   = r.raw_meeting_count != null ? r.raw_meeting_count + '건' : '';
  document.getElementById('qScore_directive').textContent = s1 != null ? s1 + '점' : '-';
  document.getElementById('qScore_csm').textContent       = s2 != null ? s2 + '점' : '-';
  document.getElementById('qScore_deadline').textContent  = s3 != null ? s3 + '점' : '-';
  document.getElementById('qScore_meeting').textContent   = s4 != null ? s4 + '점' : '-';
  document.getElementById('fScoreDirective').value = s1 ?? '';
  document.getElementById('fScoreCsm').value       = s2 ?? '';
  document.getElementById('fScoreDeadline').value  = s3 ?? '';
  document.getElementById('fScoreMeeting').value   = s4 ?? '';
  autoCalcScores();
}

function clearQuantDisplay() {
  ['qDisp_directive','qDisp_csm','qDisp_deadline','qDisp_meeting'].forEach(id => document.getElementById(id).value = '');
  ['qScore_directive','qScore_csm','qScore_deadline','qScore_meeting'].forEach(id => document.getElementById(id).textContent = '-');
  ['fScoreDirective','fScoreCsm','fScoreDeadline','fScoreMeeting'].forEach(id => document.getElementById(id).value = '');
  autoCalcScores();
}

async function fetchWorkTasksForModal() {
  const name  = document.getElementById('fTargetName').value;
  const year  = document.getElementById('fYear').value;
  const month = document.getElementById('fMonth').value;
  if (!name || !year || !month) return;
  try {
    const res  = await fetch('/tables/work_tasks?limit=500');
    const data = await res.json();
    const match = (data.rows||[]).find(r =>
      r.member_name === name &&
      String(r.year) === String(year) &&
      String(r.month) === String(month));
    match ? populateQuantFromWorkTask(match) : clearQuantDisplay();
  } catch(e) { clearQuantDisplay(); }
}

async function saveRecord() {
  const id = document.getElementById('editId').value;
  const body = {
    year:  parseInt(document.getElementById('fYear').value),
    month: parseInt(document.getElementById('fMonth').value) || currentMonth || thisMonth,
    target_name: document.getElementById('fTargetName').value.trim(),
    score_directive:  document.getElementById('fScoreDirective').value !== '' ? Number(document.getElementById('fScoreDirective').value) : null,
    score_csm:        document.getElementById('fScoreCsm').value       !== '' ? Number(document.getElementById('fScoreCsm').value)       : null,
    score_deadline:   document.getElementById('fScoreDeadline').value  !== '' ? Number(document.getElementById('fScoreDeadline').value)  : null,
    score_meeting:    document.getElementById('fScoreMeeting').value   !== '' ? Number(document.getElementById('fScoreMeeting').value)   : null,
    rule_version:     '1.0.0',
    ...Object.fromEntries(QUAL_KPIS.map(k => [
      'score_' + k.code,
      (() => { const el = document.getElementById('fScore_' + k.code); return el && el.value !== '' ? Number(el.value) : null; })()
    ])),
    basic_score: nv('fBasicScore'),
    bonus_project: document.getElementById('fBonusProject').value === 'true',
    bonus_promotion: document.getElementById('fBonusPromotion').value === 'true',
    bonus_rate: (document.getElementById('fBonusProject').value === 'true' ? 0.1 : 0) +
                (document.getElementById('fBonusPromotion').value === 'true' ? 0.1 : 0),
    final_score: nv('fFinalScore'),
    grade: document.getElementById('fGrade').value,
    self_comment: document.getElementById('fSelfComment').value.trim(),
    leader_score: nv('fLeaderScore'),
    leader_comment: document.getElementById('fLeaderComment').value.trim(),
  };
  try {
    const method = id ? 'PUT' : 'POST';
    const url = id ? '/tables/performance_records/' + id : '/tables/performance_records';
    const res = await fetch(url, { method, headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
    if (!res.ok) throw new Error();
    closeModal();
    Portal.showToast('저장되었습니다.', 'success');
    // 카드 체크박스를 모달 저장값과 즉시 동기화
    const nameKey = (body.target_name||'').replace(/[^a-zA-Z가-힣]/g,'');
    const bpEl  = document.getElementById('bp_'  + nameKey);
    const bprEl = document.getElementById('bpr_' + nameKey);
    if (bpEl)  bpEl.checked  = body.bonus_project;
    if (bprEl) bprEl.checked = body.bonus_promotion;
    await loadRecords();
  } catch(e) { Portal.showToast('저장에 실패했습니다.', 'error'); }
}

async function saveBonusInline(btn) {
  const name = btn.dataset.name;
  const card = btn.closest('.perf-card');
  const bProject   = card.querySelector('input[data-type="project"]').checked;
  const bPromotion = card.querySelector('input[data-type="promotion"]').checked;
  const rate = (bProject ? 0.1 : 0) + (bPromotion ? 0.1 : 0);
  function gradeFromScore(s) {
    if (s >= 100) return 'S'; if (s >= 90) return 'A'; if (s >= 80) return 'B'; if (s >= 70) return 'C'; return 'D';
  }
  try {
    const res  = await fetch('/tables/performance_records?limit=500');
    const data = await res.json();
    const match = (data.rows||[]).find(r =>
      r.target_name === name &&
      String(r.year) === String(currentYear) &&
      String(r.month) === String(currentMonth));
    if (match) {
      const finalScore = match.basic_score != null
        ? Math.round(match.basic_score * (1 + rate) * 10) / 10
        : null;
      const grade = finalScore != null ? gradeFromScore(finalScore) : match.grade;
      await fetch('/tables/performance_records/'+match.id, {
        method:'PUT', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({...match, bonus_project:bProject, bonus_promotion:bPromotion, final_score:finalScore, grade})
      });
    } else {
      await fetch('/tables/performance_records', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ year:currentYear, month:currentMonth, target_name:name,
          bonus_project:bProject, bonus_promotion:bPromotion })
      });
    }
    btn.textContent = '✓ 저장됨';
    setTimeout(() => { btn.innerHTML = '<i class="fas fa-save"></i> 저장'; }, 1500);
    await loadRecords();
  } catch(e) { Portal.showToast('저장에 실패했습니다.', 'error'); }
}

async function deleteRecord(id) {
  Portal.confirm('이 성과 기록을 삭제하시겠습니까?', async () => {
    await fetch('/tables/performance_records/' + id, { method:'DELETE' });
    Portal.showToast('삭제되었습니다.', 'success');
    await loadRecords();
  });
}

async function loadRecords() {
  try {
    const res = await fetch('/tables/performance_records?limit=200');
    const data = await res.json();
    allRecords = data.rows || data.data || [];
    render();
  } catch(e) {
    document.getElementById('perfContainer').innerHTML =
      '<div class="empty-state"><i class="fas fa-exclamation-circle"></i>데이터를 불러오지 못했습니다.</div>';
  }
}

loadConfigRules().then(() => loadRecords());
</script>
