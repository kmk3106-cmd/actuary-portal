<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>팀 업무량 모니터링 - 계리결산팀 운영관리포탈</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/main.css?v=30">
  <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
  <!-- 엑셀 다운로드 (스타일 지원 fork: xlsx-js-style) -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
  <style>
    /* ── 팀 업무량 모니터링 전용 스타일 ── */

    /* KPI 카드 그리드 */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }
    .kpi-card {
      background: white;
      border-radius: 14px;
      border: 1px solid var(--gray-200);
      padding: 20px 22px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      position: relative;
      overflow: hidden;
      transition: box-shadow 0.2s, transform 0.2s;
    }
    .kpi-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.08); transform: translateY(-1px); }
    .kpi-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      border-radius: 14px 14px 0 0;
    }
    .kpi-card.blue::before  { background: linear-gradient(90deg, #4f86f7, #818cf8); }
    .kpi-card.green::before { background: linear-gradient(90deg, #10b981, #34d399); }
    .kpi-card.red::before   { background: linear-gradient(90deg, #ef4444, #f87171); }
    .kpi-card.gray::before  { background: linear-gradient(90deg, #9ca3af, #d1d5db); }
    .kpi-card.yellow::before{ background: linear-gradient(90deg, #f59e0b, #fbbf24); }
    .kpi-label { font-size: 12px; font-weight: 600; color: var(--gray-500); text-transform: uppercase; letter-spacing: 0.05em; }
    .kpi-value { font-size: 32px; font-weight: 800; color: var(--gray-900); line-height: 1.1; }
    .kpi-value span.unit { font-size: 15px; font-weight: 500; color: var(--gray-500); margin-left: 4px; }
    .kpi-sub  { font-size: 12.5px; color: var(--gray-500); }
    .kpi-icon {
      position: absolute; right: 18px; top: 18px;
      font-size: 28px; opacity: 0.1;
    }
    .kpi-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 9px; border-radius: 20px;
      font-size: 12px; font-weight: 700;
      width: fit-content;
    }
    .kpi-badge.red    { background: #fee2e2; color: #b91c1c; }
    .kpi-badge.gray   { background: var(--gray-100); color: var(--gray-600); }
    .kpi-badge.yellow { background: #fef3c7; color: #92400e; }

    /* 섹션 레이아웃 */
    .section-row {
      display: grid;
      gap: 20px;
      margin-bottom: 24px;
    }
    .section-row.two-col { grid-template-columns: 1fr 1fr; }
    .section-row.three-col { grid-template-columns: 2fr 1fr; }

    /* 차트 카드 */
    .chart-card {
      background: white;
      border-radius: 14px;
      border: 1px solid var(--gray-200);
      overflow: hidden;
    }
    .chart-card-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--gray-100);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .chart-card-title {
      font-size: 15px; font-weight: 700; color: var(--gray-900); flex: 1;
    }
    .chart-card-body { padding: 16px 20px; }
    .chart-icon {
      width: 32px; height: 32px; border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0;
    }
    .chart-icon.blue   { background: #dbeafe; color: #1d4ed8; }
    .chart-icon.green  { background: #d1fae5; color: #059669; }
    .chart-icon.yellow { background: #fef3c7; color: #d97706; }
    .chart-icon.purple { background: #ede9fe; color: #7c3aed; }
    .chart-icon.red    { background: #fee2e2; color: #b91c1c; }

    /* 히트맵 컨테이너 */
    .heatmap-scroll-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    #heatmapChart { min-width: 900px; }

    /* 날짜 범위 선택기 */
    .date-range-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .date-range-row input[type="date"] {
      padding: 7px 11px;
      border: 1.5px solid var(--gray-200);
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      color: var(--gray-700);
      background: white;
      cursor: pointer;
    }
    .date-range-row input[type="date"]:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(79,134,247,0.12);
    }

    /* 토글 버튼 그룹 */
    .toggle-group {
      display: flex;
      gap: 0;
      border: 1.5px solid var(--gray-200);
      border-radius: 9px;
      overflow: hidden;
    }
    .toggle-btn {
      padding: 6px 14px;
      background: white;
      border: none;
      font-size: 12.5px;
      font-weight: 600;
      color: var(--gray-500);
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }
    .toggle-btn + .toggle-btn { border-left: 1.5px solid var(--gray-200); }
    .toggle-btn:hover { background: var(--gray-50); color: var(--gray-700); }
    .toggle-btn.active { background: var(--primary); color: white; }

    /* 알림 패널 */
    .alert-panel {
      background: white;
      border-radius: 14px;
      border: 1px solid var(--gray-200);
      overflow: hidden;
    }
    .alert-panel-header {
      padding: 14px 18px;
      border-bottom: 1px solid var(--gray-100);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .alert-panel-title { font-size: 14px; font-weight: 700; color: var(--gray-900); flex: 1; }
    .alert-count-badge {
      display: inline-flex; align-items: center; justify-content: center;
      width: 20px; height: 20px;
      border-radius: 50%;
      font-size: 11px; font-weight: 700;
      background: #fee2e2; color: #b91c1c;
    }
    .alert-section-label {
      padding: 8px 14px 4px;
      font-size: 10px; font-weight: 700;
      color: var(--gray-400);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      background: var(--gray-50);
      border-bottom: 1px solid var(--gray-100);
    }
    .alert-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--gray-100);
      font-size: 13px;
    }
    .alert-item:last-child { border-bottom: none; }
    .alert-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .alert-dot.red    { background: #ef4444; }
    .alert-dot.gray   { background: #9ca3af; }
    .alert-dot.yellow { background: #f59e0b; }
    .alert-name { font-weight: 600; color: var(--gray-800); flex: 1; }
    .alert-desc { font-size: 12px; color: var(--gray-500); }
    .alert-empty {
      padding: 16px 14px;
      text-align: center;
      font-size: 12.5px;
      color: var(--gray-400);
    }

    /* 히트맵 범례 */
    .legend-row {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      padding: 10px 0 4px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: var(--gray-600);
    }
    .legend-dot {
      width: 12px; height: 12px;
      border-radius: 3px;
    }
    .legend-dot.overload { background: #ef4444; }
    .legend-dot.normal   { background: #10b981; }
    .legend-dot.idle     { background: #f59e0b; }
    .legend-dot.empty    { background: #f3f4f6; border: 1px solid #d1d5db; }
    .legend-dot.holiday  {
      background: repeating-linear-gradient(
        -45deg, #f3f4f6 0 2px, #e5e7eb 2px 4px
      );
      border: 1px solid #d1d5db;
    }
    .legend-dot.vacation { background: #1f2937; }

    /* 모달 - 일별 상세 */
    .entry-list { display: flex; flex-direction: column; gap: 8px; }
    .entry-item {
      background: var(--gray-50);
      border-radius: 10px;
      padding: 12px 14px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .entry-cat {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
      background: #dbeafe;
      color: #1d4ed8;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .entry-label { font-size: 13.5px; color: var(--gray-800); flex: 1; line-height: 1.5; }
    .entry-duration {
      font-size: 12.5px;
      font-weight: 700;
      color: var(--primary);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .entry-empty {
      text-align: center;
      padding: 24px;
      color: var(--gray-400);
      font-size: 13.5px;
    }
    .detail-summary {
      background: var(--gray-50);
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 16px;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }
    .detail-stat { font-size: 13px; color: var(--gray-600); }
    .detail-stat strong { color: var(--gray-900); font-weight: 700; }

    /* 휴가 섹션 (모달 내) */
    .vacation-section {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 12px 14px;
      margin-top: 12px;
    }
    .vacation-section-title {
      font-size: 12px;
      font-weight: 700;
      color: #374151;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .vacation-badge-row {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .vacation-entry {
      font-size: 12.5px;
      color: #4b5563;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .vacation-type-chip {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
      background: #e5e7eb;
      color: #374151;
      flex-shrink: 0;
    }
    .vacation-time {
      color: #6b7280;
      font-size: 12px;
    }

    /* 접근 거부 */
    .access-gate {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 60px 20px;
      text-align: center;
    }
    .access-gate-icon {
      width: 72px; height: 72px;
      border-radius: 20px;
      background: #fee2e2;
      display: flex; align-items: center; justify-content: center;
      font-size: 32px;
      color: #b91c1c;
    }
    .access-gate h2 { font-size: 22px; font-weight: 700; color: var(--gray-900); }
    .access-gate p  { font-size: 14px; color: var(--gray-500); max-width: 360px; line-height: 1.7; }

    /* 로딩 스피너 */
    .loading-overlay {
      position: absolute; inset: 0;
      background: rgba(255,255,255,0.85);
      display: flex; align-items: center; justify-content: center;
      border-radius: 14px;
      z-index: 10;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--gray-200);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 반응형 */
    @media (max-width: 1024px) {
      .kpi-grid { grid-template-columns: repeat(2, 1fr); }
      .section-row.three-col { grid-template-columns: 1fr; }
    }
    @media (max-width: 768px) {
      .kpi-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
      .section-row.two-col { grid-template-columns: 1fr; }
      .section-row.three-col { grid-template-columns: 1fr; }
      .chart-card-body { padding: 12px; }
      .date-range-row { gap: 6px; }
    }
    @media (max-width: 480px) {
      .kpi-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
      .kpi-value { font-size: 24px; }
    }
  </style>
</head>
<body>
<div class="app-layout">
  <!-- 사이드바: portal.js가 주입 -->
  <main class="main-content">
    <header class="page-header">
      <div class="page-title">
        <i class="fas fa-users" style="color:#4f86f7;margin-right:8px;"></i>
        팀 업무량 모니터링
        <small id="dateRangeLabel"></small>
      </div>
      <div class="header-actions">
        <div class="date-range-row">
          <input type="date" id="fromDate" title="시작일">
          <span style="color:var(--gray-400);font-size:13px;">~</span>
          <input type="date" id="toDate" title="종료일">
          <button class="btn btn-primary btn-sm" onclick="loadAll()">
            <i class="fas fa-sync-alt"></i> 조회
          </button>
        </div>
      </div>
    </header>

    <div class="content-body" id="pageBody">
      <!-- 권한 게이트: JS가 렌더 -->
    </div>
  </main>
</div>

<!-- 일별 상세 모달 -->
<div class="modal-overlay" id="detailModal">
  <div class="modal" style="max-width:560px">
    <div class="modal-header">
      <span class="modal-title" id="detailModalTitle">업무 상세</span>
      <button class="modal-close" onclick="closeDetailModal()" aria-label="닫기">
        <i class="fas fa-times"></i>
      </button>
    </div>
    <div class="modal-body" id="detailModalBody"></div>
  </div>
</div>

<script src="js/rbac.js"></script>
<script src="js/auth.js"></script>
<script src="js/portal.js?v=30"></script>
<script>
/* ── 초기화 ── */
let currentUser = null;
let heatmapChart = null;
let barChart     = null;
let donutChart   = null;
let barPeriod    = 'week';   // ← bootPage() 전에 초기화 필수 (TDZ 방지)
let barSort      = 'desc';
let heatmapData  = null;

if (!Portal.init()) { /* auth.js가 로그인으로 리다이렉트 */ }
else { bootPage(); }

function bootPage() {
  console.log('[DIAG] bootPage 시작');
  currentUser = RBAC.getCurrentUser();
  console.log('[DIAG] user role=' + currentUser?.role);
  const allowed = currentUser &&
    (currentUser.role === 'team_leader' || currentUser.role === 'section_chief');

  if (!allowed) {
    document.getElementById('pageBody').innerHTML = `
      <div class="access-gate">
        <div class="access-gate-icon"><i class="fas fa-lock"></i></div>
        <h2>접근 권한이 없습니다</h2>
        <p>팀 업무량 모니터링 페이지는 <strong>팀장</strong> 또는 <strong>실장</strong>만 접근할 수 있습니다.<br>
           본인 업무량 확인은 <a href="workload-me.html" style="color:var(--primary);">내 업무량</a> 페이지를 이용해주세요.</p>
        <a href="index.html" class="btn btn-secondary"><i class="fas fa-home"></i> 대시보드로 이동</a>
      </div>`;
    return;
  }

  initDateRange();
  renderPageShell();
  loadAll();

  // 팀장 전용: 월별 종합 엑셀 다운로드 버튼 주입
  const isTeamLeader = currentUser && currentUser.role === 'team_leader';
  if (isTeamLeader) {
    const bar = document.getElementById('exportBar');
    if (bar) {
      bar.innerHTML =
        '<span style="font-size:12px;color:#6b7280;">팀장 전용</span>' +
        '<button class="btn btn-primary" onclick="exportTeamReport()" id="btnExportXlsx">' +
        '<i class="fas fa-file-excel"></i> 월별 종합 엑셀 다운로드</button>';
    }
  }
}

/* ── 날짜 범위 초기화 (최근 30일) ── */
function initDateRange() {
  // 이번 달 1일 ~ 말일
  const today = new Date();
  const first = new Date(today.getFullYear(), today.getMonth(), 1);
  const last  = new Date(today.getFullYear(), today.getMonth() + 1, 0);
  document.getElementById('fromDate').value = dateStr(first);
  document.getElementById('toDate').value   = dateStr(last);
}
// 로컬 시간 기준 'YYYY-MM-DD' (toISOString은 UTC 변환되어 한국 자정~09시 사이 일자가 하루 빨라짐)
function dateStr(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${dd}`;
}
function getFrom()  { return document.getElementById('fromDate').value; }
function getTo()    { return document.getElementById('toDate').value; }

/* ── 페이지 골격 렌더 ── */
function renderPageShell() {
  document.getElementById('pageBody').innerHTML = `
    <!-- KPI 카드 -->
    <div class="kpi-grid" id="kpiGrid">
      ${[0,1,2,3].map(() => `
        <div class="kpi-card blue">
          <div class="kpi-label">로딩 중...</div>
          <div class="kpi-value">-</div>
        </div>`).join('')}
    </div>

    <!-- 히트맵 -->
    <div class="chart-card" style="margin-bottom:24px;">
      <div class="chart-card-header">
        <div class="chart-icon blue"><i class="fas fa-th"></i></div>
        <div class="chart-card-title">팀 업무 히트맵</div>
        <div class="legend-row" id="heatmapLegend">
          <div class="legend-item"><div class="legend-dot overload"></div>과중</div>
          <div class="legend-item"><div class="legend-dot normal"></div>정상</div>
          <div class="legend-item"><div class="legend-dot idle"></div>유휴</div>
          <div class="legend-item"><div class="legend-dot empty"></div>미입력</div>
          <div class="legend-item"><div class="legend-dot holiday"></div>비영업일</div>
          <div class="legend-item"><div class="legend-dot vacation"></div>휴가</div>
        </div>
      </div>
      <div class="chart-card-body">
        <div class="heatmap-scroll-wrap">
          <div id="heatmapChart" style="min-height:300px;position:relative;">
            <div class="loading-overlay"><div class="spinner"></div></div>
          </div>
        </div>
      </div>
    </div>

    <!-- 월별 종합 엑셀 다운로드 (팀장 전용, JS에서 권한 확인 후 주입) -->
    <div id="exportBar" style="display:flex;justify-content:flex-end;align-items:center;gap:10px;margin-bottom:16px;"></div>

    <!-- 개인별 비교 + 도넛 -->
    <div class="section-row three-col" style="margin-bottom:24px;">
      <div class="chart-card">
        <div class="chart-card-header">
          <div class="chart-icon green"><i class="fas fa-chart-bar"></i></div>
          <div class="chart-card-title">개인별 투입 시간 비교</div>
          <div style="display:flex;gap:8px;align-items:center;">
            <div class="toggle-group" id="periodToggle">
              <button class="toggle-btn active" data-period="week"  onclick="switchPeriod('week',this)">이번 주</button>
              <button class="toggle-btn"        data-period="month" onclick="switchPeriod('month',this)">이번 달</button>
              <button class="toggle-btn"        data-period="quarter" onclick="switchPeriod('quarter',this)">이번 분기</button>
            </div>
            <div class="toggle-group" id="sortToggle">
              <button class="toggle-btn active" data-sort="desc" onclick="switchSort('desc',this)"><i class="fas fa-sort-amount-down"></i></button>
              <button class="toggle-btn"        data-sort="asc"  onclick="switchSort('asc',this)"><i class="fas fa-sort-amount-up"></i></button>
            </div>
          </div>
        </div>
        <div class="chart-card-body">
          <div id="barChart" style="min-height:320px;position:relative;">
            <div class="loading-overlay"><div class="spinner"></div></div>
          </div>
        </div>
      </div>

      <div class="chart-card">
        <div class="chart-card-header">
          <div class="chart-icon yellow"><i class="fas fa-chart-pie"></i></div>
          <div class="chart-card-title">업무 유형별 분포</div>
        </div>
        <div class="chart-card-body">
          <div id="donutChart" style="min-height:280px;position:relative;">
            <div class="loading-overlay"><div class="spinner"></div></div>
          </div>
        </div>
      </div>
    </div>

    <!-- 알림 패널 -->
    <div class="section-row two-col" style="margin-bottom:24px;">
      <div class="alert-panel" id="alertPanel">
        <div class="alert-panel-header">

/* ── 히트맵 로드 ── */
async function loadHeatmap(from, to) {
  try {
    const r = await fetch(`/api/workload/team?from=${from}&to=${to}`);
    if (!r.ok) throw new Error('히트맵 API 오류');
    heatmapData = await r.json();
    renderHeatmap(heatmapData);
  } catch(e) {
    console.error('히트맵 로드 실패:', e);
    document.getElementById('heatmapChart').innerHTML =
      '<div style="text-align:center;padding:40px;color:var(--gray-400);">히트맵 데이터를 불러오지 못했습니다.</div>';
  }
}

function renderHeatmap(data) {
  const { members, dates, cells } = data;

  // ApexCharts 히트맵용 시리즈 구성 (멤버별 rows)
  // ApexCharts heatmap: series = [{name: member, data: [{x: date, y: colorValue}]}]
  // colorValue: 0=비영업일, 1=미입력, 2=유휴, 3=정상, 4=과중

  const STATUS_VAL = { empty: 1, idle: 2, normal: 3, overload: 4, vacation: 5 };

  const series = members.map(member => ({
    name: member,
    data: dates.map(date => {
      const cell = cells[member] && cells[member][date];
      if (!cell) return { x: date, y: 0, meta: { status: 'empty', is_business_day: false } };
      const y = cell.is_business_day ? (STATUS_VAL[cell.status] || 1) : (cell.has_vacation ? 5 : 0);
      return {
        x: date,
        y: y,
        meta: cell
      };
    })
  }));

  if (heatmapChart) { heatmapChart.destroy(); heatmapChart = null; }

  const opts = {
    chart: {
      type: 'heatmap',
      height: Math.max(320, members.length * 36 + 60),
      toolbar: { show: false },
      animations: { enabled: false },
      events: {
        dataPointSelection: function(event, chartCtx, config) {
          const s = config.seriesIndex;
          const d = config.dataPointIndex;
          if (s < 0 || d < 0) return;
          const member   = series[s].name;
          const dateVal  = series[s].data[d].x;
          const meta     = series[s].data[d].meta;
          openDetailModal(member, dateVal, meta);
        }
      }
    },
    dataLabels: { enabled: false },
    legend: { show: false },
    tooltip: {
      custom: function({ series: s, seriesIndex: si, dataPointIndex: di }) {
        const pt   = heatmapData.members[si];
        const dt   = heatmapData.dates[di];
        const cell = heatmapData.cells[pt] && heatmapData.cells[pt][dt];
        if (!cell) return `<div style="padding:8px 12px;font-size:12px;">${pt}<br>${dt}<br>데이터 없음</div>`;

        const statusLabel = { overload: '과중', normal: '정상', idle: '유휴', empty: '미입력', vacation: '휴가' };
        const statusColor = { overload: '#ef4444', normal: '#10b981', idle: '#f59e0b', empty: '#9ca3af', vacation: '#1f2937' };
        const hours = cell.total_minutes ? Math.round(cell.total_minutes / 6) / 10 : 0;
        const vacations = Array.isArray(cell.vacations) ? cell.vacations : [];

        // 툴팁 상단: 이름 + 날짜
        let tip = `<div style="padding:10px 14px;font-size:12.5px;line-height:1.8;min-width:180px;max-width:260px;">
          <strong style="font-size:13.5px;">${pt}</strong><br>
          ${dt}${cell.holiday_name ? ` (${cell.holiday_name})` : ''}<br>
          <span style="color:${statusColor[cell.status] || '#9ca3af'};font-weight:700;">${statusLabel[cell.status] || '-'}</span>`;

        // 업무 시간 (비영업일/휴가 아닌 경우)
        if (cell.is_business_day && cell.status !== 'vacation') {
          tip += ` · ${hours}h (부하 ${Math.round(cell.load_pct || 0)}%)`;
        } else if (!cell.is_business_day) {
          tip += ' · 비영업일';
        }

        // 휴가 정보
        if (vacations.length) {
          tip += `<div style="margin-top:6px;padding-top:6px;border-top:1px solid #e5e7eb;font-size:12px;">`;
          if (cell.is_full_vacation) {
            const v = vacations[0];
            tip += `<span style="color:#1f2937;font-weight:700;">🏖️ 휴가 (${v.vacation_type || '-'})</span><br>`;
            tip += `<span style="color:#6b7280;">${v.start_time || '-'}~${v.end_time || '-'} / ${v.hours != null ? v.hours + 'h' : ''}</span>`;
            for (let i = 1; i < vacations.length; i++) {
              const vi = vacations[i];
              tip += `<br>· ${vi.vacation_type} ${vi.start_time}~${vi.end_time} (${vi.hours}h)`;
            }
          } else {
            // 부분 휴가
            if (hours > 0) {
              tip += `<span style="color:#374151;">업무 ${hours}h</span><br>`;
            }
            tip += `<span style="color:#1f2937;font-weight:700;">부분 휴가:</span>`;
            for (const v of vacations) {
              tip += `<br>· ${v.vacation_type} ${v.start_time}~${v.end_time} (${v.hours}h)`;
            }
          }
          tip += `</div>`;
        }

        tip += '</div>';
        return tip;
      }
    },
    plotOptions: {
      heatmap: {
        radius: 3,
        enableShades: false,
        colorScale: {
          ranges: [
            { from: 0, to: 0, color: '#f0f0f0', name: '비영업일' },  // 비영업일
            { from: 1, to: 1, color: '#e5e7eb', name: '미입력' },     // empty
            { from: 2, to: 2, color: '#f59e0b', name: '유휴' },       // idle (주황)
            { from: 3, to: 3, color: '#10b981', name: '정상' },       // normal
            { from: 4, to: 4, color: '#ef4444', name: '과중' },       // overload
            { from: 5, to: 5, color: '#1f2937', name: '휴가' }         // vacation
          ]
        }
      }
    },
    xaxis: {
      labels: {
        rotate: -45,
        style: { fontSize: '11px', colors: '#6b7280' },
        formatter: function(val) {
          if (!val) return '';
          const d = new Date(val);
          const mm = String(d.getMonth()+1).padStart(2,'0');
          const dd = String(d.getDate()).padStart(2,'0');
          return `${mm}/${dd}`;
        }
      },
      tooltip: { enabled: false }
    },
    yaxis: {
      labels: { style: { fontSize: '12px', fontWeight: 600, colors: '#374151' } }
    },
    states: {
      hover:    { filter: { type: 'lighten', value: 0.08 } },
      active:   { filter: { type: 'darken',  value: 0.12 } }
    },
    series: series
  };

  document.getElementById('heatmapChart').innerHTML = '';
  heatmapChart = new ApexCharts(document.getElementById('heatmapChart'), opts);
  heatmapChart.render();
}

/* ── 막대 차트 (개인별 비교) ── */
async function loadBarChart(period) {
  console.log('[DIAG-BAR] start period=' + period);
  barPeriod = period;
  const loading = document.querySelector('#barChart .loading-overlay');
  if (loading) loading.style.display = 'flex';

  try {
    // 기간별 날짜 계산
    const { from, to } = getPeriodRange(period);
    console.log('[DIAG-BAR] fetch /api/workload/team?from=' + from + '&to=' + to);
    const r = await fetch(`/api/workload/team?from=${from}&to=${to}`);
    console.log('[DIAG-BAR] response status=' + r.status);
    if (!r.ok) throw new Error('바 차트 API 오류');
    const data = await r.json();
    console.log('[DIAG-BAR] data: members=' + data.members.length + ' dates=' + data.dates.length);

    // 멤버별 합산 — 업무 시간(분→시간) + 휴가 시간(hours)
    const stats = {};
    for (const member of data.members) {
      let workMin = 0, vacH = 0;
      for (const date of data.dates) {
        const cell = data.cells[member] && data.cells[member][date];
        if (!cell) continue;
        if (cell.is_business_day) workMin += (cell.total_minutes || 0);
        for (const v of (cell.vacations || [])) {
          vacH += Number(v.hours) || 0;
        }
      }
      // 총 입력시간(daily) 중에서 휴가시간만큼은 "휴가" 세그먼트로 떼어내고
      // 나머지를 "순 업무" 세그먼트로 표시. (휴가는 daily와 별도 테이블이지만
      // 사용자 멘탈모델은 "정규근무 시간 안에서 휴가가 차지한 부분")
      const totalH = workMin / 60;
      const vacSeg = Math.min(vacH, totalH);                 // 휴가는 총합 안에서만
      const workSeg = Math.max(0, totalH - vacSeg);
      stats[member] = {
        work: Math.round(workSeg * 10) / 10,
        vac:  Math.round(vacSeg * 10) / 10,
      };
      stats[member].total = Math.round(totalH * 10) / 10;
    }

    const sorted = Object.entries(stats).sort((a, b) =>
      barSort === 'desc' ? b[1].total - a[1].total : a[1].total - b[1].total
    );
    const names      = sorted.map(x => x[0]);
    const vacValues  = sorted.map(x => x[1].vac);
    const workValues = sorted.map(x => x[1].work);
    console.log('[DIAG-BAR] work=' + JSON.stringify(workValues) + ' vac=' + JSON.stringify(vacValues));

    if (barChart) { barChart.destroy(); barChart = null; }

    const hasData = workValues.some(v => v > 0) || vacValues.some(v => v > 0);
    if (!hasData) {
      document.getElementById('barChart').innerHTML =
        '<div style="text-align:center;padding:60px 20px;color:var(--gray-400);">' +
        '<i class="fas fa-chart-bar" style="font-size:32px;margin-bottom:10px;display:block;opacity:0.3;"></i>' +
        '이 기간에 입력된 업무가 없습니다.</div>';
      return;
    }

    const opts = {
      chart: {
        type: 'bar',
        stacked: true,
        height: Math.max(300, names.length * 32 + 60),
        toolbar: { show: false },
        animations: { enabled: false }
      },
      plotOptions: {
        bar: {
          horizontal: true,
          borderRadius: 5,
          barHeight: '60%',
        }
      },
      // 휴가(왼쪽) = 검정, 업무(오른쪽) = 초록
      colors: ['#1f2937', '#10b981'],
      dataLabels: {
        enabled: true,
        formatter: v => v > 0 ? `${v}h` : '',
        style: { fontSize: '11.5px', fontWeight: 700, colors: ['#fff'] }
      },
      series: [
        { name: '휴가', data: vacValues },
        { name: '업무', data: workValues },
      ],
      xaxis: {
        categories: names,
        labels: { style: { fontSize: '12px', fontWeight: 600, colors: '#374151' }, formatter: v => `${v}h` }
      },
      yaxis: { labels: { style: { fontSize: '12.5px', fontWeight: 600 } } },
      legend: { show: true, position: 'top', horizontalAlign: 'right', fontSize: '12px', fontWeight: 600,
                markers: { width: 12, height: 12, radius: 3 } },
      tooltip: {
        shared: true, intersect: false,
        y: { formatter: v => `${v}h` }
      },
      grid: { borderColor: '#f3f4f6' }
    };

    document.getElementById('barChart').innerHTML = '';
    barChart = new ApexCharts(document.getElementById('barChart'), opts);
    barChart.render();
  } catch(e) {
    console.error('바 차트 로드 실패:', e);
    document.getElementById('barChart').innerHTML =
      '<div style="text-align:center;padding:40px;color:var(--gray-400);">데이터를 불러오지 못했습니다.</div>';
  }
}

function getPeriodRange(period) {
  const today = new Date();
  let from, to;
  if (period === 'week') {
    // 이번 주 전체: 월요일 ~ 일요일 (미래 일자 입력도 포함되도록 to를 오늘이 아닌 일요일로)
    const day = today.getDay();
    const monday = new Date(today);
    monday.setDate(today.getDate() - (day === 0 ? 6 : day - 1));
    const sunday = new Date(monday);
    sunday.setDate(monday.getDate() + 6);
    from = dateStr(monday);
    to   = dateStr(sunday);
  } else if (period === 'month') {
    from = dateStr(new Date(today.getFullYear(), today.getMonth(), 1));
    to   = dateStr(new Date(today.getFullYear(), today.getMonth() + 1, 0));
  } else { // quarter
    const q = Math.floor(today.getMonth() / 3);
    from = dateStr(new Date(today.getFullYear(), q * 3, 1));
    to   = dateStr(new Date(today.getFullYear(), q * 3 + 3, 0));
  }
  return { from, to };
}

function switchPeriod(period, btn) {
  document.querySelectorAll('#periodToggle .toggle-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadBarChart(period);
}

function switchSort(sort, btn) {
  barSort = sort;
  document.querySelectorAll('#sortToggle .toggle-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadBarChart(barPeriod);
}

/* ── 업무유형별 분포 (이번 달, ApexCharts 미사용 정적 차트) ── */
async function loadDonut(from, to) {
  console.log('[DIAG-DONUT] start from=' + from + ' to=' + to);
  const container = document.getElementById('donutChart');
  if (!container) { console.log('[DIAG-DONUT] container not found'); return; }
  const showEmpty = (msg) => {
    container.innerHTML =
      '<div style="text-align:center;padding:40px 20px;color:var(--gray-400);">' +
      '<i class="fas fa-chart-pie" style="font-size:32px;margin-bottom:10px;display:block;opacity:0.3;"></i>' +
      msg + '</div>';
  };
  // 컨테이너 헤더 라벨 업데이트 (이번 달 표기)
  const ym = (from || '').slice(0, 7);
  const headerEl = document.querySelector('#donutChart')?.closest('.chart-card')?.querySelector('.chart-card-title');
  if (headerEl && ym) {
    const [y, m] = ym.split('-');
    headerEl.textContent = `업무유형별 분포 (${y}년 ${parseInt(m,10)}월)`;
  }

  try {
    console.log('[DIAG-DONUT] fetch by-type');
    const r = await fetch(`/api/workload/by-type?from=${from}&to=${to}&scope=team`);
    console.log('[DIAG-DONUT] status=' + r.status);
    if (!r.ok) throw new Error('도넛 API status=' + r.status);
    const data = await r.json();
    const rawItems = Array.isArray(data?.items) ? data.items : [];
    const items = rawItems
      .filter(x => x && Number(x.minutes) > 0)
      .sort((a, b) => b.minutes - a.minutes);
    console.log('[DIAG-DONUT] items count=' + items.length);

    if (donutChart) {
      try { donutChart.destroy(); } catch(_) {}
      donutChart = null;
    }
    if (!items.length) {
      showEmpty('이 달에 입력된 업무가 없습니다.');
      return;
    }

    const COLORS = ['#4f86f7','#10b981','#f59e0b','#8b5cf6','#ef4444','#06b6d4','#84cc16','#f97316','#ec4899','#14b8a6'];
    const totalMin = items.reduce((s, x) => s + Number(x.minutes || 0), 0);
    const totalH = Math.round(totalMin / 6) / 10;

    // SVG 도넛 (ApexCharts 미사용 — 안정적 렌더 보장)
    const cx = 100, cy = 100, rOuter = 80, rInner = 50;
    let cum = 0;
    const arcs = items.map((it, i) => {
      const frac = it.minutes / totalMin;
      const a0 = cum * 2 * Math.PI - Math.PI / 2;
      cum += frac;
      const a1 = cum * 2 * Math.PI - Math.PI / 2;
      const large = frac > 0.5 ? 1 : 0;
      const x0o = cx + rOuter * Math.cos(a0), y0o = cy + rOuter * Math.sin(a0);
      const x1o = cx + rOuter * Math.cos(a1), y1o = cy + rOuter * Math.sin(a1);
      const x0i = cx + rInner * Math.cos(a1), y0i = cy + rInner * Math.sin(a1);
      const x1i = cx + rInner * Math.cos(a0), y1i = cy + rInner * Math.sin(a0);
      // 단일 항목(360도)일 때는 두 개의 반호로 분리
      if (frac >= 0.999) {
        return `<circle cx="${cx}" cy="${cy}" r="${(rOuter+rInner)/2}" fill="none" stroke="${COLORS[i%COLORS.length]}" stroke-width="${rOuter-rInner}"/>`;
      }
      const d = [
        `M ${x0o.toFixed(2)} ${y0o.toFixed(2)}`,
        `A ${rOuter} ${rOuter} 0 ${large} 1 ${x1o.toFixed(2)} ${y1o.toFixed(2)}`,
        `L ${x0i.toFixed(2)} ${y0i.toFixed(2)}`,
        `A ${rInner} ${rInner} 0 ${large} 0 ${x1i.toFixed(2)} ${y1i.toFixed(2)}`,
        'Z'
      ].join(' ');
      return `<path d="${d}" fill="${COLORS[i%COLORS.length]}"/>`;
    }).join('');

    const legend = items.map((it, i) => {
      const pct = Math.round((it.minutes / totalMin) * 100);
      const hours = Math.round((it.minutes / 60) * 10) / 10;
      return `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;font-size:12.5px;">
        <span style="width:12px;height:12px;border-radius:3px;background:${COLORS[i%COLORS.length]};flex-shrink:0;"></span>
        <span style="flex:1;color:var(--gray-700);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${escapeHtml(it.label)}">${escapeHtml(it.label)}</span>
        <span style="color:var(--gray-500);font-weight:600;flex-shrink:0;">${hours}h · ${pct}%</span>
      </div>`;
    }).join('');

    container.innerHTML = `
      <div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap;justify-content:center;padding:8px 4px;">
        <div style="position:relative;flex-shrink:0;">
          <svg width="200" height="200" viewBox="0 0 200 200">${arcs}</svg>
          <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;">
            <div style="font-size:11px;color:var(--gray-500);font-weight:600;">총 시간</div>
            <div style="font-size:22px;font-weight:800;color:var(--gray-900);">${totalH}h</div>
          </div>
        </div>
        <div style="flex:1;min-width:180px;max-width:280px;">${legend}</div>
      </div>`;
    console.log('[DIAG-DONUT] rendered SVG OK');
  } catch(e) {
    console.error('[DIAG-DONUT] error:', e);
    showEmpty('데이터를 불러오지 못했습니다.');
  }
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ── 일별 상세 모달 (시간대 세그먼트 표시) ── */
async function openDetailModal(member, date, meta) {
  const modal = document.getElementById('detailModal');
  const title = document.getElementById('detailModalTitle');
  const body  = document.getElementById('detailModalBody');

  const statusLabel = { overload: '과중', normal: '정상', idle: '유휴', empty: '미입력', vacation: '휴가' };
  const statusColor = { overload: '#ef4444', normal: '#10b981', idle: '#9ca3af', empty: '#9ca3af', vacation: '#1f2937' };

  // 요일 이름
  const DOW = ['일','월','화','수','목','금','토'];
  const dateObj = new Date(date + 'T00:00:00');
  const dow = DOW[dateObj.getDay()];

  title.innerHTML = `<i class="fas fa-calendar-day" style="margin-right:8px;color:var(--primary);"></i>${date} (${dow}) — ${member}`;
  body.innerHTML = `<div style="text-align:center;padding:24px;"><div class="spinner" style="margin:auto;"></div></div>`;
  modal.classList.add('show');

  try {
    const r = await fetch(`/tables/daily_work_entries?limit=500`);
    const all  = r.ok ? (await r.json()) : { rows: [] };
    // 해당 멤버의 모든 엔트리 중 이 날짜를 포함하는 것 필터
    const rows = (all.rows || all.data || all || [])
      .filter(x => x.member_name === member);

    let html = '';

    if (meta) {
      const hours    = meta.total_minutes ? Math.round(meta.total_minutes / 6) / 10 : 0;
      const statusStr = meta.status ? (statusLabel[meta.status] || '-') : '미입력';
      const isHoliday = !meta.is_business_day;
      html += `<div class="detail-summary">
        <div class="detail-stat"><strong>${hours}h</strong> 투입</div>
        <div class="detail-stat"><strong style="color:${statusColor[meta.status] || '#9ca3af'};">${statusStr}</strong></div>
        ${isHoliday
          ? `<div class="detail-stat"><strong>${meta.holiday_name || '비영업일'}</strong></div>`
          : `<div class="detail-stat">부하율 <strong>${Math.round(meta.load_pct || 0)}%</strong></div>`}
      </div>`;
    }

    // 해당 날짜 세그먼트 추출: time_entries 배열에서 date===date 인 것만 꺼냄
    const segments = [];
    for (const row of rows) {
      const entries = row.time_entries || [];
      for (const e of entries) {
        if (e.date === date) {
          segments.push({
            label:     row.task_label || '기타',
            cat:       row.task_category_id,
            start:     e.start,
            end:       e.end,
            minutes:   e.minutes || 0,
            is_estimated: row.is_estimated,
            row_id:    row.id,
          });
        }
      }
      // time_entries가 없는 경우 work_date 기반 fallback
      if (!entries.length && (row.work_date === date || row.start_date === date)) {
        segments.push({
          label:   row.task_label || '기타',
          cat:     row.task_category_id,
          start:   null,
          end:     null,
          minutes: row.duration_minutes || row.total_minutes || 0,
          is_estimated: row.is_estimated,
          row_id:  row.id,
        });
      }
    }

    // 시작시간 기준 정렬
    segments.sort((a, b) => (a.start || '').localeCompare(b.start || ''));

    if (!segments.length) {
      html += `<div class="entry-empty"><i class="fas fa-inbox" style="font-size:28px;display:block;margin-bottom:8px;color:var(--gray-300);"></i>이 날짜에 입력된 업무가 없습니다.</div>`;
    } else {
      const totalMin = segments.reduce((s, sg) => s + (sg.minutes || 0), 0);
      const totalH   = Math.round(totalMin / 6) / 10;
      const loadPct  = meta ? Math.round(meta.load_pct || 0) : 0;

      html += `<div class="entry-list">`;
      for (const sg of segments) {
        const hh = Math.floor(sg.minutes / 60);
        const mm = sg.minutes % 60;
        const dur = hh > 0 ? `${hh}h${mm > 0 ? ' ' + mm + 'm' : ''}` : `${mm}m`;
        const timeRange = sg.start && sg.end
          ? `<span style="font-size:12px;font-weight:700;color:#374151;min-width:112px;">${sg.start} ~ ${sg.end}</span>`
          : `<span style="font-size:11px;color:#9ca3af;min-width:112px;">시간 미입력</span>`;
        const estBadge = sg.is_estimated
          ? `<span style="font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px;background:#dbeafe;color:#1d4ed8;margin-left:4px;">추정</span>`
          : '';
        html += `<div class="entry-item" style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
          ${timeRange}
          <span class="entry-cat" style="flex-shrink:0;">${sg.label}</span>
          ${estBadge}
          <span class="entry-duration" style="margin-left:auto;">(${dur})</span>
        </div>`;
      }
      html += `</div>
      <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--gray-100);
        display:flex;gap:20px;font-size:13px;color:var(--gray-600);">
        <span>총 <strong style="color:var(--gray-900);">${totalH}h</strong></span>
        <span>부하율 <strong style="color:${loadPct > 120 ? '#ef4444' : loadPct > 70 ? '#10b981' : '#9ca3af'};">${loadPct}%</strong></span>
      </div>`;
    }


    // 휴가 섹션 추가
    const vacations = (meta && Array.isArray(meta.vacations)) ? meta.vacations : [];
    if (vacations.length) {
      const isFullVac = meta && meta.is_full_vacation;
      html += `<div class="vacation-section">
        <div class="vacation-section-title">
          <span>🏖️</span>
          <span>${isFullVac ? '전일 휴가' : '부분 휴가'}</span>
        </div>
        <div class="vacation-badge-row">`;
      for (const v of vacations) {
        const timeStr = (v.start_time && v.end_time) ? `${v.start_time}~${v.end_time}` : '';
        const hStr = v.hours != null ? `${v.hours}h` : '';
        html += `<div class="vacation-entry">
          <span class="vacation-type-chip">${v.vacation_type || '-'}</span>
          ${timeStr ? `<span class="vacation-time">${timeStr}</span>` : ''}
          ${hStr ? `<span style="font-weight:700;color:#374151;">${hStr}</span>` : ''}
          ${v.note ? `<span style="color:#9ca3af;font-size:11px;">${escapeHtml(v.note)}</span>` : ''}
        </div>`;
      }
      html += `</div>
      </div>`;
    }

        body.innerHTML = html;
  } catch(e) {
    body.innerHTML = `<div class="entry-empty">데이터를 불러오지 못했습니다.</div>`;
  }
}

async function exportTeamReport() {
  const btn = document.getElementById('btnExportXlsx');
  const orig = btn ? btn.innerHTML : '';
  if (btn) { btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 생성 중...'; }
  try {
    const today = new Date();
    const year = today.getFullYear();
    const curMonth = today.getMonth() + 1;
    const [users, dwes, tasks, caches, items] = await Promise.all([
      fetchTbl('users', 500),
      fetchTbl('daily_work_entries', 20000),
      fetchTbl('work_tasks', 1000),
      fetchTbl('workload_daily_cache', 20000),
      fetchTbl('settle_items', 200),
    ]);
    const members = users
      .filter(u => u.is_active !== false && u.full_name)
      .sort((a,b) => (a.full_name||'').localeCompare(b.full_name||'','ko'));
    const itemMap = Object.fromEntries(items.map(s => [s.id, s]));
    const wb = XLSX.utils.book_new();
    for (let m = 1; m <= curMonth; m++) {
      const ws = buildMonthSheet(year, m, members, dwes, tasks, caches, itemMap);
      XLSX.utils.book_append_sheet(wb, ws, `${year}년 ${m}월`);
    }
    XLSX.writeFile(wb, `팀_업무_종합리포트_${year}.xlsx`);
    Portal.showToast('엑셀 다운로드 완료', 'success');
  } catch (e) {
    console.error('엑셀 생성 실패:', e);
    Portal.showToast('엑셀 생성 실패: ' + (e.message || '알 수 없음'), 'error');
  } finally {
    if (btn) { btn.disabled = false; btn.innerHTML = orig; }
  }
}

async function fetchTbl(name, limit) {
  const r = await fetch(`/tables/${name}?limit=${limit || 500}`);
  if (!r.ok) throw new Error(`${name} fetch 실패`);
  const d = await r.json();
  return d.rows || d.data || [];
}
function parseArr(v) {
  if (Array.isArray(v)) return v;
  if (typeof v === 'string') { try { const p = JSON.parse(v); return Array.isArray(p) ? p : []; } catch { return []; } }
  return [];
}
function parseObj(v) {
  if (v && typeof v === 'object' && !Array.isArray(v)) return v;
  if (typeof v === 'string') { try { const p = JSON.parse(v); return (p && typeof p === 'object' && !Array.isArray(p)) ? p : {}; } catch { return {}; } }
  return {};
}
function hr(min) { return min ? Math.round(min / 60 * 10) / 10 : 0; }

// 셀 한 칸 세팅 — v가 빈 문자열이면 빈 셀이지만 스타일(테두리) 유지
function putCell(ws, r, c, v, s) {
  const addr = XLSX.utils.encode_cell({ r, c });
  const cell = { v: v == null ? '' : v };
  if (typeof v === 'number') cell.t = 'n';
  else cell.t = 's';
  if (s) cell.s = s;
  ws[addr] = cell;
}
function mergeRange(ws, r1, c1, r2, c2) {
  ws['!merges'] = ws['!merges'] || [];
  ws['!merges'].push({ s: { r: r1, c: c1 }, e: { r: r2, c: c2 } });
}

function pickHeatStyle(h) {
  if (!h || h === 0) return ST.cellEmpty;
  if (h >= 8) return ST.cellHigh;
  if (h >= 4) return ST.cellMid;
  return ST.cellLow;
}
function pickCatStyle(h) {
  if (!h || h === 0) return ST.cellEmpty;
  if (h >= 16) return ST.cellGreenHigh;
  if (h >= 8) return ST.cellGreenMid;
  return ST.cellGreenLow;
}

function buildMonthSheet(year, month, members, dwes, tasks, caches, itemMap) {
  const ymPrefix = `${year}-${String(month).padStart(2,'0')}`;
  const daysInMonth = new Date(year, month, 0).getDate();
  const dwesMonth = dwes.filter(e => (e.end_date || e.work_date || '').startsWith(ymPrefix));

  // ── 데이터 사전 계산 ──
  const heatData = {};
  for (const u of members) {
    heatData[u.full_name] = { total: 0, byDay: {} };
    for (let d = 1; d <= daysInMonth; d++) {
      const date = `${ymPrefix}-${String(d).padStart(2,'0')}`;
      const c = caches.find(x => x.member_name === u.full_name && (x.work_date || x.date || x.day) === date);
      const min = (c && c.total_minutes) || 0;
      heatData[u.full_name].byDay[d] = min;
      heatData[u.full_name].total += min;
    }
  }
  const catSet = new Set();
  for (const e of dwesMonth) catSet.add(e.task_category || '기타');
  const catList = Array.from(catSet).sort((a,b) => a.localeCompare(b, 'ko'));
  const catData = {};
  for (const u of members) {
    catData[u.full_name] = { total: 0, byCat: {} };
    for (const e of dwesMonth) {
      if (e.member_name !== u.full_name) continue;
      const cat = e.task_category || '기타';
      catData[u.full_name].byCat[cat] = (catData[u.full_name].byCat[cat] || 0) + (e.duration_minutes || 0);
      catData[u.full_name].total += (e.duration_minutes || 0);
    }
  }
  // KPI
  const totalMin = members.reduce((s, u) => s + heatData[u.full_name].total, 0);
  const taskCount = dwesMonth.length;
  const activeCount = members.filter(u => heatData[u.full_name].total > 0).length;
  let topName = '-', topMin = 0;
  for (const u of members) {
    if (heatData[u.full_name].total > topMin) { topMin = heatData[u.full_name].total; topName = u.full_name; }
  }

  // 업무리스트 데이터
  const workList = [];
  for (const u of members) {
    const task = tasks.find(t =>
      (t.member_name || t.target_name) === u.full_name &&
      String(t.year) === String(year) && String(t.month) === String(month));
    if (!task) { workList.push({ name: u.full_name, kind:'(이번 달 작업 없음)', title:'', cat:'', start:'', end:'', hr:'', note:'' }); continue; }
    const done = parseArr(task.settlement_done);
    const dates = parseObj(task.settlement_dates);
    const stDates = parseObj(task.settlement_start_dates);
    const deadlines = parseObj(task.settlement_deadline_days);
    for (const sid of done) {
      const item = itemMap[sid] || {};
      const dd = deadlines[sid];
      const ddLabel = (dd == null || dd === '') ? '' : (Number(dd) > 0 ? `D+${dd}` : (Number(dd) < 0 ? `D${dd}` : 'D-day'));
      workList.push({
        name: u.full_name, kind:'결산',
        title: item.label || sid,
        cat: item.group_name || '결산',
        start: stDates[sid] || dates[sid] || '',
        end: dates[sid] || '',
        hr: '', note: ddLabel,
      });
    }
    const others = parseArr(task.other_tasks);
    for (const ot of others) {
      workList.push({
        name: u.full_name, kind:'결산외',
        title: ot.desc || ot.label || ot.title || ot.name || '',
        cat: ot.cat || ot.category || ot.task_category || '기타',
        start: ot.start_date || ot.start || '',
        end: ot.end_date || ot.end || '',
        hr: ot.minutes ? hr(ot.minutes) : (ot.hours || ''),
        note: ot.note || '',
      });
    }
    if (task.raw_directive != null || task.raw_csm_amount != null ||
        task.raw_meeting_count != null || task.raw_deadline_days != null) {
      workList.push({
        name: u.full_name, kind:'정량 raw',
        title: `지시 ${task.raw_directive ?? '-'} / CSM ${task.raw_csm_amount ?? '-'}억 / 회의 ${task.raw_meeting_count ?? '-'}회`,
        cat: '정량 KPI', start:'', end:'', hr:'', note: `마감 ${task.raw_deadline_days ?? '-'}`,
      });
    }
  }

  // ── 시트 구성 ──
  const ws = {};
  ws['!merges'] = [];
  const heatCols = daysInMonth + 2;     // 멤버 + 일자 + 월합계 (히트맵 너비)
  const widestCol = Math.max(heatCols, catList.length + 2, 8);  // 8 = 업무리스트 열 수
  let r = 0;

  // [Row 0] 타이틀
  putCell(ws, r, 0, `팀 업무 종합 리포트  |  ${year}년 ${month}월`, ST.title);
  mergeRange(ws, r, 0, r, widestCol - 1);
  ws['!rows'] = ws['!rows'] || [];
  ws['!rows'][r] = { hpt: 32 };
  r++;

  // [Row 1] 서브타이틀
  putCell(ws, r, 0, `기준 시트: ${year}년 ${month}월 · 일자별 투입시간 / 카테고리별 합계 / 개인별 업무리스트`, ST.subtitle);
  mergeRange(ws, r, 0, r, widestCol - 1);
  ws['!rows'][r] = { hpt: 18 };
  r++;

  // [Row 2] 빈 행
  r++;

  // [Rows 3-4] KPI 4종 카드 — 4개 컬럼 분할
  const kpis = [
    { label: '총 투입시간', value: `${hr(totalMin)}h`,    color: '2563EB' },
    { label: '업무 등록건수', value: `${taskCount}건`,     color: '059669' },
    { label: '참여 인원',    value: `${activeCount}명`,    color: 'D97706' },
    { label: '최다 투입자',  value: `${topName} (${hr(topMin)}h)`, color: '7C3AED' },
  ];
  const kpiBlockWidth = Math.floor(widestCol / 4);
  for (let i = 0; i < 4; i++) {
    const c1 = i * kpiBlockWidth;
    const c2 = (i === 3) ? widestCol - 1 : (i + 1) * kpiBlockWidth - 1;
    putCell(ws, r, c1, kpis[i].label, ST.kpiLabel);
    mergeRange(ws, r, c1, r, c2);
    putCell(ws, r + 1, c1, kpis[i].value, { ...ST.kpiValue, font: { ...ST.kpiValue.font, color: { rgb: kpis[i].color } } });
    mergeRange(ws, r + 1, c1, r + 1, c2);
  }
  ws['!rows'][r] = { hpt: 22 };
  ws['!rows'][r + 1] = { hpt: 40 };
  r += 3;  // 카드 2줄 + 빈 줄

  // [01] 일자별 투입시간 히트맵 ──────────────────────
  putCell(ws, r, 0, '  01  일자별 투입시간 히트맵', ST.section);
  mergeRange(ws, r, 0, r, heatCols - 1);
  ws['!rows'][r] = { hpt: 26 };
  r++;
  // 헤더 행
  putCell(ws, r, 0, '멤버명', ST.tHead);
  for (let d = 1; d <= daysInMonth; d++) putCell(ws, r, d, `${d}일`, ST.tHead);
  putCell(ws, r, daysInMonth + 1, '월합계(h)', ST.tHeadTot);
  ws['!rows'][r] = { hpt: 22 };
  r++;
  // 멤버 데이터
  for (const u of members) {
    putCell(ws, r, 0, u.full_name, ST.rowName);
    for (let d = 1; d <= daysInMonth; d++) {
      const h = hr(heatData[u.full_name].byDay[d]);
      putCell(ws, r, d, h > 0 ? h : '', pickHeatStyle(h));
    }
    const tot = hr(heatData[u.full_name].total);
    putCell(ws, r, daysInMonth + 1, tot > 0 ? tot : '', ST.cellTotal);
    r++;
  }
  r++;  // 빈 행

  // [02] 개인별 · 카테고리별 투입시간 ──────────────────────
  const catCols = catList.length + 2;  // 멤버 + 카테고리들 + 총합
  putCell(ws, r, 0, '  02  개인별 · 카테고리별 투입시간', ST.section);
  mergeRange(ws, r, 0, r, Math.max(catCols, heatCols) - 1);
  ws['!rows'][r] = { hpt: 26 };
  r++;
  putCell(ws, r, 0, '멤버명', ST.tHead);
  for (let i = 0; i < catList.length; i++) putCell(ws, r, i + 1, catList[i], ST.tHead);
  putCell(ws, r, catList.length + 1, '총합(h)', ST.tHeadTot);
  ws['!rows'][r] = { hpt: 22 };
  r++;
  for (const u of members) {
    putCell(ws, r, 0, u.full_name, ST.rowName);
    for (let i = 0; i < catList.length; i++) {
      const h = hr(catData[u.full_name].byCat[catList[i]] || 0);
      putCell(ws, r, i + 1, h > 0 ? h : '', pickCatStyle(h));
    }
    const tot = hr(catData[u.full_name].total);
    putCell(ws, r, catList.length + 1, tot > 0 ? tot : '', ST.cellTotal);
    r++;
  }
  r++;

  // [03] 개인별 업무리스트 ──────────────────────
  putCell(ws, r, 0, '  03  개인별 업무리스트', ST.section);
  mergeRange(ws, r, 0, r, 7);
  ws['!rows'][r] = { hpt: 26 };
  r++;
  const workHeaders = ['멤버명', '구분', '업무명', '카테고리/분류', '시작', '종료', '시간(h)', '비고'];
  for (let i = 0; i < workHeaders.length; i++) putCell(ws, r, i, workHeaders[i], ST.tHead);
  ws['!rows'][r] = { hpt: 22 };
  r++;
  for (const w of workList) {
    putCell(ws, r, 0, w.name, ST.rowName);
    const kindStyle = w.kind === '결산' ? ST.cellTag : (w.kind === '결산외' ? ST.cellTagGreen : ST.cellCenter);
    putCell(ws, r, 1, w.kind, kindStyle);
    putCell(ws, r, 2, w.title, ST.cellText);
    putCell(ws, r, 3, w.cat, ST.cellCenter);
    putCell(ws, r, 4, w.start, ST.cellCenter);
    putCell(ws, r, 5, w.end, ST.cellCenter);
    putCell(ws, r, 6, w.hr || '', ST.cellCenter);
    putCell(ws, r, 7, w.note || '', ST.cellCenter);
    ws['!rows'][r] = { hpt: 20 };
    r++;
  }
  r++;

  // [04] 개인별 월합계 요약 ──────────────────────
  putCell(ws, r, 0, '  04  개인별 월합계 요약', ST.section);
  mergeRange(ws, r, 0, r, 1);
  ws['!rows'][r] = { hpt: 26 };
  r++;
  putCell(ws, r, 0, '멤버명', ST.tHead);
  putCell(ws, r, 1, '월합계(h)', ST.tHeadTot);
  ws['!rows'][r] = { hpt: 22 };
  r++;
  for (const u of members) {
    putCell(ws, r, 0, u.full_name, ST.rowName);
    const tot = hr(heatData[u.full_name].total);
    putCell(ws, r, 1, tot > 0 ? tot : '', ST.cellTotal);
    r++;
  }

  // 컬럼 너비
  const cols = [{ wch: 14 }];                       // A: 멤버명
  for (let d = 1; d <= daysInMonth; d++) cols.push({ wch: 5 });  // 일자
  cols.push({ wch: 12 });                            // 월합계
  // 카테고리 영역이 더 넓을 수 있으므로 max로 확장
  while (cols.length < Math.max(catCols, 8)) cols.push({ wch: 10 });
  ws['!cols'] = cols;

  // 시트 범위
  ws['!ref'] = XLSX.utils.encode_range({ s: { r: 0, c: 0 }, e: { r: r - 1, c: widestCol - 1 } });

  return ws;
}
</script>
