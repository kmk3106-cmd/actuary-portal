<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>팀 업무량 모니터링 - 계리결산팀 운영관리포탈</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/main.css?v=2">
  <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
  <style>
    /* ── 팀 업무량 모니터링 전용 스타일 ── */

    /* KPI 카드 그리드 */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }
    .kpi-card {
      background: white;
      border-radius: 14px;
      border: 1px solid var(--gray-200);
      padding: 20px 22px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      position: relative;
      overflow: hidden;
      transition: box-shadow 0.2s, transform 0.2s;
    }
    .kpi-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.08); transform: translateY(-1px); }
    .kpi-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      border-radius: 14px 14px 0 0;
    }
    .kpi-card.blue::before  { background: linear-gradient(90deg, #4f86f7, #818cf8); }
    .kpi-card.green::before { background: linear-gradient(90deg, #10b981, #34d399); }
    .kpi-card.red::before   { background: linear-gradient(90deg, #ef4444, #f87171); }
    .kpi-card.gray::before  { background: linear-gradient(90deg, #9ca3af, #d1d5db); }
    .kpi-card.yellow::before{ background: linear-gradient(90deg, #f59e0b, #fbbf24); }
    .kpi-label { font-size: 12px; font-weight: 600; color: var(--gray-500); text-transform: uppercase; letter-spacing: 0.05em; }
    .kpi-value { font-size: 32px; font-weight: 800; color: var(--gray-900); line-height: 1.1; }
    .kpi-value span.unit { font-size: 15px; font-weight: 500; color: var(--gray-500); margin-left: 4px; }
    .kpi-sub  { font-size: 12.5px; color: var(--gray-500); }
    .kpi-icon {
      position: absolute; right: 18px; top: 18px;
      font-size: 28px; opacity: 0.1;
    }
    .kpi-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 9px; border-radius: 20px;
      font-size: 12px; font-weight: 700;
      width: fit-content;
    }
    .kpi-badge.red    { background: #fee2e2; color: #b91c1c; }
    .kpi-badge.gray   { background: var(--gray-100); color: var(--gray-600); }
    .kpi-badge.yellow { background: #fef3c7; color: #92400e; }

    /* 섹션 레이아웃 */
    .section-row {
      display: grid;
      gap: 20px;
      margin-bottom: 24px;
    }
    .section-row.two-col { grid-template-columns: 1fr 1fr; }
    .section-row.three-col { grid-template-columns: 2fr 1fr; }

    /* 차트 카드 */
    .chart-card {
      background: white;
      border-radius: 14px;
      border: 1px solid var(--gray-200);
      overflow: hidden;
    }
    .chart-card-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--gray-100);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .chart-card-title {
      font-size: 15px; font-weight: 700; color: var(--gray-900); flex: 1;
    }
    .chart-card-body { padding: 16px 20px; }
    .chart-icon {
      width: 32px; height: 32px; border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0;
    }
    .chart-icon.blue   { background: #dbeafe; color: #1d4ed8; }
    .chart-icon.green  { background: #d1fae5; color: #059669; }
    .chart-icon.yellow { background: #fef3c7; color: #d97706; }
    .chart-icon.purple { background: #ede9fe; color: #7c3aed; }
    .chart-icon.red    { background: #fee2e2; color: #b91c1c; }

    /* 히트맵 컨테이너 */
    .heatmap-scroll-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    #heatmapChart { min-width: 900px; }

    /* 날짜 범위 선택기 */
    .date-range-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .date-range-row input[type="date"] {
      padding: 7px 11px;
      border: 1.5px solid var(--gray-200);
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      color: var(--gray-700);
      background: white;
      cursor: pointer;
    }
    .date-range-row input[type="date"]:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(79,134,247,0.12);
    }

    /* 토글 버튼 그룹 */
    .toggle-group {
      display: flex;
      gap: 0;
      border: 1.5px solid var(--gray-200);
      border-radius: 9px;
      overflow: hidden;
    }
    .toggle-btn {
      padding: 6px 14px;
      background: white;
      border: none;
      font-size: 12.5px;
      font-weight: 600;
      color: var(--gray-500);
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }
    .toggle-btn + .toggle-btn { border-left: 1.5px solid var(--gray-200); }
    .toggle-btn:hover { background: var(--gray-50); color: var(--gray-700); }
    .toggle-btn.active { background: var(--primary); color: white; }

    /* 알림 패널 */
    .alert-panel {
      background: white;
      border-radius: 14px;
      border: 1px solid var(--gray-200);
      overflow: hidden;
    }
    .alert-panel-header {
      padding: 14px 18px;
      border-bottom: 1px solid var(--gray-100);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .alert-panel-title { font-size: 14px; font-weight: 700; color: var(--gray-900); flex: 1; }
    .alert-count-badge {
      display: inline-flex; align-items: center; justify-content: center;
      width: 20px; height: 20px;
      border-radius: 50%;
      font-size: 11px; font-weight: 700;
      background: #fee2e2; color: #b91c1c;
    }
    .alert-section-label {
      padding: 8px 14px 4px;
      font-size: 10px; font-weight: 700;
      color: var(--gray-400);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      background: var(--gray-50);
      border-bottom: 1px solid var(--gray-100);
    }
    .alert-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--gray-100);
      font-size: 13px;
    }
    .alert-item:last-child { border-bottom: none; }
    .alert-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .alert-dot.red    { background: #ef4444; }
    .alert-dot.gray   { background: #9ca3af; }
    .alert-dot.yellow { background: #f59e0b; }
    .alert-name { font-weight: 600; color: var(--gray-800); flex: 1; }
    .alert-desc { font-size: 12px; color: var(--gray-500); }
    .alert-empty {
      padding: 16px 14px;
      text-align: center;
      font-size: 12.5px;
      color: var(--gray-400);
    }

    /* 히트맵 범례 */
    .legend-row {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      padding: 10px 0 4px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: var(--gray-600);
    }
    .legend-dot {
      width: 12px; height: 12px;
      border-radius: 3px;
    }
    .legend-dot.overload { background: #ef4444; }
    .legend-dot.normal   { background: #10b981; }
    .legend-dot.idle     { background: #9ca3af; }
    .legend-dot.empty    { background: #f3f4f6; border: 1px solid #d1d5db; }
    .legend-dot.holiday  {
      background: repeating-linear-gradient(
        -45deg, #f3f4f6 0 2px, #e5e7eb 2px 4px
      );
      border: 1px solid #d1d5db;
    }

    /* 모달 - 일별 상세 */
    .entry-list { display: flex; flex-direction: column; gap: 8px; }
    .entry-item {
      background: var(--gray-50);
      border-radius: 10px;
      padding: 12px 14px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .entry-cat {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
      background: #dbeafe;
      color: #1d4ed8;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .entry-label { font-size: 13.5px; color: var(--gray-800); flex: 1; line-height: 1.5; }
    .entry-duration {
      font-size: 12.5px;
      font-weight: 700;
      color: var(--primary);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .entry-empty {
      text-align: center;
      padding: 24px;
      color: var(--gray-400);
      font-size: 13.5px;
    }
    .detail-summary {
      background: var(--gray-50);
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 16px;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }
    .detail-stat { font-size: 13px; color: var(--gray-600); }
    .detail-stat strong { color: var(--gray-900); font-weight: 700; }

    /* 접근 거부 */
    .access-gate {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 60px 20px;
      text-align: center;
    }
    .access-gate-icon {
      width: 72px; height: 72px;
      border-radius: 20px;
      background: #fee2e2;
      display: flex; align-items: center; justify-content: center;
      font-size: 32px;
      color: #b91c1c;
    }
    .access-gate h2 { font-size: 22px; font-weight: 700; color: var(--gray-900); }
    .access-gate p  { font-size: 14px; color: var(--gray-500); max-width: 360px; line-height: 1.7; }

    /* 로딩 스피너 */
    .loading-overlay {
      position: absolute; inset: 0;
      background: rgba(255,255,255,0.85);
      display: flex; align-items: center; justify-content: center;
      border-radius: 14px;
      z-index: 10;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--gray-200);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 반응형 */
    @media (max-width: 1024px) {
      .kpi-grid { grid-template-columns: repeat(2, 1fr); }
      .section-row.three-col { grid-template-columns: 1fr; }
    }
    @media (max-width: 768px) {
      .kpi-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
      .section-row.two-col { grid-template-columns: 1fr; }
      .section-row.three-col { grid-template-columns: 1fr; }
      .chart-card-body { padding: 12px; }
      .date-range-row { gap: 6px; }
    }
    @media (max-width: 480px) {
      .kpi-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
      .kpi-value { font-size: 24px; }
    }
  </style>
</head>
<body>
<div class="app-layout">
  <!-- 사이드바: portal.js가 주입 -->
  <main class="main-content">
    <header class="page-header">
      <div class="page-title">
        <i class="fas fa-users" style="color:#4f86f7;margin-right:8px;"></i>
        팀 업무량 모니터링
        <small id="dateRangeLabel"></small>
      </div>
      <div class="header-actions">
        <div class="date-range-row">
          <input type="date" id="fromDate" title="시작일">
          <span style="color:var(--gray-400);font-size:13px;">~</span>
          <input type="date" id="toDate" title="종료일">
          <button class="btn btn-primary btn-sm" onclick="loadAll()">
            <i class="fas fa-sync-alt"></i> 조회
          </button>
        </div>
      </div>
    </header>

    <div class="content-body" id="pageBody">
      <!-- 권한 게이트: JS가 렌더 -->
    </div>
  </main>
</div>

<!-- 일별 상세 모달 -->
<div class="modal-overlay" id="detailModal">
  <div class="modal" style="max-width:560px">
    <div class="modal-header">
      <span class="modal-title" id="detailModalTitle">업무 상세</span>
      <button class="modal-close" onclick="closeDetailModal()" aria-label="닫기">
        <i class="fas fa-times"></i>
      </button>
    </div>
    <div class="modal-body" id="detailModalBody"></div>
  </div>
</div>

<script src="js/auth.js"></script>
<script src="js/portal.js"></script>
<script>
/* ── 초기화 ── */
let currentUser = null;
let heatmapChart = null;
let barChart     = null;
let donutChart   = null;

if (!Portal.init()) { /* auth.js가 로그인으로 리다이렉트 */ }
else { bootPage(); }

function bootPage() {
  currentUser = RBAC.getCurrentUser();
  const allowed = currentUser &&
    (currentUser.role === 'team_leader' || currentUser.role === 'section_chief');

  if (!allowed) {
    document.getElementById('pageBody').innerHTML = `
      <div class="access-gate">
        <div class="access-gate-icon"><i class="fas fa-lock"></i></div>
        <h2>접근 권한이 없습니다</h2>
        <p>팀 업무량 모니터링 페이지는 <strong>팀장</strong> 또는 <strong>실장</strong>만 접근할 수 있습니다.<br>
           본인 업무량 확인은 <a href="workload-me.html" style="color:var(--primary);">내 업무량</a> 페이지를 이용해주세요.</p>
        <a href="index.html" class="btn btn-secondary"><i class="fas fa-home"></i> 대시보드로 이동</a>
      </div>`;
    return;
  }

  initDateRange();
  renderPageShell();
  loadAll();
}

/* ── 날짜 범위 초기화 (최근 30일) ── */
function initDateRange() {
  const today = new Date();
  const from  = new Date(today);
  from.setDate(from.getDate() - 29);
  document.getElementById('fromDate').value = dateStr(from);
  document.getElementById('toDate').value   = dateStr(today);
}
function dateStr(d) { return d.toISOString().split('T')[0]; }
function getFrom()  { return document.getElementById('fromDate').value; }
function getTo()    { return document.getElementById('toDate').value; }

/* ── 페이지 골격 렌더 ── */
function renderPageShell() {
  document.getElementById('pageBody').innerHTML = `
    <!-- KPI 카드 -->
    <div class="kpi-grid" id="kpiGrid">
      ${[0,1,2,3].map(() => `
        <div class="kpi-card blue">
          <div class="kpi-label">로딩 중...</div>
          <div class="kpi-value">-</div>
        </div>`).join('')}
    </div>

    <!-- 히트맵 -->
    <div class="chart-card" style="margin-bottom:24px;">
      <div class="chart-card-header">
        <div class="chart-icon blue"><i class="fas fa-th"></i></div>
        <div class="chart-card-title">팀 업무 히트맵</div>
        <div class="legend-row" id="heatmapLegend">
          <div class="legend-item"><div class="legend-dot overload"></div>과중</div>
          <div class="legend-item"><div class="legend-dot normal"></div>정상</div>
          <div class="legend-item"><div class="legend-dot idle"></div>유휴</div>
          <div class="legend-item"><div class="legend-dot empty"></div>미입력</div>
          <div class="legend-item"><div class="legend-dot holiday"></div>비영업일</div>
        </div>
      </div>
      <div class="chart-card-body">
        <div class="heatmap-scroll-wrap">
          <div id="heatmapChart" style="min-height:300px;position:relative;">
            <div class="loading-overlay"><div class="spinner"></div></div>
          </div>
        </div>
      </div>
    </div>

    <!-- 개인별 비교 + 도넛 -->
    <div class="section-row three-col" style="margin-bottom:24px;">
      <div class="chart-card">
        <div class="chart-card-header">
          <div class="chart-icon green"><i class="fas fa-chart-bar"></i></div>
          <div class="chart-card-title">개인별 투입 시간 비교</div>
          <div style="display:flex;gap:8px;align-items:center;">
            <div class="toggle-group" id="periodToggle">
              <button class="toggle-btn active" data-period="week"  onclick="switchPeriod('week',this)">이번 주</button>
              <button class="toggle-btn"        data-period="month" onclick="switchPeriod('month',this)">이번 달</button>
              <button class="toggle-btn"        data-period="quarter" onclick="switchPeriod('quarter',this)">이번 분기</button>
            </div>
            <div class="toggle-group" id="sortToggle">
              <button class="toggle-btn active" data-sort="desc" onclick="switchSort('desc',this)"><i class="fas fa-sort-amount-down"></i></button>
              <button class="toggle-btn"        data-sort="asc"  onclick="switchSort('asc',this)"><i class="fas fa-sort-amount-up"></i></button>
            </div>
          </div>
        </div>
        <div class="chart-card-body">
          <div id="barChart" style="min-height:320px;position:relative;">
            <div class="loading-overlay"><div class="spinner"></div></div>
          </div>
        </div>
      </div>

      <div class="chart-card">
        <div class="chart-card-header">
          <div class="chart-icon yellow"><i class="fas fa-chart-pie"></i></div>
          <div class="chart-card-title">업무 유형별 분포</div>
        </div>
        <div class="chart-card-body">
          <div id="donutChart" style="min-height:280px;position:relative;">
            <div class="loading-overlay"><div class="spinner"></div></div>
          </div>
        </div>
      </div>
    </div>

    <!-- 알림 패널 -->
    <div class="section-row two-col" style="margin-bottom:24px;">
      <div class="alert-panel" id="alertPanel">
        <div class="alert-panel-header">
          <div class="chart-icon red" style="width:26px;height:26px;border-radius:7px;font-size:12px;">
            <i class="fas fa-bell"></i>
          </div>
          <div class="alert-panel-title">알림 현황</div>
          <span class="alert-count-badge" id="alertBadge">0</span>
        </div>
        <div id="alertContent">
          <div class="alert-empty"><i class="fas fa-circle-notch fa-spin"></i> 로딩 중...</div>
        </div>
      </div>
      <div class="chart-card" id="summaryCard">
        <div class="chart-card-header">
          <div class="chart-icon purple"><i class="fas fa-info-circle"></i></div>
          <div class="chart-card-title">이번 주 팀 요약</div>
        </div>
        <div class="chart-card-body" id="summaryBody">
          <div style="color:var(--gray-400);font-size:13px;text-align:center;padding:20px;">로딩 중...</div>
        </div>
      </div>
    </div>
  `;
}

/* ── 전체 데이터 로드 ── */
let barPeriod = 'week';
let barSort   = 'desc';
let heatmapData = null;

async function loadAll() {
  const from = getFrom();
  const to   = getTo();
  document.getElementById('dateRangeLabel').textContent = `${from} ~ ${to}`;

  // 병렬 로드
  await Promise.all([
    loadKpi(),
    loadHeatmap(from, to),
    loadBarChart(barPeriod),
    loadDonut(from, to),
    loadAlerts()
  ]);
}

/* ── KPI 카드 로드 ── */
async function loadKpi() {
  try {
    const today = dateStr(new Date());
    const r = await fetch(`/api/workload/summary?date=${today}`);
    if (!r.ok) throw new Error('KPI API 오류');
    const d = await r.json();

    const loadPct  = d.week ? Math.round(d.week.load_pct) : 0;
    const totalH   = d.week ? Math.round(d.week.team_total_hours * 10) / 10 : 0;
    const stdH     = d.week ? Math.round(d.week.team_standard_hours) : 0;
    const overload = d.overload_count  || 0;
    const idle     = d.idle_count      || 0;
    const empty    = d.empty_yesterday_count || 0;

    document.getElementById('kpiGrid').innerHTML = `
      <div class="kpi-card blue">
        <i class="kpi-icon fas fa-clock"></i>
        <div class="kpi-label">이번 주 팀 투입 시간</div>
        <div class="kpi-value">${totalH}<span class="unit">h</span></div>
        <div class="kpi-sub">표준 ${stdH}h 대비 ${loadPct}%</div>
        <div style="margin-top:4px;">
          <div class="progress-bar-wrapper" style="height:6px;">
            <div class="progress-bar blue" style="width:${Math.min(loadPct,100)}%;"></div>
          </div>
        </div>
      </div>
      <div class="kpi-card ${overload > 0 ? 'red' : 'green'}">
        <i class="kpi-icon fas fa-fire"></i>
        <div class="kpi-label">과중 인원</div>
        <div class="kpi-value">${overload}<span class="unit">명</span></div>
        <div class="kpi-sub">연속 과중 기준</div>

      </div>
      <div class="kpi-card ${idle > 0 ? 'gray' : 'green'}">
        <i class="kpi-icon fas fa-coffee"></i>
        <div class="kpi-label">유휴 인원</div>
        <div class="kpi-value">${idle}<span class="unit">명</span></div>
        <div class="kpi-sub">연속 유휴 기준</div>
        ${idle > 0 ? '<div class="kpi-badge gray"><i class="fas fa-info-circle"></i> 확인 권장</div>' : '<div class="kpi-badge" style="background:#d1fae5;color:#065f46;"><i class="fas fa-check-circle"></i> 이상 없음</div>'}

        <div class="kpi-label">어제 미입력 인원</div>

      <div style="display:flex;flex-direction:column;gap:12px;">
        <div style="display:flex;justify-content:space-between;align-items:center;padding-bottom:10px;border-bottom:1px solid var(--gray-100);">

          <span style="font-size:13px;font-weight:700;color:var(--gray-800);">${d.week?.from || '-'} ~ ${d.week?.to || '-'}</span>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <span style="font-size:13px;color:var(--gray-600);">팀 투입 합계</span>
          <span style="font-size:20px;font-weight:800;color:var(--primary);">${totalH}h</span>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <span style="font-size:13px;color:var(--gray-600);">팀 표준 시간</span>
          <span style="font-size:15px;font-weight:700;color:var(--gray-700);">${stdH}h</span>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <span style="font-size:13px;color:var(--gray-600);">팀 부하율</span>

        <div style="margin-top:4px;">

            <div class="progress-bar ${loadPct > 100 ? '' : 'blue'}" style="width:${Math.min(loadPct,100)}%;background:${loadPct > 100 ? '#ef4444' : loadPct > 70 ? '#10b981' : '#9ca3af'};"></div>

  } catch(e) {
    console.error('KPI 로드 실패:', e);

}

/* ── 히트맵 로드 ── */
async function loadHeatmap(from, to) {
  try {
    const r = await fetch(`/api/workload/team?from=${from}&to=${to}`);
    if (!r.ok) throw new Error('히트맵 API 오류');
    heatmapData = await r.json();
    renderHeatmap(heatmapData);
  } catch(e) {
    console.error('히트맵 로드 실패:', e);
    document.getElementById('heatmapChart').innerHTML =
      '<div style="text-align:center;padding:40px;color:var(--gray-400);">히트맵 데이터를 불러오지 못했습니다.</div>';
  }
}

function renderHeatmap(data) {
  const { members, dates, cells } = data;

  // ApexCharts 히트맵용 시리즈 구성 (멤버별 rows)
  // ApexCharts heatmap: series = [{name: member, data: [{x: date, y: colorValue}]}]
  // colorValue: 0=비영업일, 1=미입력, 2=유휴, 3=정상, 4=과중

  const STATUS_VAL = { empty: 1, idle: 2, normal: 3, overload: 4 };

  const series = members.map(member => ({
    name: member,
    data: dates.map(date => {
      const cell = cells[member] && cells[member][date];
      if (!cell) return { x: date, y: 0, meta: { status: 'empty', is_business_day: false } };
      const y = cell.is_business_day ? (STATUS_VAL[cell.status] || 1) : 0;
      return {
        x: date,
        y: y,
        meta: cell
      };
    })
  }));

  if (heatmapChart) { heatmapChart.destroy(); heatmapChart = null; }

  const opts = {
    chart: {
      type: 'heatmap',
      height: Math.max(320, members.length * 36 + 60),
      toolbar: { show: false },
      animations: { enabled: false },
      events: {
        dataPointSelection: function(event, chartCtx, config) {
          const s = config.seriesIndex;
          const d = config.dataPointIndex;
          if (s < 0 || d < 0) return;
          const member   = series[s].name;
          const dateVal  = series[s].data[d].x;
          const meta     = series[s].data[d].meta;
          openDetailModal(member, dateVal, meta);
        }
      }
    },
    dataLabels: { enabled: false },
    legend: { show: false },
    tooltip: {
      custom: function({ series: s, seriesIndex: si, dataPointIndex: di }) {
        const pt   = heatmapData.members[si];
        const dt   = heatmapData.dates[di];
        const cell = heatmapData.cells[pt] && heatmapData.cells[pt][dt];
        if (!cell) return `<div style="padding:8px 12px;font-size:12px;">${pt}<br>${dt}<br>데이터 없음</div>`;
        const statusLabel = { overload: '과중', normal: '정상', idle: '유휴', empty: '미입력' };
        const statusColor = { overload: '#ef4444', normal: '#10b981', idle: '#9ca3af', empty: '#9ca3af' };
        const hours = Math.round(cell.total_minutes / 6) / 10;
        return `<div style="padding:10px 14px;font-size:12.5px;line-height:1.8;min-width:160px;">
          <strong style="font-size:13.5px;">${pt}</strong><br>
          ${dt}${cell.holiday_name ? ` (${cell.holiday_name})` : ''}<br>
          <span style="color:${statusColor[cell.status] || '#9ca3af'};font-weight:700;">${statusLabel[cell.status] || '-'}</span>
          ${cell.is_business_day ? ` · ${hours}h (부하 ${Math.round(cell.load_pct)}%)` : ' · 비영업일'}
        </div>`;
      }
    },
    plotOptions: {
      heatmap: {
        radius: 3,
        enableShades: false,
        colorScale: {
          ranges: [
            { from: 0, to: 0, color: '#f0f0f0', name: '비영업일' },  // 비영업일
            { from: 1, to: 1, color: '#e5e7eb', name: '미입력' },     // empty
            { from: 2, to: 2, color: '#d1d5db', name: '유휴' },       // idle
            { from: 3, to: 3, color: '#10b981', name: '정상' },       // normal
            { from: 4, to: 4, color: '#ef4444', name: '과중' }        // overload
          ]
        }
      }
    },
    xaxis: {
      labels: {
        rotate: -45,
        style: { fontSize: '11px', colors: '#6b7280' },
        formatter: function(val) {
          if (!val) return '';
          const d = new Date(val);
          const mm = String(d.getMonth()+1).padStart(2,'0');
          const dd = String(d.getDate()).padStart(2,'0');
          return `${mm}/${dd}`;
        }
      },
      tooltip: { enabled: false }
    },
    yaxis: {
      labels: { style: { fontSize: '12px', fontWeight: 600, colors: '#374151' } }
    },
    states: {
      hover:    { filter: { type: 'lighten', value: 0.1 } },
      active:   { filter: { type: 'darken',  value: 0.15 } }
    },
    series: series
  };

  document.getElementById('heatmapChart').innerHTML = '';
  heatmapChart = new ApexCharts(document.getElementById('heatmapChart'), opts);
  heatmapChart.render();
}

/* ── 막대 차트 (개인별 비교) ── */
async function loadBarChart(period) {
  barPeriod = period;
  const loading = document.querySelector('#barChart .loading-overlay');
  if (loading) loading.style.display = 'flex';

  try {
    // 기간별 날짜 계산
    const { from, to } = getPeriodRange(period);
    const r = await fetch(`/api/workload/team?from=${from}&to=${to}`);
    if (!r.ok) throw new Error('바 차트 API 오류');
    const data = await r.json();

    // 멤버별 합산
    const totals = {};
    for (const member of data.members) {
      let sum = 0;
      for (const date of data.dates) {
        const cell = data.cells[member] && data.cells[member][date];
        if (cell && cell.is_business_day) sum += (cell.total_minutes || 0);
      }
      totals[member] = Math.round(sum / 6) / 10; // 시간 (소수점1자리)
    }

    const sorted = Object.entries(totals).sort((a, b) =>
      barSort === 'desc' ? b[1] - a[1] : a[1] - b[1]
    );
    const names  = sorted.map(x => x[0]);
    const values = sorted.map(x => x[1]);

    if (barChart) { barChart.destroy(); barChart = null; }
    const opts = {
      chart: {
        type: 'bar',
        height: Math.max(300, names.length * 32 + 60),
        toolbar: { show: false },
        animations: { speed: 400 }
      },
      plotOptions: {
        bar: {
          horizontal: true,
          borderRadius: 5,
          barHeight: '60%',
          distributed: true
        }
      },
      colors: values.map(v => {
        if (v === 0) return '#e5e7eb';
        const maxH = 50; // 약 표준시간 기준
        const pct  = (v / maxH) * 100;
        if (pct > 110) return '#ef4444';
        if (pct > 70)  return '#10b981';
        return '#9ca3af';
      }),
      dataLabels: {
        enabled: true,
        formatter: v => v > 0 ? `${v}h` : '미입력',
        style: { fontSize: '12px', fontWeight: 600 }
      },
      series: [{ name: '투입시간', data: values }],
      xaxis: {
        categories: names,
        labels: {
          style: { fontSize: '12px', fontWeight: 600, colors: '#374151' }
        }
      },
      yaxis: { labels: { style: { fontSize: '12.5px', fontWeight: 600 } } },
      legend: { show: false },
      tooltip: {
        y: { formatter: v => `${v}h` }
      },
      grid: { borderColor: '#f3f4f6' }
    };

    document.getElementById('barChart').innerHTML = '';
    barChart = new ApexCharts(document.getElementById('barChart'), opts);
    barChart.render();
  } catch(e) {
    console.error('바 차트 로드 실패:', e);
    document.getElementById('barChart').innerHTML =
      '<div style="text-align:center;padding:40px;color:var(--gray-400);">데이터를 불러오지 못했습니다.</div>';
  }
}

function getPeriodRange(period) {
  const today = new Date();
  let from, to;
  to = dateStr(today);
  if (period === 'week') {
    const day = today.getDay();
    const monday = new Date(today);
    monday.setDate(today.getDate() - (day === 0 ? 6 : day - 1));
    from = dateStr(monday);
  } else if (period === 'month') {
    from = dateStr(new Date(today.getFullYear(), today.getMonth(), 1));
  } else { // quarter
    const q = Math.floor(today.getMonth() / 3);
    from = dateStr(new Date(today.getFullYear(), q * 3, 1));
  }
  return { from, to };
}

function switchPeriod(period, btn) {
  document.querySelectorAll('#periodToggle .toggle-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadBarChart(period);
}

function switchSort(sort, btn) {
  barSort = sort;
  document.querySelectorAll('#sortToggle .toggle-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadBarChart(barPeriod);
}

/* ── 도넛 차트 ── */
async function loadDonut(from, to) {
  try {
    const r = await fetch(`/api/workload/by-type?from=${from}&to=${to}&scope=team`);
    if (!r.ok) throw new Error('도넛 API 오류');
    const data = await r.json();
    const items = (data.items || []).filter(x => x.minutes > 0);

    if (donutChart) { donutChart.destroy(); donutChart = null; }
    if (!items.length) {
      document.getElementById('donutChart').innerHTML =
        '<div style="text-align:center;padding:40px;color:var(--gray-400);">업무유형 데이터가 없습니다.</div>';
      return;
    }

    const DONUT_COLORS = ['#4f86f7','#10b981','#f59e0b','#8b5cf6','#ef4444','#06b6d4','#84cc16','#f97316'];
    const opts = {
      chart: { type: 'donut', height: 260, toolbar: { show: false } },
      series: items.map(x => x.minutes),
      labels: items.map(x => x.label),
      colors: DONUT_COLORS.slice(0, items.length),
      dataLabels: { enabled: false },
      legend: {
        position: 'bottom',
        fontSize: '12px',
        fontFamily: 'Noto Sans KR',
        offsetY: 4
      },
      plotOptions: {
        pie: {
          donut: {
            size: '65%',
            labels: {
              show: true,
              total: {
                show: true,
                label: '총 시간',
                fontSize: '12px',
                formatter: () => {
                  const totalMin = items.reduce((s, x) => s + x.minutes, 0);
                  return `${Math.round(totalMin / 60)}h`;
                }
              }
            }
          }
        }
      },
      tooltip: { y: { formatter: v => `${Math.round(v/60*10)/10}h (${v}분)` } }
    };

    document.getElementById('donutChart').innerHTML = '';
    donutChart = new ApexCharts(document.getElementById('donutChart'), opts);
    donutChart.render();
  } catch(e) {
    console.error('도넛 로드 실패:', e);
    document.getElementById('donutChart').innerHTML =
      '<div style="text-align:center;padding:40px;color:var(--gray-400);">데이터를 불러오지 못했습니다.</div>';
  }
}

/* ── 알림 패널 ── */
async function loadAlerts() {
  try {
    const r = await fetch('/api/workload/alerts');
    if (!r.ok) throw new Error('알림 API 오류');
    const data = await r.json();

    const overload     = data.overload      || [];
    const idle         = data.idle          || [];
    const emptyYest    = data.empty_yesterday || [];
    const total = overload.length + idle.length + emptyYest.length;

    document.getElementById('alertBadge').textContent = total;

    let html = '';

    if (overload.length) {
      html += '<div class="alert-section-label"><i class="fas fa-fire" style="color:#ef4444;margin-right:4px;"></i>과중 알림</div>';
      for (const item of overload) {
        html += `<div class="alert-item">
          <div class="alert-dot red"></div>
          <span class="alert-name">${item.member_name}</span>
          <span class="alert-desc">${item.days}영업일 연속 과중</span>
        </div>`;
      }
    }

    if (idle.length) {
      html += '<div class="alert-section-label"><i class="fas fa-coffee" style="color:#9ca3af;margin-right:4px;"></i>유휴 알림</div>';
      for (const item of idle) {
        html += `<div class="alert-item">
          <div class="alert-dot gray"></div>
          <span class="alert-name">${item.member_name}</span>
          <span class="alert-desc">${item.days}영업일 연속 유휴</span>
        </div>`;
      }
    }

    if (emptyYest.length) {
      html += '<div class="alert-section-label"><i class="fas fa-user-slash" style="color:#f59e0b;margin-right:4px;"></i>미입력 알림</div>';
      for (const item of emptyYest) {
        html += `<div class="alert-item">
          <div class="alert-dot yellow"></div>
          <span class="alert-name">${item.member_name}</span>
          <span class="alert-desc">${item.date} 미입력</span>
        </div>`;
      }
    }

    if (!html) {
      html = '<div class="alert-empty"><i class="fas fa-check-circle" style="color:#10b981;"></i> 현재 알림이 없습니다</div>';
    }

    document.getElementById('alertContent').innerHTML = html;
  } catch(e) {
    console.error('알림 로드 실패:', e);
    document.getElementById('alertContent').innerHTML =
      '<div class="alert-empty">알림 데이터를 불러오지 못했습니다.</div>';
  }
}

/* ── 일별 상세 모달 ── */
async function openDetailModal(member, date, meta) {
  const modal = document.getElementById('detailModal');
  const title = document.getElementById('detailModalTitle');
  const body  = document.getElementById('detailModalBody');

  const statusLabel = { overload: '과중', normal: '정상', idle: '유휴', empty: '미입력' };
  const statusColor = { overload: '#ef4444', normal: '#10b981', idle: '#9ca3af', empty: '#9ca3af' };

  title.innerHTML = `<i class="fas fa-calendar-day" style="margin-right:8px;color:var(--primary);"></i>${member} · ${date}`;
  body.innerHTML = `<div style="text-align:center;padding:24px;"><div class="spinner" style="margin:auto;"></div></div>`;
  modal.classList.add('show');

  try {
    const encoded = encodeURIComponent(member);
    const r = await fetch(`/tables/daily_work_entries?limit=200`);
    // 전체 항목에서 해당 멤버+날짜 필터
    const all  = r.ok ? (await r.json()) : { rows: [] };
    const rows = (all.rows || all.data || all || [])
      .filter(x => x.member_name === member && x.work_date === date);

    let html = '';

    if (meta) {
      const hours    = meta.total_minutes ? Math.round(meta.total_minutes / 6) / 10 : 0;
      const statusStr = meta.status ? (statusLabel[meta.status] || '-') : '미입력';
      const isHoliday = !meta.is_business_day;
      html += `<div class="detail-summary">
        <div class="detail-stat"><strong>${hours}h</strong> 투입</div>
        <div class="detail-stat"><strong style="color:${statusColor[meta.status] || '#9ca3af'};">${statusStr}</strong></div>
        ${isHoliday ? `<div class="detail-stat"><strong>${meta.holiday_name || '비영업일'}</strong></div>` : `<div class="detail-stat">부하율 <strong>${Math.round(meta.load_pct || 0)}%</strong></div>`}
      </div>`;
    }

    if (rows.length === 0) {
      html += `<div class="entry-empty"><i class="fas fa-inbox" style="font-size:28px;display:block;margin-bottom:8px;color:var(--gray-300);"></i>입력된 업무 내역이 없습니다.</div>`;
    } else {
      html += `<div class="entry-list">`;
      for (const row of rows) {
        const mins = row.duration_minutes || 0;
        const hh   = Math.floor(mins / 60);
        const mm   = mins % 60;
        const dur  = hh > 0 ? `${hh}h ${mm > 0 ? mm + 'm' : ''}` : `${mm}m`;
        html += `<div class="entry-item">
          <span class="entry-cat">${row.task_label || row.task_category_id || '기타'}</span>
          <span class="entry-label">${row.note || row.task_label || '-'}</span>
          <span class="entry-duration">${dur}</span>
        </div>`;
      }
      html += `</div>`;
    }

    body.innerHTML = html;
  } catch(e) {
    body.innerHTML = `<div class="entry-empty">데이터를 불러오지 못했습니다.</div>`;
  }
}

function closeDetailModal() {
  document.getElementById('detailModal').classList.remove('show');
}
// 모달 외부 클릭 닫기
document.getElementById('detailModal').addEventListener('click', function(e) {
  if (e.target === this) closeDetailModal();
});
