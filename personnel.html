<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>인사카드 - 계리결산팀 운영관리포탈</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/main.css?v=27">
  <style>
    .toolbar { display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-bottom:24px; }
    .toolbar-spacer { flex:1; }

    /* 팀 요약 */
    .team-summary { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:28px; }
    .summary-card { background:#fff; border-radius:14px; padding:16px 20px; border:1.5px solid #f3f4f6;
      text-align:center; }
    .summary-label { font-size:11px; color:#9ca3af; font-weight:500; margin-bottom:6px; }
    .summary-val { font-size:26px; font-weight:800; color:#111827; }

    /* 카드 그리드 */
    .card-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:18px; }
    .person-card { background:#fff; border-radius:16px; border:1.5px solid #e5e7eb;
      overflow:hidden; transition:box-shadow .2s; }
    .person-card:hover { box-shadow:0 4px 16px rgba(0,0,0,.1); }

    /* 카드 헤더 */
    .card-header { padding:20px 20px 14px; display:flex; align-items:center; gap:14px;
      background:linear-gradient(135deg,#f8faff,#fff); border-bottom:1px solid #f3f4f6; }
    .avatar { width:52px; height:52px; border-radius:14px; font-size:20px; font-weight:800;
      color:#fff; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .avatar-G4 { background:linear-gradient(135deg,#6c5ce7,#a29bfe); }
    .avatar-G3 { background:linear-gradient(135deg,#0984e3,#74b9ff); }
    .avatar-G2 { background:linear-gradient(135deg,#00b894,#55efc4); }
    .avatar-G1 { background:linear-gradient(135deg,#e17055,#fab1a0); }
    .card-header-info h3 { font-size:16px; font-weight:800; color:#111827; margin:0 0 4px; }
    .card-badges { display:flex; gap:5px; flex-wrap:wrap; }
    .badge-grade { font-size:11px; font-weight:700; padding:2px 8px; border-radius:6px; }
    .bg-G4 { background:#ede9fe; color:#5b21b6; }
    .bg-G3 { background:#dbeafe; color:#1e40af; }
    .bg-G2 { background:#dcfce7; color:#166534; }
    .bg-G1 { background:#fef3c7; color:#92400e; }
    .badge-leader { background:#fef2f2; color:#991b1b; font-size:11px; font-weight:700; padding:2px 8px; border-radius:6px; }
    .badge-position { background:#f3f4f6; color:#374151; font-size:11px; font-weight:600; padding:2px 8px; border-radius:6px; }

    /* 카드 바디 */
    .card-body { padding:14px 20px; }
    .info-row { display:flex; align-items:center; gap:8px; padding:5px 0;
      border-bottom:1px solid #f9fafb; font-size:13px; }
    .info-row:last-child { border-bottom:none; }
    .info-icon { width:22px; color:#9ca3af; text-align:center; font-size:12px; flex-shrink:0; }
    .info-label { color:#9ca3af; font-weight:500; min-width:60px; }
    .info-val { color:#374151; font-weight:600; flex:1; }

    /* 추가정보 섹션 */
    .card-extra { padding:10px 20px 16px; border-top:1px solid #f3f4f6; background:#fafbfc; }
    .extra-title { font-size:11px; font-weight:700; color:#9ca3af; margin-bottom:6px;
      display:flex; align-items:center; gap:6px; }
    .extra-text { font-size:12px; color:#374151; line-height:1.6; min-height:32px; }
    .extra-edit { font-size:11px; color:#9ca3af; cursor:pointer; background:none; border:none;
      padding:0; margin-left:auto; }
    .extra-edit:hover { color:#4f86f7; }

    /* 카드 푸터 */
    .card-footer { padding:10px 20px; border-top:1px solid #f3f4f6; display:flex; justify-content:flex-end; gap:6px;
      position:relative; z-index:2; }
    .btn-card-edit { padding:5px 12px; border-radius:7px; border:1.5px solid #e5e7eb; background:#fff;
      font-size:12px; font-weight:600; color:#374151; cursor:pointer; transition:all .15s;
      position:relative; z-index:3; }
    .btn-card-edit:hover { border-color:#4f86f7; color:#4f86f7; background:#eff6ff; }

    /* 모달 */
    /* 모달 시스템은 main.css에서 단독 관리 (.modal-overlay + .show/.open 클래스) */
    .modal-box { background:#fff; border-radius:20px; width:520px; max-width:95vw; max-height:92vh;
      overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,.2); }
    .modal-header { padding:24px 28px 0; display:flex; justify-content:space-between; align-items:center; }
    .modal-title { font-size:18px; font-weight:700; color:#111827; }
    .modal-close { width:44px; height:44px; border-radius:8px; border:none; background:#f3f4f6;
      cursor:pointer; font-size:14px; color:#6b7280; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .modal-body { padding:20px 28px 28px; }
    .form-group { margin-bottom:14px; }
    .form-label { font-size:13px; font-weight:600; color:#374151; margin-bottom:5px; display:block; }
    .form-input, .form-select, .form-textarea {
      width:100%; padding:9px 13px; border:1.5px solid #e5e7eb; border-radius:9px;
      font-size:13px; color:#111827; font-family:inherit; background:#fff; box-sizing:border-box; }
    .form-input:focus, .form-textarea:focus { outline:none; border-color:#4f86f7; }
    .form-textarea { resize:vertical; min-height:80px; }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .modal-footer { display:flex; justify-content:flex-end; gap:10px; padding-top:8px; border-top:1px solid #f3f4f6; margin-top:8px; }
    .section-divider { font-size:12px; font-weight:700; color:#6b7280; margin:16px 0 10px;
      padding-bottom:5px; border-bottom:1px solid #e5e7eb; display:flex; align-items:center; gap:6px; }

    /* 활성 필터 토글 */
    .status-filter { display:flex; gap:6px; align-items:center; }
    .status-btn { padding:6px 16px; border-radius:20px; border:1.5px solid #e5e7eb; background:#fff;
      font-size:13px; font-weight:600; color:#6b7280; cursor:pointer; transition:all .2s; }
    .status-btn.active { border-color:#4f86f7; background:#4f86f7; color:#fff; }
    .status-btn.inactive-btn.active { border-color:#9ca3af; background:#6b7280; color:#fff; }

    /* 퇴직 배지 */
    .badge-retired { background:#f3f4f6; color:#9ca3af; font-size:11px; font-weight:700;
      padding:2px 8px; border-radius:6px; }
    .person-card.is-retired { opacity:.6; }
    .person-card.is-retired .card-header { background:#f9fafb; }

    /* 구분 섹션 헤더 */
    .section-header { font-size:13px; font-weight:700; color:#6b7280; margin:24px 0 12px;
      display:flex; align-items:center; gap:8px; }
    .section-header::after { content:''; flex:1; height:1px; background:#e5e7eb; }

    /* 카드 푸터 위험 버튼 */
    .btn-card-retire { padding:5px 12px; border-radius:7px; border:1.5px solid #fecaca;
      background:#fff; font-size:12px; font-weight:600; color:#ef4444; cursor:pointer; transition:all .15s; }
    .btn-card-retire:hover { background:#fef2f2; border-color:#ef4444; }
    .btn-card-delete { padding:5px 12px; border-radius:7px; border:1.5px solid #fee2e2;
      background:#fff; font-size:12px; font-weight:600; color:#dc2626; cursor:pointer; transition:all .15s; }
    .btn-card-delete:hover { background:#fee2e2; }

    @media(max-width:768px) {
      .team-summary { grid-template-columns:1fr 1fr; gap:10px; }
      .card-grid { grid-template-columns:1fr; }
      /* 모달 form-row 1열 */
      .form-row { grid-template-columns:1fr; }
      .modal-box { border-radius:20px 20px 0 0; }
      /* 카드 헤더 */
      .card-header { padding:14px; }
      .card-body { padding:10px 14px; }
    }
    @media(max-width:480px) {
      .team-summary { grid-template-columns:1fr 1fr; gap:8px; }
      .summary-val { font-size:20px; }
    }
  </style>
</head>
<body>
<div class="app-layout">
  <div id="sidebar"></div>
  <div class="main-content">
    <header class="page-header">
      <h1 class="page-title"><i class="fas fa-id-card"></i> 인사카드</h1>
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
        <div class="status-filter" id="statusFilter">
          <button class="status-btn active" data-filter="active" onclick="setStatusFilter('active')">재직중</button>
          <button class="status-btn" data-filter="all" onclick="setStatusFilter('all')">전체</button>

      </div>
    </header>
    <main class="content-body">

      <div class="team-summary">
        <div class="summary-card">
          <div class="summary-label">전체 인원</div>
          <div class="summary-val" id="totalCount">-</div>
        </div>
        <div class="summary-card">
          <div class="summary-label">G4직급 이상</div>
          <div class="summary-val" style="color:#6c5ce7" id="g4Count">-</div>

        <div class="summary-card">
          <div class="summary-label">G2-G3직급</div>
          <div class="summary-val" style="color:#0984e3" id="g23Count">-</div>

          <div class="summary-label">G1직급</div>
          <div class="summary-val" style="color:#e17055" id="g1Count">-</div>

  </div>
</div>

</div>

<script>
Portal.init();

const isLeader = RBAC.isTeamLeader();
const currentUser = RBAC.getCurrentUser();
let allUsers = [];
let statusFilter = 'active'; // 'active' | 'retired' | 'all'

function setStatusFilter(f) {
  statusFilter = f;
  document.querySelectorAll('.status-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.filter === f);
  });
  renderCards();
}

// 팀장에게만 신규 직원 버튼 표시
if (isLeader) {
  document.getElementById('addBtnWrap').innerHTML =
    '<button class="btn btn-primary" onclick="openAddModal()"><i class="fas fa-user-plus"></i> 신규 직원</button>';
}

function gradeColor(grade) {
  if (grade >= 'G4') return 'G4';
  if (grade >= 'G3') return 'G3';
  if (grade >= 'G2') return 'G2';
  return 'G1';
}

function calcYears(deptDate) {
  if (!deptDate) return '-';
  const start = new Date(String(deptDate).slice(0, 10));
  if (isNaN(start)) return '-';
  const now = new Date();
  let years = now.getFullYear() - start.getFullYear();
  let months = now.getMonth() - start.getMonth();
  if (now.getDate() < start.getDate()) months--;
  if (months < 0) { years--; months += 12; }
  if (years < 0) return '1개월 미만';
  if (years === 0) return months + '개월';
  return years + '년 ' + months + '개월';
}

function fmtDate(ds) {
  if (!ds) return '-';
  return String(ds).slice(0, 10);
}

async function loadUsers() {
  const res = await fetch('/tables/users?limit=200');
  const data = await res.json();
  // 사번이 있는 모든 사용자 로드 (is_active 무관)
  allUsers = (data.rows || data.data || []).filter(u => u.employee_id);
  renderCards();
}

function buildCardHtml(u) {
  const gKey = (u.grade || 'G1직급').replace('직급','');
  const isLdr = u.role === 'team_leader';
  const isRetired = u.is_active === false;
  const yrs = u.dept_date ? calcYears(u.dept_date) : (u.years ? u.years + '년' : '-');
  const initial = (u.full_name || u.username || '?').slice(0, 1);

  return `<div class="person-card${isRetired ? ' is-retired' : ''}">
    <div class="card-header">
      <div class="avatar avatar-${gKey}">${initial}</div>
      <div class="card-header-info">
        <h3>${u.full_name || u.username}</h3>
        <div class="card-badges">
          <span class="badge-grade bg-${gKey}">${u.grade || '-'}</span>
          ${isLdr ? '<span class="badge-leader"><i class="fas fa-crown"></i> 팀장</span>' : ''}
          <span class="badge-position">${u.position || '-'}</span>
          ${isRetired ? '<span class="badge-retired"><i class="fas fa-user-slash"></i> 퇴직</span>' : ''}
        </div>
      </div>
    </div>
    <div class="card-body">
      <div class="info-row">
        <i class="fas fa-id-badge info-icon"></i>
        <span class="info-label">사번</span>
        <span class="info-val">${u.employee_id || '-'}</span>
      </div>
      <div class="info-row">
        <i class="fas fa-building info-icon"></i>
        <span class="info-label">소속</span>
        <span class="info-val">${u.division || '계리실'} / ${u.department || '계리결산팀'}</span>
      </div>
      <div class="info-row">
        <i class="fas fa-calendar-plus info-icon"></i>
        <span class="info-label">부임일</span>
        <span class="info-val">${fmtDate(u.dept_date)}</span>
      </div>
      <div class="info-row">
        <i class="fas fa-briefcase info-icon"></i>
        <span class="info-label">연차</span>
        <span class="info-val">${yrs}</span>
      </div>
      ${u.specialty ? `<div class="info-row"><i class="fas fa-star info-icon"></i><span class="info-label">전문분야</span><span class="info-val">${u.specialty}</span></div>` : ''}
      ${u.certifications ? `<div class="info-row"><i class="fas fa-certificate info-icon"></i><span class="info-label">자격증</span><span class="info-val">${u.certifications}</span></div>` : ''}
      ${u.task_area ? `<div class="info-row"><i class="fas fa-tasks info-icon"></i><span class="info-label">담당업무</span><span class="info-val">${u.task_area}</span></div>` : ''}
    </div>
    ${u.notes ? `<div class="card-extra">
      <div class="extra-title"><i class="fas fa-sticky-note"></i> 메모</div>
      <div class="extra-text">${u.notes}</div>
    </div>` : ''}
    ${(() => {
      // 수정: 팀장은 모든 카드 / 일반 직원은 본인 카드만
      const isSelf = currentUser && (currentUser.user_id === u.id || currentUser.id === u.id);
      const canEdit   = isLeader || isSelf;
      const canRetire = isLeader && !isRetired;
      const canDelete = isLeader;
      if (!canEdit && !canRetire && !canDelete) return '';
      return `<div class="card-footer">
        ${canEdit   ? `<button class="btn-card-edit" onclick="openEdit('${u.id}')"><i class="fas fa-pen"></i> 수정</button>` : ''}
        ${canRetire ? `<button class="btn-card-retire" onclick="retireUser('${u.id}','${(u.full_name||u.username||'').replace(/'/g,"\\'")}')"><i class="fas fa-user-slash"></i> 퇴직처리</button>` : ''}
        ${canDelete ? `<button class="btn-card-delete" onclick="deleteUser('${u.id}','${(u.full_name||u.username||'').replace(/'/g,"\\'")}')"><i class="fas fa-trash"></i> 삭제</button>` : ''}
      </div>`;
    })()}
  </div>`;
}

function renderCards() {
  const grid = document.getElementById('cardGrid');
  const activeUsers = allUsers.filter(u => u.is_active !== false);
  const retiredUsers = allUsers.filter(u => u.is_active === false);

  // 통계는 재직중 기준
  const g4 = activeUsers.filter(u => (u.grade || '') >= 'G4').length;
  const g23 = activeUsers.filter(u => u.grade === 'G3직급' || u.grade === 'G2직급').length;
  const g1 = activeUsers.filter(u => u.grade === 'G1직급').length;
  document.getElementById('totalCount').textContent = activeUsers.length + '명';
  document.getElementById('g4Count').textContent = g4 + '명';
  document.getElementById('g23Count').textContent = g23 + '명';
  document.getElementById('g1Count').textContent = g1 + '명';

  // 필터에 따라 표시할 목록 결정
  let displayUsers;
  if (statusFilter === 'active') displayUsers = activeUsers;
  else if (statusFilter === 'retired') displayUsers = retiredUsers;
  else displayUsers = allUsers; // 'all'

  if (!displayUsers.length) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:#9ca3af;">표시할 인사 데이터가 없습니다.</div>';
    return;
  }

  if (statusFilter === 'all' && retiredUsers.length > 0) {
    // 전체 보기 시 재직중 / 퇴직 섹션 분리
    const activeHtml = activeUsers.map(buildCardHtml).join('');
    const retiredHtml = retiredUsers.map(buildCardHtml).join('');
    grid.innerHTML =
      `<div class="section-header" style="grid-column:1/-1;"><i class="fas fa-users" style="color:#4f86f7;"></i> 재직중 (${activeUsers.length}명)</div>` +
      activeHtml +
      (retiredUsers.length ? `<div class="section-header" style="grid-column:1/-1;"><i class="fas fa-user-slash" style="color:#9ca3af;"></i> 퇴직 (${retiredUsers.length}명)</div>` + retiredHtml : '');
  } else {
    grid.innerHTML = displayUsers.map(buildCardHtml).join('');
  }
}

function openEdit(userId) {
  const u = allUsers.find(x => x.id === userId);
  if (!u) return;
  document.getElementById('modalTitle').textContent = (u.full_name || u.username) + ' 인사카드 수정';
  document.getElementById('editUserId').value = userId;
  document.getElementById('fName').value = u.full_name || '';
  document.getElementById('fEmpId').value = u.employee_id || '';
  // grade/position은 select — 일치하는 option 선택, 없으면 빈값
  const gradeEl = document.getElementById('fGrade');
  gradeEl.value = u.grade || '';
  if (!gradeEl.value && u.grade) {
    // 기존 텍스트 값과 option이 다를 경우 직접 추가
    const opt = document.createElement('option');
    opt.value = u.grade; opt.textContent = u.grade;
    gradeEl.appendChild(opt);
    gradeEl.value = u.grade;
  }
  const posEl = document.getElementById('fPosition');
  posEl.value = u.position || '';
  if (!posEl.value && u.position) {
    const opt = document.createElement('option');
    opt.value = u.position; opt.textContent = u.position;
    posEl.appendChild(opt);
    posEl.value = u.position;
  }
  // <input type="date">는 빈문자열만 받음 — fmtDate가 '-' 반환 시 invalid
  const dateForInput = v => (v ? String(v).slice(0,10) : '');
  document.getElementById('fJoinDate').value = dateForInput(u.join_date);
  document.getElementById('fDeptDate').value = dateForInput(u.dept_date);
  document.getElementById('fBirthDate').value = dateForInput(u.birth_date);
  document.getElementById('fYears').value = u.years || '';
  document.getElementById('fCert').value = u.certifications || '';
  document.getElementById('fSpecialty').value = u.specialty || '';
  document.getElementById('fTask').value = u.task_area || '';
  document.getElementById('fNote').value = u.notes || '';
  document.getElementById('editModal').classList.add('open');
}

function closeModal() {
  document.getElementById('editModal').classList.remove('open');
}

async function saveCard() {
  const userId = document.getElementById('editUserId').value;
  const body = {
    grade:         document.getElementById('fGrade').value.trim(),
    position:      document.getElementById('fPosition').value.trim(),
    join_date:     document.getElementById('fJoinDate').value || null,
    dept_date:     document.getElementById('fDeptDate').value || null,
    birth_date:    document.getElementById('fBirthDate').value || null,
    years:         parseInt(document.getElementById('fYears').value) || null,
    certifications:document.getElementById('fCert').value.trim(),
    specialty:     document.getElementById('fSpecialty').value.trim(),
    task_area:     document.getElementById('fTask').value.trim(),
    notes:         document.getElementById('fNote').value.trim(),
  };
  try {
    const res = await fetch('/tables/users/' + userId, {
      method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body)
    });
    if (!res.ok) throw new Error();
    closeModal();
    Portal.showToast('인사카드가 저장되었습니다.', 'success');
    await loadUsers();
  } catch(e) {
    Portal.showToast('저장에 실패했습니다.', 'error');
  }
}

// ── 신규 직원 모달 ────────────────────────────────────────
function openAddModal() {
  if (!isLeader) return;
  ['nfName','nfEmpId','nfUsername','nfPassword','nfDept'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = id === 'nfDept' ? '계리결산팀' : '';
  });
  document.getElementById('nfGrade').value = '';
  document.getElementById('nfPosition').value = '';
  document.getElementById('nfRole').value = 'employee';
  document.getElementById('nfJoinDate').value = '';
  document.getElementById('nfDeptDate').value = '';
  document.getElementById('addModal').classList.add('open');
}

function closeAddModal() {
  document.getElementById('addModal').classList.remove('open');
}

async function saveNewEmployee() {
  if (!isLeader) return;
  const name     = document.getElementById('nfName').value.trim();
  const empId    = document.getElementById('nfEmpId').value.trim();
  const username = document.getElementById('nfUsername').value.trim();
  if (!name || !empId || !username) {
    Portal.showToast('성명, 사번, 로그인 ID는 필수입니다.', 'error'); return;
  }
  const pw = document.getElementById('nfPassword').value.trim() || 'password';
  // SHA-256 해시 생성 (브라우저 Crypto API)
  const enc = new TextEncoder();
  const hashBuf = await crypto.subtle.digest('SHA-256', enc.encode(pw));
  const hashHex = Array.from(new Uint8Array(hashBuf)).map(b => b.toString(16).padStart(2,'0')).join('');

  const body = {
    full_name:   name,
    employee_id: empId,
    username:    username,
    password_hash: hashHex,
    grade:       document.getElementById('nfGrade').value || null,
    position:    document.getElementById('nfPosition').value || null,
    role:        document.getElementById('nfRole').value || 'employee',
    department:  document.getElementById('nfDept').value.trim() || '계리결산팀',
    join_date:   document.getElementById('nfJoinDate').value || null,
    dept_date:   document.getElementById('nfDeptDate').value || null,
    is_active:   true,
  };
  try {
    const res = await fetch('/tables/users', {
      method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body)
    });
    if (!res.ok) throw new Error();
    closeAddModal();
    Portal.showToast('신규 직원이 등록되었습니다.', 'success');
    await loadUsers();
  } catch(e) {
    Portal.showToast('등록에 실패했습니다.', 'error');
  }
}

// ── 퇴직처리 (소프트 삭제) ────────────────────────────────
async function retireUser(userId, name) {
  if (!isLeader) return;
  if (!confirm(`[${name}]을(를) 퇴직 처리하시겠습니까?\n(is_active=false 처리, 복구 가능)`)) return;
  try {
    const res = await fetch('/tables/users/' + userId, {
      method: 'PUT', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ is_active: false })
    });
    if (!res.ok) throw new Error();
    Portal.showToast(name + ' 퇴직 처리되었습니다.', 'success');
    await loadUsers();
  } catch(e) {
    Portal.showToast('처리에 실패했습니다.', 'error');
  }
}

// ── 완전 삭제 ─────────────────────────────────────────────
async function deleteUser(userId, name) {
  if (!isLeader) return;
  const confirm1 = confirm(`[${name}]의 인사 데이터를 영구 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.`);
  if (!confirm1) return;
  const confirm2 = confirm(`최종 확인: [${name}] 데이터를 정말 삭제합니까?`);
  if (!confirm2) return;
  try {
    const res = await fetch('/tables/users/' + userId, { method: 'DELETE' });
    if (!res.ok) throw new Error();
    Portal.showToast(name + ' 데이터가 삭제되었습니다.', 'success');
    await loadUsers();
  } catch(e) {
    Portal.showToast('삭제에 실패했습니다.', 'error');
  }
}

document.getElementById('editModal').addEventListener('click', e => {
  if (e.target === document.getElementById('editModal')) closeModal();
});

document.getElementById('addModal').addEventListener('click', e => {
  if (e.target === document.getElementById('addModal')) closeAddModal();
});

loadUsers();
</script>
