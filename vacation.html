<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>휴가 관리 - 계리결산팀 운영관리포탈</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/main.css?v=30">
  <style>
    /* ── 연차 게이지 히어로 ── */
    .quota-hero {
      background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 50%, #0369a1 100%);
      border-radius: 20px;
      padding: 28px 32px;
      margin-bottom: 28px;
      color: #fff;
      position: relative;
      overflow: hidden;
      box-shadow: 0 8px 28px rgba(14,165,233,0.28);
    }
    .quota-hero::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 200px; height: 200px;
      border-radius: 50%;
      background: rgba(255,255,255,0.07);
    }
    .quota-hero::after {
      content: '';
      position: absolute;
      bottom: -30px; left: 30%;
      width: 130px; height: 130px;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
    }
    .quota-hero-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 20px;
      position: relative;
      z-index: 1;
    }
    .quota-hero-title {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      opacity: 0.7;
      margin-bottom: 4px;
    }
    .quota-hero-name {
      font-size: 22px;
      font-weight: 800;
    }
    .quota-stats {
      display: flex;
      gap: 28px;
      flex-wrap: wrap;
      position: relative;
      z-index: 1;
    }
    .quota-stat { text-align: center; }
    .quota-stat .val {
      font-size: 36px;
      font-weight: 900;
      line-height: 1;
      display: block;
    }
    .quota-stat .lbl {
      font-size: 11px;
      opacity: 0.75;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 3px;
      display: block;
    }
    .quota-stat.remaining .val { color: #bbf7d0; }
    .quota-stat.used .val     { opacity: 0.8; }
    .quota-divider { width: 1px; background: rgba(255,255,255,0.2); align-self: stretch; }

    /* 진행 바 */
    .quota-bar-wrap {
      position: relative;
      z-index: 1;
      margin-top: 20px;
    }
    .quota-bar-labels {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      opacity: 0.7;
      margin-bottom: 6px;
    }
    .quota-bar-bg {
      height: 10px;
      border-radius: 10px;
      background: rgba(255,255,255,0.2);
      overflow: hidden;
    }
    .quota-bar-fill {
      height: 100%;
      border-radius: 10px;
      background: linear-gradient(90deg, #bbf7d0, #34d399);
      transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
    }

    /* ── 2컬럼 레이아웃 ── */
    .vac-layout {
      display: grid;
      grid-template-columns: 400px 1fr;
      gap: 20px;
      align-items: start;
    }

    /* ── 등록 폼 카드 ── */
    .vac-form-card {
      background: #fff;
      border: 1.5px solid #e5e7eb;
      border-radius: 16px;
      overflow: hidden;
      position: sticky;
      top: 80px;
    }
    .vac-form-header {
      padding: 16px 20px;
      border-bottom: 1px solid #f3f4f6;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .vac-form-header h3 {
      font-size: 15px;
      font-weight: 700;
      color: #111827;
      margin: 0;
    }
    .vac-form-body { padding: 20px; }

    .form-field { margin-bottom: 16px; }
    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: #374151;
      margin-bottom: 6px;
    }
    .form-input, .form-select {
      width: 100%;
      padding: 10px 12px;
      font-size: 14px;
      font-family: inherit;
      border: 1.5px solid #e5e7eb;
      border-radius: 10px;
      color: #111827;
      background: #fff;
      box-sizing: border-box;
      transition: border-color 0.15s;
    }
    .form-input:focus, .form-select:focus {
      outline: none;
      border-color: #0ea5e9;
      box-shadow: 0 0 0 3px rgba(14,165,233,0.12);
    }
    .form-row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    /* ── 자동 계산 표시 박스 ── */
    .calc-preview {
      background: #f0f9ff;
      border: 1.5px solid #bae6fd;
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .calc-preview-icon {
      color: #0ea5e9;
      font-size: 16px;
      flex-shrink: 0;
    }
    .calc-preview-text {
      font-size: 13px;
      font-weight: 700;
      color: #0369a1;
      flex: 1;
    }
    .calc-preview-text span {
      font-size: 16px;
      color: #0284c7;
    }

    .btn-submit {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #0ea5e9, #0284c7);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-submit:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn-submit:active { transform: translateY(0); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* ── 이력 카드 ── */
    .vac-list-card {
      background: #fff;
      border: 1.5px solid #e5e7eb;
      border-radius: 16px;
      overflow: hidden;
    }
    .vac-list-header {
      padding: 16px 20px;
      border-bottom: 1px solid #f3f4f6;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }
    .vac-list-header h3 {
      font-size: 15px;
      font-weight: 700;
      color: #111827;
      margin: 0;
    }
    .vac-filter-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .vac-year-select {
      padding: 6px 10px;
      font-size: 13px;
      font-family: inherit;
      font-weight: 600;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
    }
    .vac-year-select:focus { outline: none; border-color: #0ea5e9; }

    /* 팀장 전체 보기 토글 */
    .toggle-all-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #6b7280;
      cursor: pointer;
      user-select: none;
    }
    .toggle-all-wrap input[type=checkbox] { cursor: pointer; }

    .vac-table { width: 100%; border-collapse: collapse; min-width: 640px; }
    .vac-table th {
      padding: 10px 14px;
      font-size: 11px;
      font-weight: 700;
      color: #9ca3af;
      text-align: left;
      background: #f9fafb;
      border-bottom: 1px solid #f3f4f6;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }
    .vac-table td {
      padding: 11px 14px;
      font-size: 13px;
      color: #374151;
      border-bottom: 1px solid #f9fafb;
      vertical-align: middle;
    }
    .vac-table tr:last-child td { border-bottom: none; }
    .vac-table tr:hover td { background: #f9fafb; }

    /* ── 9가지 vac-type-badge 색상 ── */
    .vac-type-badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 9px;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
    }
    /* 연차 — 파랑 */
    .vac-type-연차            { background: #dbeafe; color: #1d4ed8; }
    /* 정기휴가 — 인디고 */
    .vac-type-정기휴가         { background: #e0e7ff; color: #3730a3; }
    /* 반차 — 오렌지 */
    .vac-type-반차             { background: #ffedd5; color: #c2410c; }
    /* 2H — 노랑 */
    .vac-type-2H               { background: #fef9c3; color: #a16207; }
    /* 3H — 주황 */
    .vac-type-3H               { background: #fef3c7; color: #b45309; }
    /* 경조휴가 — 회색 */
    .vac-type-경조휴가          { background: #f3f4f6; color: #374151; }
    /* 결혼기념일휴가 — 핑크 */
    .vac-type-결혼기념일휴가     { background: #fce7f3; color: #9d174d; }
    /* 배우자출산휴가 — 하늘 */
    .vac-type-배우자출산휴가     { background: #e0f2fe; color: #0369a1; }
    /* 기타휴가 — 라이트그레이 */
    .vac-type-기타휴가          { background: #f9fafb; color: #6b7280; border: 1px solid #e5e7eb; }

    /* 시간대 셀 */
    .vac-time-cell {
      font-size: 12px;
      color: #6b7280;
      white-space: nowrap;
    }
    .vac-time-cell strong {
      display: block;
      color: #374151;
      font-weight: 600;
    }

    .vac-status-badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 9px;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 700;
    }
    .vac-status-approved  { background: #d1fae5; color: #065f46; }
    .vac-status-pending   { background: #fef3c7; color: #b45309; }
    .vac-status-cancelled { background: #f3f4f6; color: #9ca3af; text-decoration: line-through; }

    .btn-cancel-vac {
      padding: 4px 10px;
      font-size: 11px;
      font-family: inherit;
      font-weight: 600;
      border: 1px solid #fecaca;
      background: #fff;
      color: #ef4444;
      border-radius: 6px;
      cursor: pointer;
    }
    .btn-cancel-vac:hover { background: #fef2f2; }

    .loading-state, .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #9ca3af;
      font-size: 14px;
    }

    /* ── fade-in ── */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in   { animation: fadeInUp 0.35s ease forwards; }
    .fade-in-2 { animation: fadeInUp 0.35s 0.08s ease both; }

    /* ── 모바일 반응형 ── */
    @media (max-width: 768px) {
      .vac-layout { grid-template-columns: 1fr; }
      .vac-form-card { position: static; }
      .quota-stats { gap: 16px; }
      .quota-stat .val { font-size: 28px; }
    }

    @media (max-width: 640px) {
      .quota-hero { padding: 20px; }
      /* 시작일/종료일 및 시작시간/종료시간 각각 1열 */
      .form-row-2 { grid-template-columns: 1fr; }
    }

    @media (max-width: 480px) {
      .vac-table { min-width: 0; }
      .vac-table thead { display: none; }
      .vac-table, .vac-table tbody, .vac-table tr, .vac-table td { display: block; }
      .vac-table tr {
        background: #fff;
        border: 1.5px solid #e5e7eb;
        border-radius: 10px;
        padding: 10px 12px;
        margin-bottom: 8px;
      }
      .vac-table td { border: none; padding: 4px 0; display: flex; align-items: flex-start; gap: 8px; }
      .vac-table td::before {
        content: attr(data-label);
        font-size: 10px;
        font-weight: 700;
        color: #9ca3af;
        flex: 0 0 60px;
        padding-top: 2px;
      }
    }
  </style>
</head>
<body>
<div class="app-layout">
  <div id="sidebar"></div>
  <div class="main-content">
    <header class="page-header">
      <h1 class="page-title"><i class="fas fa-umbrella-beach"></i> 휴가 관리</h1>
    </header>
    <main class="content-body">

      <!-- 연차 게이지 히어로 -->
      <div class="quota-hero fade-in" id="quotaHero">
        <div class="quota-hero-top">
          <div>
            <div class="quota-hero-title">Annual Leave Quota</div>
            <div class="quota-hero-name" id="quotaName">-</div>
          </div>
          <div class="quota-stats">
            <div class="quota-stat">
              <span class="val" id="quotaTotal">-</span>
              <span class="lbl">연차 총일수</span>
            </div>
            <div class="quota-divider"></div>
            <div class="quota-stat used">
              <span class="val" id="quotaUsed">-</span>
              <span class="lbl">사용</span>
            </div>
            <div class="quota-divider"></div>
            <div class="quota-stat remaining">
              <span class="val" id="quotaRemaining">-</span>
              <span class="lbl">잔여</span>
            </div>
          </div>
        </div>
        <div class="quota-bar-wrap">
          <div class="quota-bar-labels">
            <span>사용</span>
            <span id="quotaPct">0%</span>
          </div>
          <div class="quota-bar-bg">
            <div class="quota-bar-fill" id="quotaBarFill" style="width:0%;"></div>
          </div>
        </div>
      </div>

      <!-- 2컬럼: 폼 + 이력 -->
      <div class="vac-layout">

        <!-- 휴가 등록 폼 -->
        <div class="vac-form-card fade-in">
          <div class="vac-form-header">
            <i class="fas fa-plus-circle" style="color:#0ea5e9;font-size:16px;"></i>
            <h3>휴가 등록</h3>
          </div>
          <div class="vac-form-body">

            <!-- 팀장: 직원 선택 -->
            <div class="form-field" id="memberFieldWrap" style="display:none;">
              <label class="form-label" style="display:flex;align-items:center;gap:6px;">
                <span style="background:#fef3c7;color:#b45309;font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;letter-spacing:0.04em;">팀장</span>
                대상 직원 선택
              </label>
              <select id="formMember" class="form-select" onchange="onMemberChange()">
                <option value="">본인</option>
              </select>
            </div>

            <!-- 휴가 유형 -->
            <div class="form-field">
              <label class="form-label">휴가 유형</label>
              <select id="formType" class="form-select" onchange="onTypeChange()">
                <option value="연차">연차</option>
                <option value="정기휴가">정기휴가</option>
                <option value="반차">반차</option>
                <option value="2H">2H</option>
                <option value="3H">3H</option>
                <option value="경조휴가">경조휴가</option>
                <option value="결혼기념일휴가">결혼기념일휴가</option>
                <option value="배우자출산휴가">배우자출산휴가</option>
                <option value="기타휴가">기타휴가</option>
              </select>
            </div>

            <!-- 시작일 / 종료일 -->
            <div class="form-row-2">
              <div class="form-field">
                <label class="form-label">시작일</label>
                <input type="date" id="formStart" class="form-input" onchange="onDateChange()">
              </div>
              <div class="form-field">
                <label class="form-label">종료일</label>
                <input type="date" id="formEnd" class="form-input" onchange="onDateChange()">
              </div>
            </div>

            <!-- 시작시간 / 종료시간 -->
            <div class="form-row-2">
              <div class="form-field">
                <label class="form-label">시작시간</label>
                <select id="formStartTime" class="form-select" onchange="calcPreview()"></select>
              </div>
              <div class="form-field">
                <label class="form-label">종료시간</label>
                <select id="formEndTime" class="form-select" onchange="calcPreview()"></select>
              </div>
            </div>

            <!-- 실시간 계산 표시 -->
            <div class="calc-preview" id="calcPreviewBox">
              <i class="fas fa-calculator calc-preview-icon"></i>
              <div class="calc-preview-text" id="calcPreviewText">이 휴가 = -</div>
            </div>

            <!-- 비고 -->
            <div class="form-field">
              <label class="form-label">비고 (선택)</label>
              <input type="text" id="formNote" class="form-input" placeholder="예: 개인 사유, 가족 행사 등">
            </div>

            <button class="btn-submit" id="submitBtn" onclick="submitVacation()">
              <i class="fas fa-calendar-plus"></i>
              휴가 등록
            </button>
          </div>
        </div>

        <!-- 휴가 이력 -->
        <div class="vac-list-card fade-in-2">
          <div class="vac-list-header">
            <h3><i class="fas fa-calendar-alt" style="color:#6b7280;margin-right:8px;"></i>휴가 이력</h3>
            <div class="vac-filter-row">
              <select id="yearSelect" class="vac-year-select" onchange="loadVacations()"></select>
              <!-- 팀장 전체 보기 토글 -->
              <label class="toggle-all-wrap" id="allToggleWrap" style="display:none;">
                <input type="checkbox" id="showAllToggle" onchange="loadVacations()">
                전체 직원 보기
              </label>
            </div>
          </div>
          <div style="overflow-x:auto;">
            <table class="vac-table">
              <thead>
                <tr>
                  <th style="width:90px;">유형</th>
                  <th id="thMember" style="display:none;">직원</th>
                  <th>기간</th>
                  <th style="width:110px;">시간대</th>
                  <th style="width:60px;">일수</th>
                  <th>비고</th>
                  <th style="width:70px;">상태</th>
                  <th style="width:60px;">관리</th>
                </tr>
              </thead>
              <tbody id="vacTbody">
                <tr><td colspan="8" class="loading-state"><i class="fas fa-spinner fa-spin"></i></td></tr>
              </tbody>
            </table>
          </div>
        </div>

      </div>

    </main>
  </div>
</div>

<script src="js/rbac.js"></script>
<script src="js/auth.js"></script>
<script src="js/portal.js?v=30"></script>
<script>
if (!Portal.init()) throw 'AUTH';

const currentUser = RBAC.getCurrentUser();
const isLeader = currentUser.role === 'team_leader';

/* ──────────────────────────────────────────────
   상수
────────────────────────────────────────────── */
const VACATION_TYPES = [
  '연차', '정기휴가', '반차', '2H', '3H',
  '경조휴가', '결혼기념일휴가', '배우자출산휴가', '기타휴가'
];

// 유형별 기본 시작/종료 시간
const TYPE_DEFAULTS = {
  '연차':           { start: '09:00', end: '18:00' },
  '정기휴가':        { start: '09:00', end: '18:00' },
  '반차':           { start: '14:00', end: '18:00' },
  '2H':             { start: '16:00', end: '18:00' },
  '3H':             { start: '15:00', end: '18:00' },
  '경조휴가':        { start: '09:00', end: '18:00' },
  '결혼기념일휴가':  { start: '09:00', end: '18:00' },
  '배우자출산휴가':  { start: '09:00', end: '18:00' },
  '기타휴가':        { start: '09:00', end: '18:00' },
};

/* ──────────────────────────────────────────────
   시간 select 옵션 빌드 (30분 단위, 09:00~18:00)
────────────────────────────────────────────── */
function buildHalfHourOpts(selectedVal) {
  const opts = [];
  let cur = 9 * 60; // 09:00 (분 단위)
  const end = 18 * 60; // 18:00
  while (cur <= end) {
    const h = String(Math.floor(cur / 60)).padStart(2, '0');
    const m = String(cur % 60).padStart(2, '0');
    const val = `${h}:${m}`;
    opts.push(`<option value="${val}"${val === selectedVal ? ' selected' : ''}>${val}</option>`);
    cur += 30;
  }
  return opts.join('');
}

function initTimeSelects(startVal, endVal) {
  document.getElementById('formStartTime').innerHTML = buildHalfHourOpts(startVal || '09:00');
  document.getElementById('formEndTime').innerHTML   = buildHalfHourOpts(endVal   || '18:00');
}

/* ──────────────────────────────────────────────
   점심 차감 계산 (서버 buildEntriesFromRange 로직 인라인 재현)
   - 시작 < 12:00 && 종료 > 13:00 → -60분
   - 그 외 → 차감 없음
────────────────────────────────────────────── */
const _LUNCH_S = 12 * 60; // 720
const _LUNCH_E = 13 * 60; // 780
const _DAY_WORK_MIN = 8 * 60; // 480 (하루 표준 업무시간)

function _hhmmToMin(s) {
  const parts = String(s || '').split(':').map(Number);
  return (parts[0] || 0) * 60 + (parts[1] || 0);
}

/**
 * 단일 날짜의 순 업무 분 계산 (점심 12:00~13:00 자동 차감)
 */
function _netMinForDay(startTime, endTime) {
  const sM = _hhmmToMin(startTime);
  const eM = _hhmmToMin(endTime);
  if (eM <= sM) return 0;
  const raw = eM - sM;
  // 점심 차감: 시작 < 12:00 && 종료 > 13:00
  const lunchDeduct = (sM < _LUNCH_S && eM > _LUNCH_E) ? 60 : 0;
  return Math.max(0, raw - lunchDeduct);
}

/**
 * 시작일~종료일 + 시간대 → 총 순 업무 분
 * 멀티데이: 매 일자에 같은 시작/종료 시간 적용 (규칙 15: 사용자 입력 시간 그대로)
 */
function calcTotalMinutes(startDate, endDate, startTime, endTime) {
  if (!startDate || !startTime || !endTime) return 0;
  const end = endDate && endDate >= startDate ? endDate : startDate;

  const sD = new Date(startDate + 'T00:00:00');
  const eD = new Date(end + 'T00:00:00');
  const diffDays = Math.round((eD - sD) / (24 * 3600 * 1000)) + 1;
  if (diffDays <= 0) return 0;

  const perDay = _netMinForDay(startTime, endTime);
  return perDay * diffDays;
}

/* ──────────────────────────────────────────────
   실시간 계산 표시 갱신
────────────────────────────────────────────── */
function calcPreview() {
  const startDate  = document.getElementById('formStart').value;
  const endDate    = document.getElementById('formEnd').value;
  const startTime  = document.getElementById('formStartTime').value;
  const endTime    = document.getElementById('formEndTime').value;
  const previewEl  = document.getElementById('calcPreviewText');

  if (!startDate || !startTime || !endTime) {
    previewEl.innerHTML = '이 휴가 = -';
    return;
  }

  // 시작시간 >= 종료시간 경고 표시 (저장 차단은 submit 시점)
  if (_hhmmToMin(startTime) >= _hhmmToMin(endTime)) {
    previewEl.innerHTML = '<span style="color:#ef4444;">시작시간이 종료시간보다 늦습니다</span>';
    return;
  }

  const totalMin = calcTotalMinutes(startDate, endDate, startTime, endTime);
  const hours    = Math.round(totalMin / 60 * 10) / 10;
  const days     = Math.round(hours / 8 * 100) / 100;

  previewEl.innerHTML =
    `이 휴가 = <span>${hours}h / ${days}일</span> <small style="font-size:11px;font-weight:400;color:#0369a1;">(점심 자동 차감)</small>`;
}

/* ──────────────────────────────────────────────
   연도 선택 빌드
────────────────────────────────────────────── */
function buildYearOptions() {
  const sel = document.getElementById('yearSelect');
  const year = new Date().getFullYear();
  const opts = [];
  for (let y = year; y >= year - 2; y--) {
    opts.push(`<option value="${y}">${y}년</option>`);
  }
  sel.innerHTML = opts.join('');
}

/* ──────────────────────────────────────────────
   팀장 UI 확장
────────────────────────────────────────────── */
if (isLeader) {
  document.getElementById('allToggleWrap').style.display = 'flex';
  document.getElementById('showAllToggle').checked = true; // 팀장 기본 전체 보기
  document.getElementById('thMember').style.display = '';
  loadMemberOptions();
}

async function loadMemberOptions() {
  try {
    const r = await fetch('/tables/users?limit=200');
    const d = await r.json();
    const members = (d.rows || d.data || []).filter(m => m.is_active !== false && m.full_name);
    const myName = currentUser.full_name || currentUser.username || '';
    const sel = document.getElementById('formMember');
    sel.innerHTML = `<option value="" data-name="${escHtml(myName)}">본인 (${escHtml(myName)})</option>` +
      members
        .filter(m => m.full_name !== myName)
        .sort((a, b) => (a.full_name || '').localeCompare(b.full_name || '', 'ko'))
        .map(m => `<option value="${m.user_id || m.id}" data-name="${escHtml(m.full_name)}">${escHtml(m.full_name)}</option>`)
        .join('');
    document.getElementById('memberFieldWrap').style.display = '';
  } catch (_) {}
}

/* 팀장: 대상 직원 변경 시 quota 갱신 */
function onMemberChange() {
  if (!isLeader) return;
  const sel = document.getElementById('formMember');
  const opt = sel.options[sel.selectedIndex];
  const userId = sel.value || null;
  const name = opt ? (opt.dataset.name || '') : '';
  const targetName = name || currentUser.full_name || currentUser.username || '';
  const year = document.getElementById('yearSelect').value || new Date().getFullYear();
  loadQuota(targetName, year, userId || undefined);
}

/* ──────────────────────────────────────────────
   연차 quota 로드
────────────────────────────────────────────── */
async function loadQuota(memberName, year, userId) {
  try {
    const member = encodeURIComponent(memberName);
    // userId가 있으면 user= 파라미터도 함께 전달 (서버가 지원 시 더 정확)
    const userQ = userId ? `&user=${encodeURIComponent(userId)}` : '';
    const r = await fetch(`/api/vacations/quota?member=${member}&year=${year}${userQ}`);
    const d = await r.json();
    renderQuota(d, memberName);
  } catch (e) {
    renderQuota(null, memberName);
  }
}

function renderQuota(data, memberName) {
  document.getElementById('quotaName').textContent = memberName + ' — ' + new Date().getFullYear() + '년';
  if (!data) return;
  const total     = data.annual_total || 0;
  const used      = data.used || 0;
  const remaining = data.remaining != null ? data.remaining : (total - used);
  const pct = total > 0 ? Math.min(100, Math.round((used / total) * 100)) : 0;

  document.getElementById('quotaTotal').textContent     = total;
  document.getElementById('quotaUsed').textContent      = used;
  document.getElementById('quotaRemaining').textContent = remaining;
  document.getElementById('quotaPct').textContent       = pct + '%';
  document.getElementById('quotaBarFill').style.width   = pct + '%';
}

/* ──────────────────────────────────────────────
   유형 변경 → 시간 자동 채움
────────────────────────────────────────────── */
function onTypeChange() {
  const t = document.getElementById('formType').value;
  const def = TYPE_DEFAULTS[t] || { start: '09:00', end: '18:00' };
  initTimeSelects(def.start, def.end);
  calcPreview();
}

/* ──────────────────────────────────────────────
   날짜 변경 시 종료일 보정 + 미리보기 갱신
────────────────────────────────────────────── */
function onDateChange() {
  const sd = document.getElementById('formStart').value;
  const ed = document.getElementById('formEnd').value;
  if (sd && (!ed || ed < sd)) {
    document.getElementById('formEnd').value = sd;
  }
  calcPreview();
}

/* ──────────────────────────────────────────────
   휴가 등록 제출
────────────────────────────────────────────── */
async function submitVacation() {
  const btn        = document.getElementById('submitBtn');
  const vacType    = document.getElementById('formType').value;
  const startDate  = document.getElementById('formStart').value;
  const endDate    = document.getElementById('formEnd').value || startDate;
  const startTime  = document.getElementById('formStartTime').value;
  const endTime    = document.getElementById('formEndTime').value;
  const note       = document.getElementById('formNote').value.trim();

  if (!startDate) {
    Portal.showToast('시작일을 입력해주세요.', 'error');
    return;
  }

  // 시작시간 >= 종료시간 차단
  if (_hhmmToMin(startTime) >= _hhmmToMin(endTime)) {
    Portal.showToast('시작시간이 종료시간보다 늦습니다. 다시 확인해주세요.', 'error');
    return;
  }

  // 주말/공휴일 경고 (저장은 허용)
  const startDay = new Date(startDate + 'T00:00:00').getDay();
  if (startDay === 0 || startDay === 6) {
    if (!confirm('선택한 시작일이 주말입니다. 계속 등록하시겠습니까?')) return;
  }

  // 등록 대상자 결정
  let userId     = currentUser.user_id || currentUser.id;
  let memberName = currentUser.full_name || currentUser.username || '';

  if (isLeader) {
    const sel    = document.getElementById('formMember');
    const selVal = sel.value;
    if (selVal) {
      userId     = selVal;
      const opt  = sel.options[sel.selectedIndex];
      memberName = (opt && opt.dataset.name) ? opt.dataset.name : opt.textContent;
    }
  }

  btn.disabled  = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 등록 중...';

  try {
    const r = await fetch('/api/vacations/use', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        user_id:       userId,
        member_name:   memberName,
        vacation_type: vacType,
        start_date:    startDate,
        end_date:      endDate,
        start_time:    startTime,
        end_time:      endTime,
        note:          note
        // days 는 서버가 시간대로 자동 산출
      })
    });
    const d = await r.json();

    if (!r.ok) {
      if (r.status === 400 && d.quota) {
        const q = d.quota;
        Portal.showToast(
          `연차 한도 초과 — 잔여 ${q.remaining}일, 신청 ${d.request_days}일`,
          'error'
        );
      } else {
        throw new Error(d.error || `오류 (${r.status})`);
      }
      return;
    }

    const vac  = d.vacation || {};
    const hVal = vac.hours != null ? vac.hours + 'h' : '';
    const dVal = vac.days  != null ? vac.days  + '일' : '';
    const summary = [hVal, dVal].filter(Boolean).join(' / ');

    Portal.showToast(
      `휴가 등록 완료${summary ? ' (' + summary + ')' : ''}. 워크로드 표준시간이 자동 보정됩니다.`,
      'success'
    );

    // 폼 초기화
    document.getElementById('formStart').value = '';
    document.getElementById('formEnd').value   = '';
    document.getElementById('formNote').value  = '';
    onTypeChange(); // 시간도 유형 기본값으로 리셋
    calcPreview();

    // 데이터 새로고침
    await Promise.all([
      loadVacations(),
      loadQuota(memberName, new Date().getFullYear(), (isLeader ? userId : undefined))
    ]);
  } catch (e) {
    Portal.showToast('등록 실패: ' + e.message, 'error');
  } finally {
    btn.disabled  = false;
    btn.innerHTML = '<i class="fas fa-calendar-plus"></i> 휴가 등록';
  }
}

/* ──────────────────────────────────────────────
   휴가 이력 로드
────────────────────────────────────────────── */
async function loadVacations() {
  const year    = document.getElementById('yearSelect').value;
  const showAll = isLeader && document.getElementById('showAllToggle').checked;
  const myName  = encodeURIComponent(currentUser.full_name || currentUser.username || '');

  // 직원 컬럼 토글
  document.getElementById('thMember').style.display = (isLeader && showAll) ? '' : 'none';

  const tbody = document.getElementById('vacTbody');
  tbody.innerHTML = '<tr><td colspan="8" class="loading-state"><i class="fas fa-spinner fa-spin"></i></td></tr>';

  try {
    const memberQ = showAll ? '' : `member=${myName}&`;
    const r = await fetch(`/api/vacations/list?${memberQ}year=${year}`);
    const d = await r.json();
    renderVacations(d.rows || [], showAll);

    // quota 갱신 (본인)
    if (!showAll) {
      loadQuota(currentUser.full_name || currentUser.username, year);
    }
  } catch (e) {
    tbody.innerHTML = '<tr><td colspan="8" class="empty-state">데이터를 불러오지 못했습니다.</td></tr>';
  }
}

function renderVacations(rows, showAll) {
  const tbody  = document.getElementById('vacTbody');
  const myName = currentUser.full_name || currentUser.username || '';

  if (!rows.length) {
    tbody.innerHTML = '<tr><td colspan="8" class="empty-state"><i class="fas fa-umbrella-beach" style="margin-right:8px;"></i>등록된 휴가가 없습니다.</td></tr>';
    return;
  }

  tbody.innerHTML = rows.map(r => {
    const period      = r.start_date === r.end_date ? r.start_date : `${r.start_date} ~ ${r.end_date}`;
    const isCancelled = r.status === 'cancelled';
    const canCancel   = !isCancelled && (r.member_name === myName || isLeader);

    const statusClass = r.status === 'approved'  ? 'vac-status-approved'
                      : r.status === 'cancelled' ? 'vac-status-cancelled'
                      : 'vac-status-pending';
    const statusLabel = r.status === 'approved'  ? '승인'
                      : r.status === 'cancelled' ? '취소됨'
                      : '대기';

    // vac-type-badge CSS 클래스 키 (공백 제거)
    const typeKey = (r.vacation_type || '').replace(/\s/g, '');

    const memberCol = showAll
      ? `<td data-label="직원" style="font-weight:600;">${escHtml(r.member_name || '-')}</td>` : '';

    // 시간대 컬럼: start_time~end_time / hours
    let timeCell = '-';
    if (r.start_time && r.end_time) {
      const hoursDisp = r.hours != null ? `${r.hours}h` : '';
      timeCell = `<div class="vac-time-cell">
        <strong>${escHtml(r.start_time)}~${escHtml(r.end_time)}</strong>
        ${hoursDisp ? `<span>${hoursDisp}</span>` : ''}
      </div>`;
    }

    return `<tr style="${isCancelled ? 'opacity:0.55;' : ''}">
      <td data-label="유형"><span class="vac-type-badge vac-type-${typeKey}">${escHtml(r.vacation_type || '-')}</span></td>
      ${memberCol}
      <td data-label="기간" style="font-size:12px;white-space:nowrap;">${escHtml(period)}</td>
      <td data-label="시간대">${timeCell}</td>
      <td data-label="일수" style="font-weight:700;text-align:center;">${r.days != null ? r.days : '-'}</td>
      <td data-label="비고" style="color:#6b7280;">${escHtml(r.note || '-')}</td>
      <td data-label="상태"><span class="vac-status-badge ${statusClass}">${statusLabel}</span></td>
      <td data-label="관리">
        ${canCancel
          ? `<button class="btn-cancel-vac" onclick="cancelVacation(${r.id})">취소</button>`
          : '-'}
      </td>
    </tr>`;
  }).join('');
}

/* ──────────────────────────────────────────────
   휴가 취소
────────────────────────────────────────────── */
async function cancelVacation(id) {
  if (!confirm('이 휴가를 취소하시겠습니까?')) return;
  try {
    const r = await fetch(`/tables/vacations/${id}`, { method: 'DELETE' });
    if (!r.ok) throw new Error(`서버 오류 (${r.status})`);
    Portal.showToast('휴가가 취소되었습니다.', 'success');
    await loadVacations();
    const year = document.getElementById('yearSelect').value;
    loadQuota(currentUser.full_name || currentUser.username, year);
  } catch (e) {
    Portal.showToast('취소 실패: ' + e.message, 'error');
  }
}

function escHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ──────────────────────────────────────────────
   초기화
────────────────────────────────────────────── */
function init() {
  buildYearOptions();

  // 시간 select 초기 옵션 빌드 (연차 기본값: 09:00 ~ 18:00)
  initTimeSelects('09:00', '18:00');

  // 오늘 날짜 기본값
  const today = Portal.todayStr();
  document.getElementById('formStart').value = today;
  document.getElementById('formEnd').value   = today;

  calcPreview();

  const year   = new Date().getFullYear();
  const myName = currentUser.full_name || currentUser.username || '';
  loadQuota(myName, year);
  loadVacations();
}

init();
</script>
